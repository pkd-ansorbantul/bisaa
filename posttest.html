<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>PKD GP Ansor Bantul · Post-test</title>
  <link rel="icon" type="image/png" href="LOGO ANSOR.webp">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: #f8fafc; color: #0f172a; min-height: 100vh; }
    .navbar { background: rgba(255,255,255,0.8) !important; backdrop-filter: blur(12px); border-bottom: 1px solid rgba(203,213,225,0.3); }
    .navbar-brand img { max-height: 40px; margin-right: 12px; }
    .brand-title { font-size: 1.35rem; font-weight: 700; color: #0a3d62; }
    .brand-sub { font-size: 0.9rem; color: #6c757d; display: block; }
    .container-card { max-width: 900px; background: white; border-radius: 32px; padding: 2rem; margin: 30px auto; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); border: 1px solid rgba(226,232,240,0.6); }
    .section-title { font-weight: 650; font-size: 1.75rem; border-left: 6px solid #2563eb; padding-left: 1.2rem; }
    .card-kahoot { background: white; border: 1px solid #e2e8f0; border-radius: 28px; padding: 1.8rem; box-shadow: 0 6px 14px rgba(0,0,0,0.02); }
    .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; background: #f1f5f9; padding: 14px 24px; border-radius: 60px; flex-wrap: wrap; gap: 10px; }
    .timer-box { background: #0f172a; color: white; padding: 8px 22px; border-radius: 40px; font-weight: 600; font-size: 1.25rem; }
    .score-box { background: #fbbf24; color: #0f172a; padding: 8px 22px; border-radius: 40px; font-weight: 700; }
    .progress-box { font-weight: 600; color: #2563eb; }
    .question-text { font-size: 1.5rem; font-weight: 700; margin-bottom: 30px; line-height: 1.4; color: #0f172a; }
    .kahoot-options-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-top: 10px; }
    .kahoot-option { display: flex !important; align-items: center; padding: 1rem 1.5rem !important; border: none !important; border-radius: 18px !important; color: white !important; font-weight: 600 !important; font-size: 1.1rem !important; transition: transform 0.12s, box-shadow 0.15s !important; box-shadow: 0 6px 12px rgba(0,0,0,0.12) !important; width: 100%; text-align: left; }
    .opt-red { background-color: #dc2626; }
    .opt-blue { background-color: #2563eb; }
    .opt-yellow { background-color: #eab308; color: #0f172a !important; }
    .opt-green { background-color: #16a34a; }
    .btn-rounded { border-radius: 9999px; padding: 0.6rem 2rem; font-weight: 600; }
    .footer-modern { font-size: 0.85rem; color: #64748b; margin-top: auto; text-align: center; padding: 1.5rem 0; border-top: 1px solid #e2e8f0; background: white; }
    .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
    .toast { background: white; border-left: 5px solid; box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.15); border-radius: 16px; }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg bg-white sticky-top shadow-sm">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" href="index.html">
      <img src="LOGO ANSOR.webp" alt="GP Ansor">
      <span><span class="brand-title">PKD GP Ansor</span><span class="brand-sub">Kabupaten Bantul</span></span>
    </a>
    <div class="ms-auto d-flex align-items-center gap-2">
      <button class="btn btn-outline-secondary rounded-pill" id="refreshBtn" title="Segarkan Data">
        <i class="bi bi-arrow-clockwise"></i>
      </button>
      <a href="index.html" class="btn btn-outline-primary rounded-pill px-4"><i class="bi bi-arrow-left"></i> Kembali</a>
    </div>
  </div>
</nav>

<div class="container container-card">
  <h2 class="section-title"><i class="bi bi-check2-circle me-2"></i>Post‑test – Evaluasi</h2>
  <div id="posttestContainer"></div>
</div>

<footer class="footer-modern container">
  <i class="bi bi-c-circle"></i> 2026 · Tim Instruktur GP Ansor Kabupaten Bantul
</footer>

<div class="toast-container">
  <div id="notificationToast" class="toast border-0 shadow-lg" role="alert" data-bs-delay="3000">
    <div class="toast-header bg-white border-0">
      <i class="bi me-2" id="toastIcon"></i>
      <strong class="me-auto" id="toastTitle">Berhasil</strong>
      <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
    </div>
    <div class="toast-body" id="toastMessage"></div>
  </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="dataCache.js"></script>
<script src="api.js"></script>

<script>
  (function() {
    'use strict';

    const FORM_STATE_KEY = 'posttestQuiz';
    let questions = [];
    let quizSettings = {};
    let posttestQuiz = null;
    let posttestTimer = null;

    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/[&<>"]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        if (m === '"') return '&quot;';
        return m;
      });
    }

    function showToast(message, type) {
      const toastEl = document.getElementById('notificationToast');
      if (!toastEl) return;
      const toast = new bootstrap.Toast(toastEl);
      document.getElementById('toastMessage').innerText = message;
      const icon = document.getElementById('toastIcon');
      if (type === 'success') {
        icon.className = 'bi bi-check-circle-fill text-success';
        document.getElementById('toastTitle').innerText = 'Berhasil';
      } else if (type === 'error') {
        icon.className = 'bi bi-x-circle-fill text-danger';
        document.getElementById('toastTitle').innerText = 'Gagal';
      } else {
        icon.className = 'bi bi-info-circle-fill text-primary';
        document.getElementById('toastTitle').innerText = 'Info';
      }
      toast.show();
    }

    function saveQuizState(state) {
      try { localStorage.setItem(FORM_STATE_KEY, JSON.stringify(state)); } catch (e) {}
    }

    function loadQuizState() {
      try { const saved = localStorage.getItem(FORM_STATE_KEY); return saved ? JSON.parse(saved) : null; } catch (e) { return null; }
    }

    function clearQuizState() {
      try { localStorage.removeItem(FORM_STATE_KEY); } catch (e) {}
    }

    // ──── MAIN LOAD ──────────────────────────────────────────
    function loadMainData() {
      const container = document.getElementById('posttestContainer');
      
      let cachedQuestions = DataCache.getData('posttestQuestions');
      let cachedSettings = DataCache.getData('quizSettings');

      if (cachedQuestions && cachedQuestions.length > 0) {
        questions = cachedQuestions;
        quizSettings = cachedSettings || {};
        renderFormDataDiri();
        console.log('✅ Posttest: Data dari DataCache, loading instan.');
      } else {
        container.innerHTML = `<div class="text-center py-5"><div class="spinner-border text-primary"></div><p class="mt-2 text-muted">Memuat soal posttest...</p></div>`;
      }

      fetchDataFromAPI(cachedQuestions);
    }

    async function fetchDataFromAPI(cachedQuestions) {
      const container = document.getElementById('posttestContainer');
      
      console.log("🔄 Mencoba mengambil data dari API menggunakan PKD.callApi...");
      
      try {
        const [questionsRes, settingsRes] = await Promise.all([
          PKD.getPosttestQuestions(true),
          PKD.getQuizSettings(true)
        ]);

        console.log("📦 Respons Mentah Posttest dari API:", questionsRes);
        console.log("📦 Respons Mentah QuizSettings dari API:", settingsRes);

        // 🔥 PERBAIKAN UTAMA DI SINI:
        // Handle respons yang bisa berupa {data: [...]} atau langsung [...] (karena api.js mengembalikan array langsung)
        const freshQuestions = Array.isArray(questionsRes) ? questionsRes : (questionsRes?.data || []);
        const freshSettings = settingsRes?.data || {};

        if (Array.isArray(freshQuestions)) {
          if (freshQuestions.length > 0) {
            questions = freshQuestions;
            quizSettings = freshSettings;
            DataCache.updateData('posttestQuestions', freshQuestions);
            DataCache.updateData('quizSettings', freshSettings);
            renderFormDataDiri();
            console.log(`✅ Sukses! ${freshQuestions.length} soal diterima dan disimpan ke DataCache.`);
            return;
          } else {
            console.warn('⚠️ API mengembalikan array kosong. Memeriksa DataCache...');
            const cached = DataCache.getData('posttestQuestions');
            if (cached && Array.isArray(cached) && cached.length > 0) {
              questions = cached;
              quizSettings = DataCache.getData('quizSettings') || {};
              renderFormDataDiri();
              console.log(`✅ Menggunakan ${cached.length} soal dari DataCache karena API kosong.`);
              return;
            }
            
            // ❌ Tidak ada data sama sekali
            container.innerHTML = `
              <div class="alert alert-info text-center mt-3">
                <i class="bi bi-info-circle fs-4"></i>
                <p class="mt-2">Belum ada soal posttest yang tersedia di server maupun cache.</p>
                <p class="small">Pastikan Web App sudah di-deploy ulang dan URL di api.js sudah benar.</p>
              </div>
            `;
            return;
          }
        }

        // Respon tidak valid
        console.error('❌ Respon API tidak valid:', questionsRes);
        const cached = DataCache.getData('posttestQuestions');
        if (cached && Array.isArray(cached) && cached.length > 0) {
          questions = cached;
          quizSettings = DataCache.getData('quizSettings') || {};
          renderFormDataDiri();
          showToast('Gagal terhubung ke server (fallback cache)', 'warning');
        } else {
          container.innerHTML = `
            <div class="alert alert-danger text-center mt-3">
              <i class="bi bi-exclamation-triangle fs-4"></i>
              <p class="mt-2">Gagal memuat data posttest. Periksa Console untuk detail error.</p>
              <button class="btn btn-primary mt-2" onclick="location.reload()">Coba Lagi</button>
            </div>
          `;
        }

      } catch (e) {
        console.error('❌ Error fatal saat fetch data (catch block):', e);
        const cached = DataCache.getData('posttestQuestions');
        if (cached && Array.isArray(cached) && cached.length > 0) {
          questions = cached;
          quizSettings = DataCache.getData('quizSettings') || {};
          renderFormDataDiri();
          showToast('Gagal terhubung ke server (fallback cache)', 'warning');
        }
      }
    }

    function renderFormDataDiri() {
      const container = document.getElementById('posttestContainer');
      if (!questions || questions.length === 0) {
        container.innerHTML = `
          <div class="alert alert-warning text-center">
            <i class="bi bi-exclamation-triangle fs-4"></i>
            <p class="mt-2 mb-0">Belum ada soal posttest yang tersedia.</p>
            <button class="btn btn-outline-primary mt-2" onclick="location.reload()">Refresh</button>
          </div>
        `;
        return;
      }

      const saved = loadQuizState();
      let nama = saved?.nama || '';
      let nohp = saved?.nohp || '';
      let alamat = saved?.alamat || '';

      let html = `
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div><span class="text-muted small">Status: </span><span class="badge bg-success text-white">✅ ${questions.length} soal siap</span></div>
          <button class="btn btn-sm btn-outline-secondary" id="inlineRefreshBtn"><i class="bi bi-arrow-clockwise me-1"></i> Segarkan</button>
        </div>
        <div class="card-kahoot">
          <h4 class="mb-4">📝 Isi Data Diri untuk Memulai Posttest</h4>
          <div class="mb-3"><label class="form-label fw-bold">Nama Lengkap</label><input type="text" class="form-control" id="posttestNama" value="${escapeHtml(nama)}" placeholder="Masukkan nama lengkap" required></div>
          <div class="mb-3"><label class="form-label fw-bold">Nomor HP</label><input type="tel" class="form-control" id="posttestNohp" value="${escapeHtml(nohp)}" placeholder="Masukkan nomor HP" required></div>
          <div class="mb-3"><label class="form-label fw-bold">Alamat</label><textarea class="form-control" id="posttestAlamat" rows="2" placeholder="Masukkan alamat" required>${escapeHtml(alamat)}</textarea></div>
          <div class="text-center mt-4"><button id="startPosttestBtn" class="btn btn-primary btn-lg rounded-pill px-5">🚀 Mulai Posttest</button></div>
        </div>
      `;
      container.innerHTML = html;
      container.classList.add('fade-in');

      document.getElementById('startPosttestBtn')?.addEventListener('click', function() {
        const nama = document.getElementById('posttestNama').value.trim();
        const nohp = document.getElementById('posttestNohp').value.trim();
        const alamat = document.getElementById('posttestAlamat').value.trim();
        if (!nama || !nohp || !alamat) { showToast('Nama, No HP, dan Alamat wajib diisi!', 'danger'); return; }
        posttestQuiz = {
          questions, currentIndex: 0, score: 0, answers: [], timer: null,
          timerDuration: quizSettings.posttest_timer || 30, timeLeft: 0,
          nama, nohp, alamat, started: true, isFinished: false, settings: quizSettings
        };
        saveQuizState(posttestQuiz);
        renderPosttestQuestion();
      });

      document.getElementById('inlineRefreshBtn')?.addEventListener('click', function() {
        this.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
        this.disabled = true;
        fetchDataFromAPI(null);
        this.innerHTML = 'Segarkan';
        this.disabled = false;
      });

      if (saved && !saved.isFinished && saved.started) {
        if (confirm('Anda memiliki Posttest yang belum selesai. Lanjutkan?')) {
          posttestQuiz = saved;
          posttestQuiz.settings = quizSettings;
          posttestQuiz.questions = questions;
          renderPosttestQuestion();
        } else clearQuizState();
      }
    }

    function renderPosttestQuestion() {
      const container = document.getElementById('posttestContainer');
      const quiz = posttestQuiz;
      if (!quiz || !quiz.started || quiz.currentIndex >= quiz.questions.length) {
        if (quiz && quiz.currentIndex >= quiz.questions.length) renderPosttestSummary();
        else renderFormDataDiri();
        return;
      }

      const q = quiz.questions[quiz.currentIndex];
      const timerValue = (q.timer_enabled ? q.timer_duration : quiz.timerDuration) || 30;
      let html = `
        <div class="card-kahoot">
          <div class="quiz-header">
            <div class="timer-box"><i class="bi bi-hourglass-split"></i> <span id="timerDisplay">${timerValue}</span> detik</div>
            <div class="score-box"><i class="bi bi-star-fill"></i> Skor: ${quiz.score}</div>
            <div class="progress-box"><i class="bi bi-list-ol"></i> ${quiz.currentIndex + 1}/${quiz.questions.length}</div>
          </div>
          <div class="mb-3 small text-muted">Nama: ${escapeHtml(quiz.nama)} | No HP: ${escapeHtml(quiz.nohp)} | Alamat: ${escapeHtml(quiz.alamat)}</div>
          <div class="question-text">${quiz.currentIndex + 1}. ${q.teks}</div>
          <div class="kahoot-options-grid">
      `;

      (q.opsi || []).forEach((ops, i) => {
        const colors = ['opt-red', 'opt-blue', 'opt-yellow', 'opt-green'];
        const isAnswered = quiz.answers[quiz.currentIndex] !== undefined;
        const disabled = isAnswered ? 'disabled' : '';
        html += `<button type="button" class="option-btn kahoot-option ${colors[i % 4]}" data-qid="${q.id}" data-opt-index="${i}" ${disabled}><span class="opt-letter">${String.fromCharCode(65 + i)}.</span> <span class="opt-text">${ops}</span></button>`;
      });

      html += `</div>`;

      if (quiz.answers[quiz.currentIndex] !== undefined) {
        html += `<div class="mt-4 text-center"><button id="nextPosttestBtn" class="btn btn-primary btn-lg rounded-pill px-5">Selanjutnya ➡️</button></div>`;
      }

      html += `</div>`;
      container.innerHTML = html;
      container.classList.add('fade-in');

      document.querySelectorAll('.kahoot-option').forEach(btn => {
        btn.addEventListener('click', function() {
          if (quiz.answers[quiz.currentIndex] !== undefined) return;
          const qid = parseInt(this.dataset.qid);
          const optIdx = parseInt(this.dataset.optIndex);
          const isCorrect = (optIdx === q.jawaban);
          if (isCorrect) quiz.score += 10;
          quiz.answers[quiz.currentIndex] = { questionId: qid, selectedOption: optIdx, isCorrect };
          saveQuizState(quiz);
          renderPosttestQuestion();
          setTimeout(() => {
            if (quiz.currentIndex < quiz.questions.length && quiz.answers[quiz.currentIndex] !== undefined) {
              nextPosttestQuestion();
            }
          }, 1500);
        });
      });

      const nextBtn = document.getElementById('nextPosttestBtn');
      if (nextBtn) {
        nextBtn.addEventListener('click', function() { nextPosttestQuestion(); });
      }

      if (quiz.answers[quiz.currentIndex] === undefined) {
        let timeLeft = timerValue;
        updateTimerDisplay(timeLeft);
        if (posttestTimer) clearInterval(posttestTimer);
        posttestTimer = setInterval(() => {
          timeLeft -= 1;
          updateTimerDisplay(timeLeft);
          if (timeLeft <= 0) {
            clearInterval(posttestTimer);
            posttestTimer = null;
            if (quiz.answers[quiz.currentIndex] === undefined) {
              quiz.answers[quiz.currentIndex] = { questionId: q.id, selectedOption: null, isCorrect: false };
              saveQuizState(quiz);
              renderPosttestQuestion();
              setTimeout(() => {
                if (quiz.currentIndex < quiz.questions.length && quiz.answers[quiz.currentIndex] !== undefined) {
                  nextPosttestQuestion();
                }
              }, 1500);
            }
          }
        }, 1000);
      }
    }

    function updateTimerDisplay(seconds) {
      const el = document.getElementById('timerDisplay');
      if (el) el.innerText = seconds;
    }

    function nextPosttestQuestion() {
      if (!posttestQuiz) return;
      posttestQuiz.currentIndex++;
      saveQuizState(posttestQuiz);
      renderPosttestQuestion();
    }

    function renderPosttestSummary() {
      const quiz = posttestQuiz;
      if (!quiz) return;
      quiz.isFinished = true;
      saveQuizState(quiz);

      const total = quiz.questions.length;
      const correct = quiz.answers.filter(a => a && a.isCorrect).length;
      const score = quiz.score;

      let html = `
        <div class="card-kahoot text-center">
          <h3 class="mb-4">🎉 Posttest Selesai! 🎉</h3>
          <div class="display-1 mb-3">${score}</div>
          <p class="lead">Jawaban benar: ${correct} dari ${total}</p>
          <p><strong>Nama:</strong> ${escapeHtml(quiz.nama || '')}</p>
          <p><strong>No HP:</strong> ${escapeHtml(quiz.nohp || '')}</p>
          <p><strong>Alamat:</strong> ${escapeHtml(quiz.alamat || '')}</p>
          <hr>
          <button id="submitPosttestResultBtn" class="btn btn-primary btn-lg rounded-pill px-5 mt-3">✅ Kumpulkan Posttest</button>
          <button id="restartPosttestBtn" class="btn btn-outline-secondary btn-lg rounded-pill px-5 mt-3 ms-2">🔄 Ulangi</button>
        </div>
      `;

      document.getElementById('posttestContainer').innerHTML = html;

      document.getElementById('submitPosttestResultBtn').addEventListener('click', async function() {
        try {
          const answers = JSON.stringify(quiz.answers.map(a => ({
            qid: a.questionId,
            selected: a.selectedOption,
            correct: a.isCorrect
          })));
          await PKD.submitPosttest(quiz.nama, quiz.nohp, quiz.alamat, answers, quiz.score);
          showToast('✅ Posttest berhasil dikirim!', 'success');
          clearQuizState();
          location.reload();
        } catch (e) {
          showToast('❌ Gagal mengirim: ' + e.message, 'danger');
        }
      });

      document.getElementById('restartPosttestBtn').addEventListener('click', function() {
        clearQuizState();
        location.reload();
      });
    }

    async function checkAccessAndLoad() {
      try {
        if (typeof PKD === 'undefined') {
          await new Promise(r => setTimeout(r, 300));
          if (typeof PKD === 'undefined') { loadMainData(); return; }
        }

        const [visRes, loginRes] = await Promise.all([
            PKD.getPublicVisibility().catch(() => null),
            PKD.getLoginMode().catch(() => null)
        ]);

        let requireLogin = true;
        if (visRes && visRes.success && visRes.data) {
          requireLogin = visRes.data.posttest !== false;
        } else if (loginRes && loginRes.success) {
          requireLogin = loginRes.enabled;
        }

        if (requireLogin) {
          const auth = localStorage.getItem('pkd_auth') || sessionStorage.getItem('pkd_auth');
          if (!auth) { window.location.href = '/bisaa/login.html?return=posttest.html'; return; }
        }
        loadMainData();

        document.getElementById('refreshBtn')?.addEventListener('click', function() {
          this.innerHTML = '<span class="spinner-border spinner-border-sm"></span>'; this.disabled = true;
          DataCache.removeData('posttestQuestions');
          DataCache.removeData('quizSettings');
          loadMainData();
          this.innerHTML = '<i class="bi bi-arrow-clockwise"></i>'; this.disabled = false;
        });
      } catch (e) { loadMainData(); }
    }

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', checkAccessAndLoad);
    else checkAccessAndLoad();
  })();
</script>
</body>
</html>
