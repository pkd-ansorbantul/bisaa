<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>Post-test · PKD GP Ansor Bantul</title>

    <!-- Favicon & Font -->
    <link rel="icon" type="image/png" href="/bisaa/LOGO%20ANSOR.webp">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        /* ===== UNIVERSAL PREMIUM (GLASSMORPHISM) ===== */
        * { font-family: 'Inter', system-ui, sans-serif; }
        body {
            background: #f8fafc;
            color: #0f172a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- HEADER MINIMALIS ELEGAN (DIPERBESAR) --- */
        .header-minimal {
            background: rgba(255, 255, 255, 0.72) !important;
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            z-index: 1030;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.04);
            padding-top: 0 !important;
            padding-bottom: 0 !important;
        }
        .header-minimal .container {
            padding-top: 0.75rem;
            padding-bottom: 0.75rem;
        }
        .btn-back {
            background: rgba(37, 99, 235, 0.08);
            color: #2563eb;
            border: 1px solid rgba(37, 99, 235, 0.2);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .btn-back:hover {
            background: #2563eb;
            color: white;
            transform: translateX(-3px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
        }
        .brand-logo-mini { 
            height: 40px; 
            width: auto; 
            margin-right: 14px; 
            transition: transform 0.2s;
        }
        .brand-logo-mini:hover { transform: scale(1.05); }
        .brand-title-mini { 
            font-weight: 700; 
            color: #0a3d62; 
            font-size: 1.3rem; 
            line-height: 1.2; 
            letter-spacing: -0.02em;
        }
        .brand-sub-mini { 
            font-size: 0.8rem; 
            color: #64748b; 
            display: block; 
            margin-top: 0px; 
            letter-spacing: 0.02em;
        }

        #navbarUserMenu { display: flex; align-items: center; gap: 8px; }
        .user-menu-area .dropdown-toggle { border-radius: 50px; padding: 0.3rem 1rem; font-size: 0.9rem; }
        .user-menu-area .btn-outline-primary { border-radius: 50px; padding: 0.3rem 1.2rem; font-size: 0.9rem; }

        /* --- GLASS CARD --- */
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .glass-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 50px rgba(37, 99, 235, 0.08);
            border-color: rgba(37, 99, 235, 0.2);
        }

        /* --- SKELETON LOADING INSTANT (BARU) --- */
        .skeleton-box {
            background: #e2e8f0;
            border-radius: 8px;
            animation: pulse 1.5s infinite ease-in-out;
            display: inline-block;
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        /* --- KAHOOT STYLE --- */
        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            background: #f1f5f9;
            padding: 14px 24px;
            border-radius: 60px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .timer-box {
            background: #0f172a;
            color: white;
            padding: 8px 22px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1.25rem;
        }
        .score-box {
            background: #fbbf24;
            color: #0f172a;
            padding: 8px 22px;
            border-radius: 40px;
            font-weight: 700;
        }
        .progress-box { font-weight: 600; color: #2563eb; }
        .question-text {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 30px;
            line-height: 1.4;
            color: #0f172a;
        }
        .kahoot-options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-top: 10px;
        }
        .kahoot-option {
            display: flex !important;
            align-items: center;
            padding: 1rem 1.5rem !important;
            border: none !important;
            border-radius: 18px !important;
            color: white !important;
            font-weight: 600 !important;
            font-size: 1.1rem !important;
            transition: transform 0.12s, box-shadow 0.15s !important;
            box-shadow: 0 6px 12px rgba(0,0,0,0.12) !important;
            width: 100%;
            text-align: left;
        }
        .kahoot-option:active { transform: scale(0.95); }
        .opt-red { background-color: #dc2626; }
        .opt-blue { background-color: #2563eb; }
        .opt-yellow { background-color: #eab308; color: #0f172a !important; }
        .opt-green { background-color: #16a34a; }
        .kahoot-option.correct { box-shadow: 0 0 0 4px #22c55e; transform: scale(1.02); }
        .kahoot-option.wrong { box-shadow: 0 0 0 4px #ef4444; transform: scale(0.95); }
        .btn-rounded { border-radius: 9999px; padding: 0.6rem 2rem; font-weight: 600; }

        /* --- PROGRESS BAR --- */
        .progress-thin { height: 6px; background: #e2e8f0; border-radius: 4px; overflow: hidden; margin-top: 10px; }
        .progress-thin .progress-bar {
            background: linear-gradient(90deg, #2563eb, #7dd3fc);
            transition: width 0.5s ease;
        }

        /* --- ANIMASI --- */
        .fade-up { animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- FOOTER --- */
        .footer-modern {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: auto;
            text-align: center;
            padding: 1.5rem 0;
            border-top: 1px solid #e2e8f0;
            background: white;
        }

        /* --- RESPONSIF --- */
        @media (max-width: 576px) {
            .glass-card { border-radius: 16px; padding: 1rem !important; }
            .header-minimal .container { padding: 0 0.5rem; }
            .btn-back { font-size: 0.8rem; padding: 0.2rem 0.8rem; }
            .brand-title-mini { display: none; }
            .brand-sub-mini { display: none; }
            .user-menu-area .dropdown-toggle { font-size: 0.75rem; padding: 0.2rem 0.8rem; }
            .kahoot-options-grid { grid-template-columns: 1fr; }
            .quiz-header { flex-direction: column; align-items: stretch; text-align: center; }
            .question-text { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <!-- ================= HEADER MINIMALIS ELEGAN ================= -->
    <header class="header-minimal sticky-top shadow-sm">
        <div class="container d-flex justify-content-between align-items-center py-3">
            <div class="d-flex align-items-center gap-2">
                <a href="/bisaa/index.html" class="btn btn-back rounded-pill">
                    <i class="bi bi-arrow-left me-1"></i> Kembali
                </a>
                <a href="/bisaa/index.html" class="brand-minimal text-decoration-none d-flex align-items-center ms-1">
                    <img src="/bisaa/LOGO%20ANSOR.webp" alt="GP Ansor" class="brand-logo-mini">
                    <div>
                        <div class="brand-title-mini">PKD GP Ansor</div>
                        <span class="brand-sub-mini">Kabupaten Bantul</span>
                    </div>
                </a>
            </div>
            <!-- Area User Role (diisi oleh api.js) -->
            <div id="navbarUserMenu" class="user-menu-area"></div>
        </div>
    </header>

    <!-- ================= KONTEN UTAMA ================= -->
    <div id="contentArea" class="container" style="padding: 2rem 0; max-width: 900px;">
        <div class="glass-card p-4 fade-up">
            <h2 class="section-title"><i class="bi bi-check2-circle me-2"></i>Post‑test – Evaluasi</h2>
            <div id="posttestContainer"></div>
        </div>
    </div>

    <!-- ================= FOOTER ================= -->
    <footer class="footer-modern container">
        <div class="d-flex justify-content-center align-items-center gap-2">
            <i class="bi bi-c-circle"></i>
            <span>Hak Cipta 2026 - Tim Instruktur GP Ansor Kabupaten Bantul</span>
        </div>
    </footer>

    <!-- ================= TOAST ================= -->
    <div class="toast-container position-fixed top-0 end-0 p-3">
        <div id="notificationToast" class="toast border-0 shadow-lg" role="alert" data-bs-delay="3000">
            <div class="toast-header bg-white border-0">
                <i class="bi me-2" id="toastIcon"></i>
                <strong class="me-auto" id="toastTitle">Berhasil</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
            </div>
            <div class="toast-body" id="toastMessage"></div>
        </div>
    </div>

    <!-- ================= SCRIPTS ================= -->
    <!-- Library Eksternal (tetap sebagai script biasa) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Modul ES Khusus Halaman Ini -->
    <script type="module">
        // ==========================================================
        //   IMPOR DARI CORE API (ES Modules)
        // ==========================================================
        import {
            guardPublicAccess,
            getPosttestQuestions,
            getPosttestResponses,
            addPosttestQuestion,
            updatePosttestQuestion,
            deletePosttestQuestion,
            submitPosttest,
            showToast,
            escapeHtml,
            updateNavbarMenu
        } from './js/core/api.js';

        // ==========================================================
        //   STATE & VARIABLES
        // ==========================================================
        const FORM_STATE_KEY = 'posttestQuiz';
        let questions = [],
            quizSettings = {},
            posttestQuiz = null,
            posttestTimer = null;

        // ==========================================================
        //   UTILITY & CACHE LOCAL
        // ==========================================================
        function escapeHtmlLocal(str) {
            return escapeHtml(str);
        }

        function showToastLocal(message, type) {
            showToast(message, type);
        }

        function getCache(key, maxAgeMinutes) {
            try {
                const item = localStorage.getItem('pkd_cache_' + key);
                if (!item) return null;
                const { data, timestamp } = JSON.parse(item);
                if ((Date.now() - timestamp) > maxAgeMinutes * 60 * 1000) {
                    localStorage.removeItem('pkd_cache_' + key);
                    return null;
                }
                return data;
            } catch (e) { return null; }
        }

        function setCache(key, data) {
            try {
                localStorage.setItem('pkd_cache_' + key, JSON.stringify({ data, timestamp: Date.now() }));
            } catch (e) { /* ignore */ }
        }

        function saveQuizState(state) {
            try { localStorage.setItem(FORM_STATE_KEY, JSON.stringify(state)); } catch (e) {}
        }

        function loadQuizState() {
            try { const saved = localStorage.getItem(FORM_STATE_KEY); return saved ? JSON.parse(saved) : null; } catch (e) {
                return null; }
        }

        function clearQuizState() {
            try { localStorage.removeItem(FORM_STATE_KEY); } catch (e) {}
        }

        // ==========================================================
        //   🔥 RENDER SKELETON FORM (Tampilan INSTAN saat DOM siap)
        // ==========================================================
        function renderSkeletonForm(container) {
            if (!container) return;
            console.log("🟡 Menampilkan SKELETON Posttest...");
            let html = `
                <div class="glass-card" style="background: #f8fafc; padding: 1.5rem;">
                    <h4 class="mb-4">📝 Memuat data posttest...</h4>
                    <div class="mb-3">
                        <div class="skeleton-box" style="height: 16px; width: 100px; margin-bottom: 6px;"></div>
                        <div class="skeleton-box" style="height: 40px; width: 100%; border-radius: 8px;"></div>
                    </div>
                    <div class="mb-3">
                        <div class="skeleton-box" style="height: 16px; width: 100px; margin-bottom: 6px;"></div>
                        <div class="skeleton-box" style="height: 40px; width: 100%; border-radius: 8px;"></div>
                    </div>
                    <div class="mb-3">
                        <div class="skeleton-box" style="height: 16px; width: 100px; margin-bottom: 6px;"></div>
                        <div class="skeleton-box" style="height: 80px; width: 100%; border-radius: 8px;"></div>
                    </div>
                    <div class="text-center mt-4">
                        <div class="skeleton-box" style="height: 48px; width: 180px; border-radius: 50px;"></div>
                    </div>
                </div>
            `;
            container.innerHTML = html;
            container.classList.add('fade-up');
        }

        // ==========================================================
        //   RENDER FORM DATA DIRI
        // ==========================================================
        function renderFormDataDiri() {
            const container = document.getElementById('posttestContainer');
            if (!questions || questions.length === 0) {
                container.innerHTML = `
                    <div class="alert alert-warning text-center glass-card">
                        <i class="bi bi-exclamation-triangle fs-4"></i>
                        <p class="mt-2 mb-0">Belum ada soal posttest yang tersedia.</p>
                    </div>
                `;
                return;
            }

            const saved = loadQuizState();
            let nama = saved?.nama || '',
                nohp = saved?.nohp || '',
                alamat = saved?.alamat || '';

            let html = `
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div><span class="text-muted small">Status: </span><span class="badge bg-success text-white">✅ ${questions.length} soal siap</span></div>
                    <button class="btn btn-sm btn-outline-secondary" id="inlineRefreshBtn"><i class="bi bi-arrow-clockwise me-1"></i> Segarkan</button>
                </div>
                <div class="glass-card" style="background: #f8fafc; padding: 1.5rem;">
                    <h4 class="mb-4">📝 Isi Data Diri untuk Memulai Posttest</h4>
                    <div class="mb-3"><label class="form-label fw-bold">Nama Lengkap</label><input type="text" class="form-control" id="posttestNama" value="${escapeHtmlLocal(nama)}" placeholder="Masukkan nama lengkap" required></div>
                    <div class="mb-3"><label class="form-label fw-bold">Nomor HP</label><input type="tel" class="form-control" id="posttestNohp" value="${escapeHtmlLocal(nohp)}" placeholder="Masukkan nomor HP" required></div>
                    <div class="mb-3"><label class="form-label fw-bold">Alamat</label><textarea class="form-control" id="posttestAlamat" rows="2" placeholder="Masukkan alamat" required>${escapeHtmlLocal(alamat)}</textarea></div>
                    <div class="text-center mt-4"><button id="startPosttestBtn" class="btn btn-primary btn-lg rounded-pill px-5">🚀 Mulai Posttest</button></div>
                </div>
            `;
            container.innerHTML = html;
            container.classList.add('fade-up');

            document.getElementById('startPosttestBtn').addEventListener('click', function() {
                const nama = document.getElementById('posttestNama').value.trim();
                const nohp = document.getElementById('posttestNohp').value.trim();
                const alamat = document.getElementById('posttestAlamat').value.trim();
                if (!nama || !nohp || !alamat) { showToastLocal('Nama, No HP, dan Alamat wajib diisi!', 'danger'); return; }
                posttestQuiz = {
                    questions,
                    currentIndex: 0,
                    score: 0,
                    answers: [],
                    timer: null,
                    timerDuration: 30,
                    timeLeft: 0,
                    nama,
                    nohp,
                    alamat,
                    started: true,
                    isFinished: false,
                    settings: quizSettings
                };
                saveQuizState(posttestQuiz);
                renderPosttestQuestion();
            });

            document.getElementById('inlineRefreshBtn')?.addEventListener('click', function() {
                this.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Memuat...';
                this.disabled = true;
                getPosttestQuestions().then(freshQuestions => {
                    if (freshQuestions && Array.isArray(freshQuestions) && freshQuestions.length > 0) {
                        questions = freshQuestions;
                        renderFormDataDiri();
                        showToastLocal('Data berhasil diperbarui', 'success');
                    } else {
                        showToastLocal('Data di API kosong, mempertahankan data lokal', 'info');
                    }
                }).catch(e => showToastLocal('Gagal refresh data: ' + e.message, 'error')).finally(() => {
                    this.innerHTML = '<i class="bi bi-arrow-clockwise me-1"></i> Segarkan';
                    this.disabled = false;
                });
            });

            if (saved && !saved.isFinished && saved.started) {
                if (confirm('Anda memiliki Posttest yang belum selesai. Lanjutkan?')) {
                    posttestQuiz = saved;
                    posttestQuiz.settings = quizSettings;
                    posttestQuiz.questions = questions;
                    renderPosttestQuestion();
                    return;
                } else { clearQuizState(); }
            }
        }

        // ==========================================================
        //   RENDER PERTANYAAN
        // ==========================================================
        function renderPosttestQuestion() {
            const container = document.getElementById('posttestContainer');
            const quiz = posttestQuiz;
            if (!quiz) return;
            if (!quiz.started) { renderFormDataDiri(); return; }
            if (quiz.currentIndex >= quiz.questions.length) { renderPosttestSummary(); return; }

            const q = quiz.questions[quiz.currentIndex];
            const timerValue = (q.timer_enabled ? q.timer_duration : 30) || 30;

            let html = `
                <div class="glass-card" style="background: #f8fafc; padding: 1.5rem;">
                    <div class="quiz-header">
                        <div class="timer-box"><i class="bi bi-hourglass-split"></i> <span id="timerDisplay">${timerValue}</span> detik</div>
                        <div class="score-box"><i class="bi bi-star-fill"></i> Skor: ${quiz.score}</div>
                        <div class="progress-box"><i class="bi bi-list-ol"></i> ${quiz.currentIndex + 1}/${quiz.questions.length}</div>
                    </div>
                    <div class="mb-3 small text-muted">Nama: ${escapeHtmlLocal(quiz.nama)} | No HP: ${escapeHtmlLocal(quiz.nohp)} | Alamat: ${escapeHtmlLocal(quiz.alamat)}</div>
                    <div class="question-text">${quiz.currentIndex + 1}. ${q.teks}</div>
                    <div class="kahoot-options-grid">
                `;
            (q.opsi || []).forEach((ops, i) => {
                const colors = ['opt-red', 'opt-blue', 'opt-yellow', 'opt-green'];
                const isAnswered = quiz.answers[quiz.currentIndex] !== undefined;
                const disabled = isAnswered ? 'disabled' : '';
                html += `<button type="button" class="option-btn kahoot-option ${colors[i % 4]}" data-qid="${q.id}" data-opt-index="${i}" ${disabled}><span class="opt-letter">${String.fromCharCode(65 + i)}.</span> <span class="opt-text">${ops}</span></button>`;
            });
            html += `</div>`;
            if (quiz.answers[quiz.currentIndex] !== undefined) {
                html += `<div class="mt-4 text-center"><button id="nextPosttestBtn" class="btn btn-primary btn-lg rounded-pill px-5">Selanjutnya ➡️</button></div>`;
            }
            html += `</div>
                <div class="progress-thin mt-3"><div class="progress-bar" style="width: ${((quiz.currentIndex + 1) / quiz.questions.length) * 100}%;"></div></div>
                `;
            container.innerHTML = html;
            container.classList.add('fade-up');

            document.querySelectorAll('.kahoot-option').forEach(btn => {
                btn.addEventListener('click', function() {
                    if (quiz.answers[quiz.currentIndex] !== undefined) return;
                    const qid = parseInt(this.dataset.qid);
                    const optIdx = parseInt(this.dataset.optIndex);
                    const isCorrect = (optIdx === q.jawaban);
                    if (isCorrect) {
                        quiz.score += 10;
                        this.classList.add('correct');
                    } else {
                        this.classList.add('wrong');
                        const correctBtn = document.querySelector(
                            `.kahoot-option[data-qid="${qid}"][data-opt-index="${q.jawaban}"]`);
                        if (correctBtn) correctBtn.classList.add('correct');
                    }
                    quiz.answers[quiz.currentIndex] = { questionId: qid, selectedOption: optIdx, isCorrect };
                    saveQuizState(quiz);
                    setTimeout(() => {
                        renderPosttestQuestion();
                    }, 1000);
                });
            });

            const nextBtn = document.getElementById('nextPosttestBtn');
            if (nextBtn) nextBtn.addEventListener('click', nextPosttestQuestion);

            if (quiz.answers[quiz.currentIndex] === undefined) {
                let timeLeft = timerValue;
                updateTimerDisplay(timeLeft);
                if (posttestTimer) clearInterval(posttestTimer);
                posttestTimer = setInterval(() => {
                    timeLeft -= 1;
                    updateTimerDisplay(timeLeft);
                    if (timeLeft <= 0) {
                        clearInterval(posttestTimer);
                        posttestTimer = null;
                        if (quiz.answers[quiz.currentIndex] === undefined) {
                            quiz.answers[quiz.currentIndex] = { questionId: q.id, selectedOption: null, isCorrect: false };
                            saveQuizState(quiz);
                            renderPosttestQuestion();
                        }
                    }
                }, 1000);
            }
        }

        function updateTimerDisplay(seconds) {
            const el = document.getElementById('timerDisplay');
            if (el) el.innerText = seconds;
        }

        function nextPosttestQuestion() {
            if (!posttestQuiz) return;
            posttestQuiz.currentIndex++;
            saveQuizState(posttestQuiz);
            renderPosttestQuestion();
        }

        // ==========================================================
        //   RENDER SUMMARY
        // ==========================================================
        function renderPosttestSummary() {
            const quiz = posttestQuiz;
            if (!quiz) return;
            quiz.isFinished = true;
            saveQuizState(quiz);

            const total = quiz.questions.length;
            const correct = quiz.answers.filter(a => a && a.isCorrect).length;
            const score = quiz.score;

            let html = `
                <div class="glass-card text-center" style="background: #f8fafc; padding: 1.5rem;">
                    <h3 class="mb-4">🎉 Posttest Selesai! 🎉</h3>
                    <div class="display-1 mb-3">${score}</div>
                    <p class="lead">Jawaban benar: ${correct} dari ${total}</p>
                    <p><strong>Nama:</strong> ${escapeHtmlLocal(quiz.nama || '')}</p>
                    <p><strong>No HP:</strong> ${escapeHtmlLocal(quiz.nohp || '')}</p>
                    <p><strong>Alamat:</strong> ${escapeHtmlLocal(quiz.alamat || '')}</p>
                    <hr>
                    <button id="submitPosttestResultBtn" class="btn btn-primary btn-lg rounded-pill px-5 mt-3">✅ Kumpulkan Posttest</button>
                    <button id="restartPosttestBtn" class="btn btn-outline-secondary btn-lg rounded-pill px-5 mt-3 ms-2">🔄 Ulangi</button>
                </div>
            `;
            document.getElementById('posttestContainer').innerHTML = html;

            document.getElementById('submitPosttestResultBtn').addEventListener('click', async function() {
                try {
                    const answers = JSON.stringify(quiz.answers.map(a => ({ qid: a.questionId, selected: a.selectedOption, correct: a.isCorrect })));
                    await submitPosttest(quiz.nama, quiz.nohp, quiz.alamat, answers, quiz.score);
                    showToastLocal('✅ Posttest berhasil dikirim!', 'success');
                    clearQuizState();
                    location.reload();
                } catch (e) { showToastLocal('❌ Gagal mengirim: ' + e.message, 'danger'); }
            });

            document.getElementById('restartPosttestBtn').addEventListener('click', function() {
                clearQuizState();
                location.reload();
            });
        }

        // ==========================================================
        //   LOAD MAIN DATA (CACHE INSTAN + BACKGROUND SYNC)
        // ==========================================================
        async function loadMainData() {
            const container = document.getElementById('posttestContainer');
            const CACHE_KEY = 'posttest_data';
            const CACHE_AGE = 10; // menit

            // 1. Cek cache lokal
            let cachedData = getCache(CACHE_KEY, CACHE_AGE);

            // 2. Jika ada cache, langsung render data asli (menimpa skeleton)
            if (cachedData) {
                questions = cachedData.questions;
                quizSettings = cachedData.settings;
                renderFormDataDiri();
            }

            // 3. Fetch data dari API di LATAR BELAKANG
            (async function refreshData() {
                try {
                    const freshQuestions = await getPosttestQuestions();
                    const q = Array.isArray(freshQuestions) ? freshQuestions : (freshQuestions?.data || []);
                    // Quiz settings tidak digunakan di posttest, tapi kita tetap ambil
                    // const freshSettings = await getQuizSettings(); // tidak diimpor, skip

                    if (q.length > 0) {
                        setCache(CACHE_KEY, { questions: q, settings: {} });
                        if (JSON.stringify(questions) !== JSON.stringify(q)) {
                            questions = q;
                            if (!posttestQuiz || !posttestQuiz.started) {
                                renderFormDataDiri();
                            }
                        }
                    } else {
                        if (!cachedData || cachedData.questions.length === 0) {
                            renderFormDataDiri();
                        }
                    }
                } catch (e) {
                    console.warn('Gagal fetch posttest di background:', e);
                    if (!cachedData || cachedData.questions.length === 0) {
                        renderFormDataDiri();
                    }
                }
            })();
        }

        // ==========================================================
        //   🛡️ GUARD PUBLIC ACCESS & BOOT
        // ==========================================================
        (async function boot() {
            const canAccess = await guardPublicAccess();
            if (!canAccess) return;

            // Update navbar user
            updateNavbarMenu();

            await loadMainData();
        })();

        // ==========================================================
        //   🔥 PERBAIKAN UTAMA: SKELETON MUNCUL SEBELUM KODE LAIN
        // ==========================================================
        document.addEventListener('DOMContentLoaded', function() {
            // Render skeleton secara instan (sinkron) saat DOM siap
            const container = document.getElementById('posttestContainer');
            if (container) {
                renderSkeletonForm(container);
            }
        });

    </script>
</body>
</html>
