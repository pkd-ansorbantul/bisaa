<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>Tanda Tangan Digital - Instruktur · PKD GP Ansor Bantul</title>

  <!-- Favicon & Font -->
  <link rel="icon" type="image/png" href="/bisaa/LOGO%20ANSOR.webp">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <!-- Bootstrap 5 + Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Signature Pad -->
  <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>

  <style>
    /* ===== UNIVERSAL PREMIUM (GLASSMORPHISM) ===== */
    * { font-family: 'Inter', system-ui, sans-serif; }
    body {
      background: #f8fafc;
      color: #0f172a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* --- HEADER MINIMALIS ELEGAN --- */
    .header-minimal {
      background: rgba(255, 255, 255, 0.72) !important;
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.3);
      z-index: 1030;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.04);
      padding-top: 0 !important;
      padding-bottom: 0 !important;
    }
    .header-minimal .container {
      padding-top: 0.75rem;
      padding-bottom: 0.75rem;
    }
    .btn-back {
      background: rgba(37, 99, 235, 0.08);
      color: #2563eb;
      border: 1px solid rgba(37, 99, 235, 0.2);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .btn-back:hover {
      background: #2563eb;
      color: white;
      transform: translateX(-3px);
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
    }
    .brand-logo-mini { 
      height: 40px; 
      width: auto; 
      margin-right: 14px; 
      transition: transform 0.2s;
    }
    .brand-logo-mini:hover { transform: scale(1.05); }
    .brand-title-mini { 
      font-weight: 700; 
      color: #0a3d62; 
      font-size: 1.3rem; 
      line-height: 1.2; 
      letter-spacing: -0.02em;
    }
    .brand-sub-mini { 
      font-size: 0.8rem; 
      color: #64748b; 
      display: block; 
      margin-top: 0px; 
      letter-spacing: 0.02em;
    }

    #navbarUserMenu { display: flex; align-items: center; gap: 8px; }
    .user-menu-area .dropdown-toggle { border-radius: 50px; padding: 0.3rem 1rem; font-size: 0.9rem; }
    .user-menu-area .btn-outline-primary { border-radius: 50px; padding: 0.3rem 1.2rem; font-size: 0.9rem; }

    /* --- GLASS CARD --- */
    .glass-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px) saturate(180%);
      -webkit-backdrop-filter: blur(12px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
      transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .glass-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 50px rgba(37, 99, 235, 0.08);
      border-color: rgba(37, 99, 235, 0.2);
    }

    /* --- SIGNATURE AREA --- */
    .signature-area {
      border: 2px dashed #cbd5e1;
      border-radius: 20px;
      background: white;
      padding: 12px;
      transition: border-color 0.2s;
    }
    .signature-area:hover { border-color: #2563eb; }
    .signature-area canvas {
      width: 100%;
      height: auto;
      max-width: 300px;
      max-height: 150px;
      background: white;
      display: block;
      border-radius: 12px;
      margin: 0 auto;
      touch-action: none;
    }

    /* --- QR & IMAGE --- */
    .saved-signature-img {
      max-height: 80px;
      max-width: 200px;
      object-fit: contain;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 4px;
      background: white;
      margin-bottom: 10px;
    }
    .qr-container {
      margin-top: 10px;
      text-align: center;
    }
    .qr-container img {
      width: 120px;
      height: 120px;
      border-radius: 8px;
      border: 1px solid #ddd;
      padding: 4px;
      background: white;
    }

    /* --- ANIMASI --- */
    .fade-up { animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    /* --- FOOTER --- */
    .footer-modern {
      font-size: 0.85rem;
      color: #64748b;
      margin-top: auto;
      text-align: center;
      padding: 1.5rem 0;
      border-top: 1px solid #e2e8f0;
      background: white;
    }

    /* --- RESPONSIF --- */
    @media (max-width: 576px) {
      .glass-card { border-radius: 16px; padding: 1rem !important; }
      .header-minimal .container { padding: 0 0.5rem; }
      .btn-back { font-size: 0.8rem; padding: 0.2rem 0.8rem; }
      .brand-title-mini { display: none; }
      .brand-sub-mini { display: none; }
      .user-menu-area .dropdown-toggle { font-size: 0.75rem; padding: 0.2rem 0.8rem; }
      .signature-area canvas { max-width: 100%; }
    }
  </style>
</head>
<body>

  <!-- ================= HEADER MINIMALIS ELEGAN ================= -->
  <header class="header-minimal sticky-top shadow-sm">
    <div class="container d-flex justify-content-between align-items-center py-3">
      <div class="d-flex align-items-center gap-2">
        <a href="/bisaa/index.html" class="btn btn-back rounded-pill">
          <i class="bi bi-arrow-left me-1"></i> Kembali
        </a>
        <a href="/bisaa/index.html" class="brand-minimal text-decoration-none d-flex align-items-center ms-1">
          <img src="/bisaa/LOGO%20ANSOR.webp" alt="GP Ansor" class="brand-logo-mini">
          <div>
            <div class="brand-title-mini">PKD GP Ansor</div>
            <span class="brand-sub-mini">Kabupaten Bantul</span>
          </div>
        </a>
      </div>
      <!-- Area User Role (diisi oleh api.js) -->
      <div id="navbarUserMenu" class="user-menu-area"></div>
    </div>
  </header>

  <!-- ================= KONTEN UTAMA ================= -->
  <div id="contentArea" class="container" style="padding: 2rem 0; max-width: 700px;">
    <div class="glass-card p-4 fade-up">
      <h2 class="section-title"><i class="bi bi-pencil-square me-2"></i>Tanda Tangan Digital</h2>
      <h5 class="text-muted text-center mb-4">Instruktur PKD GP Ansor Kabupaten Bantul</h5>

      <form id="signForm">
        <!-- Nama -->
        <div class="mb-3">
          <label class="form-label fw-bold">Nama Lengkap <span class="text-danger">*</span></label>
          <input type="text" class="form-control" id="nama" value="Cahyo Galih" placeholder="Masukkan nama lengkap" required>
        </div>

        <!-- Kegunaan (Dropdown + Manual Input) -->
        <div class="mb-3">
          <label class="form-label fw-bold">Kegunaan Tanda Tangan</label>
          <select class="form-select" id="kegunaan">
            <option value="Untuk verifikasi sertifikat PKD Dlingo">Untuk verifikasi sertifikat PKD Dlingo</option>
            <option value="Untuk keperluan administrasi umum">Untuk keperluan administrasi umum</option>
            <option value="Untuk keperluan verifikasi kehadiran">Untuk keperluan verifikasi kehadiran</option>
            <option value="Lainnya">Lainnya</option>
          </select>
          <!-- Input Manual jika memilih Lainnya -->
          <div id="kegunaanLainnyaWrapper" style="display:none; margin-top: 8px;">
            <input type="text" class="form-control" id="kegunaanLainnya" placeholder="Tulis kegunaan lainnya...">
          </div>
          <div class="form-text text-muted">Isikan secara manual keperluan atau alasan tanda tangan ini.</div>
        </div>

        <!-- Password -->
        <div class="mb-3">
          <label class="form-label fw-bold">Password Verifikasi <span class="text-danger">*</span></label>
          <div class="input-group">
            <input type="password" class="form-control" id="password" placeholder="Masukkan password Anda" required>
            <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('password')">
              <i class="bi bi-eye"></i>
            </button>
          </div>
          <div class="form-text text-muted">Password digunakan untuk verifikasi internal.</div>
        </div>

        <!-- Tanda tangan -->
        <div class="mb-3">
          <label class="form-label fw-bold">✍️ Tanda Tangan Digital <span class="text-danger">*</span></label>
          <div class="signature-area">
            <canvas id="signatureCanvas"></canvas>
          </div>
          <div class="mt-2 d-flex gap-2">
            <button type="button" class="btn btn-outline-secondary btn-sm" id="clearSignature">Hapus</button>
            <button type="button" class="btn btn-outline-primary btn-sm" id="undoSignature">Undo</button>
          </div>
        </div>

        <!-- Tombol submit -->
        <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill fw-semibold shadow-sm">
          <i class="bi bi-cloud-upload me-2"></i>Kirim Tanda Tangan
        </button>

        <!-- Status -->
        <div id="status" class="mt-3"></div>
      </form>
    </div>
  </div>

  <!-- ================= FOOTER ================= -->
  <footer class="footer-modern container">
    <div class="d-flex justify-content-center align-items-center gap-2">
      <i class="bi bi-c-circle"></i>
      <span>Hak Cipta 2026 - Tim Instruktur GP Ansor Kabupaten Bantul</span>
    </div>
  </footer>

  <!-- ================= TOAST ================= -->
  <div class="toast-container position-fixed top-0 end-0 p-3">
    <div id="notificationToast" class="toast border-0 shadow-lg" role="alert" data-bs-delay="3000">
      <div class="toast-header bg-white border-0">
        <i class="bi me-2" id="toastIcon"></i>
        <strong class="me-auto" id="toastTitle">Berhasil</strong>
        <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
      </div>
      <div class="toast-body" id="toastMessage"></div>
    </div>
  </div>

  <!-- ================= SCRIPTS ================= -->
  <!-- Library Eksternal (tetap sebagai script biasa) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Modul ES Khusus Halaman Ini -->
  <script type="module">
    // ==========================================================
    //   IMPOR DARI CORE API (ES Modules)
    // ==========================================================
    import {
      guardPublicAccess,
      callApi,
      showToast,
      getUserRole,
      updateNavbarMenu
    } from './js/core/api.js';

    // ==========================================================
    //   STATE & VARIABLES
    // ==========================================================
    let sigPad = null;
    const canvas = document.getElementById('signatureCanvas');

    // ==========================================================
    //   TOGGLE PASSWORD (diekspos ke global agar onclick berfungsi)
    // ==========================================================
    window.togglePassword = function(id) {
      const input = document.getElementById(id);
      if (input) input.type = input.type === 'password' ? 'text' : 'password';
    };

    // ==========================================================
    //   SIGNATURE PAD
    // ==========================================================
    function initSignaturePad() {
      if (!canvas) return;
      if (sigPad) { sigPad.clear(); sigPad = null; }
      sigPad = new SignaturePad(canvas, {
        backgroundColor: 'white',
        penColor: '#0f172a',
        minWidth: 1.5,
        maxWidth: 3
      });
      sigPad.clear();

      document.getElementById('clearSignature').addEventListener('click', function() {
        sigPad.clear();
      });

      document.getElementById('undoSignature').addEventListener('click', function() {
        const data = sigPad.toData();
        if (data && data.length > 0) {
          data.pop();
          sigPad.fromData(data);
        }
      });

      // Resize canvas untuk DPI
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);
    }

    function resizeCanvas() {
      if (!canvas) return;
      const rect = canvas.getBoundingClientRect();
      const ratio = Math.max(window.devicePixelRatio || 1, 1);
      canvas.width = rect.width * ratio;
      canvas.height = rect.height * ratio;
      const ctx = canvas.getContext('2d');
      ctx.scale(ratio, ratio);
      if (sigPad) sigPad.clear();
    }

    // ==========================================================
    //   SUBMIT FORM
    // ==========================================================
    function initSignatureForm() {
      initSignaturePad();

      // --- LOGIKA DROPDOWN KEGUNAAN ---
      const kegunaanSelect = document.getElementById('kegunaan');
      const kegunaanLainnyaWrapper = document.getElementById('kegunaanLainnyaWrapper');
      
      kegunaanSelect.addEventListener('change', function() {
        if (this.value === 'Lainnya') {
          kegunaanLainnyaWrapper.style.display = 'block';
        } else {
          kegunaanLainnyaWrapper.style.display = 'none';
        }
      });

      // --- SUBMIT FORM ---
      document.getElementById('signForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const nama = document.getElementById('nama').value.trim();
        const password = document.getElementById('password').value.trim();
        const statusDiv = document.getElementById('status');

        // --- PERBAIKAN: Ambil nilai kegunaan ---
        let kegunaan = kegunaanSelect.value;
        if (kegunaan === 'Lainnya') {
          kegunaan = document.getElementById('kegunaanLainnya').value.trim();
          if (!kegunaan) {
            statusDiv.innerHTML = '<div class="alert alert-danger">Harap isi kegunaan manual jika memilih Lainnya.</div>';
            return;
          }
        }

        if (!nama || !password) {
          statusDiv.innerHTML = '<div class="alert alert-danger">Nama dan password wajib diisi.</div>';
          return;
        }

        if (!sigPad || sigPad.isEmpty()) {
          statusDiv.innerHTML = '<div class="alert alert-danger">Tanda tangan wajib diisi.</div>';
          return;
        }

        const signatureDataURL = sigPad.toDataURL('image/jpeg', 0.2);

        const btn = this.querySelector('button[type="submit"]');
        const originalText = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Mengirim...';
        statusDiv.innerHTML = '';

        try {
          const result = await callApi('submitDigitalSignature', {
            role: 'instruktur',
            nama: nama,
            signature: signatureDataURL,
            password: password,
            peserta_nama: '',
            kegunaan: kegunaan // Kirim kegunaan ke backend
          }, 'POST');

          if (result.success) {
            const driveId = result.driveId || '';
            const verifyUrl = `/bisaa/verify_signature.html?role=instruktur&driveId=${driveId}`;

            // QR Code menuju verifikasi_qr.html (persetujuan)
            const qrUrl = `https://quickchart.io/qr?text=${encodeURIComponent('/bisaa/verifikasi_qr.html?role=instruktur&nama=' + encodeURIComponent(nama))}&size=120&ecLevel=L`;

            statusDiv.innerHTML = `
              <div class="alert alert-success">
                <i class="bi bi-check-circle-fill me-2"></i>
                <strong>✅ Tanda tangan digital berhasil disimpan!</strong>
                ${kegunaan ? `<p class="mt-2 mb-0"><strong>Kegunaan:</strong> ${kegunaan}</p>` : ''}
              </div>
              <div class="text-center mt-3">
                <h6 class="fw-bold">Tanda Tangan Tersimpan</h6>
                ${driveId ? `<img src="https://drive.google.com/thumbnail?id=${driveId}&sz=w200" class="saved-signature-img" alt="Tanda tangan">` : ''}
              </div>
              <div class="text-center mt-3">
                <h6 class="fw-bold">QR Code Verifikasi Persetujuan</h6>
                <div class="qr-container">
                  <img src="${qrUrl}" alt="QR Verifikasi">
                </div>
                <p class="small text-muted mt-2">
                  Scan QR code ini untuk melihat persetujuan anda.<br>
                  <a href="${qrUrl}" target="_blank" class="btn btn-sm btn-outline-primary mt-1">Buka QR di tab baru</a>
                </p>
              </div>
              <div class="text-center mt-3">
                <a href="${verifyUrl}" target="_blank" class="btn btn-sm btn-outline-success">
                  <i class="bi bi-shield-check me-1"></i> Verifikasi Tanda Tangan (Gambar)
                </a>
              </div>
            `;

            sigPad.clear();
            document.getElementById('password').value = '';
            document.getElementById('kegunaan').value = 'Untuk verifikasi sertifikat PKD Dlingo';
            document.getElementById('kegunaanLainnya').value = '';
            kegunaanLainnyaWrapper.style.display = 'none';
            showToast('Tanda tangan Instruktur tersimpan', 'success');
          } else {
            statusDiv.innerHTML = `<div class="alert alert-danger">${result.error || 'Gagal menyimpan tanda tangan.'}</div>`;
          }
        } catch (err) {
          statusDiv.innerHTML = `<div class="alert alert-danger">Error: ${err.message}</div>`;
        } finally {
          btn.disabled = false;
          btn.innerHTML = originalText;
        }
      });
    }

    // ==========================================================
    //   🛡️ GUARD PUBLIC ACCESS & BOOT
    // ==========================================================
    (async function boot() {
      // Halaman publik, tidak perlu guard strict, tapi jika sudah login sebagai admin/ketua_pac/member tetap redirect
      const role = getUserRole();
      if (role === 'admin') {
        window.location.href = '/bisaa/admin/dashboard_admin.html';
        return;
      } else if (role === 'ketua_pac') {
        // Tetap di halaman ini, tapi kita tampilkan info
      } else if (role === 'member') {
        window.location.href = '/bisaa/member.html';
        return;
      }

      // Cek akses publik (jika mode login diaktifkan)
      const canAccess = await guardPublicAccess();
      if (!canAccess) return;

      // Update navbar user menu
      updateNavbarMenu();

      // Inisialisasi form
      initSignatureForm();
    })();

  </script>
</body>
</html>
