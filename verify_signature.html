<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>Verifikasi Tanda Tangan Digital - PKD GP Ansor</title>

  <!-- Favicon & Font -->
  <link rel="icon" type="image/png" href="/bisaa/LOGO%20ANSOR.webp">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">

  <!-- Bootstrap 5 + Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- JsBarcode untuk generate barcode -->
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>

  <style>
    /* --- HEADER MINIMALIS ELEGAN (DIPERBESAR) --- */
    .header-minimal {
      background: rgba(255, 255, 255, 0.72) !important;
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.3);
      z-index: 1030;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.04);
      padding-top: 0 !important;
      padding-bottom: 0 !important;
    }
    .header-minimal .container {
      padding-top: 0.75rem;
      padding-bottom: 0.75rem;
    }
    .brand-logo-mini { height: 40px; width: auto; margin-right: 14px; transition: transform 0.2s; }
    .brand-logo-mini:hover { transform: scale(1.05); }
    .brand-title-mini { font-weight: 700; color: #0a3d62; font-size: 1.3rem; line-height: 1.2; letter-spacing: -0.02em; }
    .brand-sub-mini { font-size: 0.8rem; color: #64748b; display: block; margin-top: 0px; letter-spacing: 0.02em; }

    #navbarUserMenu { display: flex; align-items: center; gap: 8px; }
    .user-menu-area .dropdown-toggle { border-radius: 50px; padding: 0.3rem 1rem; font-size: 0.9rem; }
    .user-menu-area .btn-outline-primary { border-radius: 50px; padding: 0.3rem 1.2rem; font-size: 0.9rem; }

    /* ===== KONTEN ===== */
    * {
      font-family: 'Inter', system-ui, sans-serif;
    }
    body {
      background: #f8fafc;
      color: #0f172a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .container-card {
      max-width: 700px;
      background: white;
      border-radius: 32px;
      padding: 2rem;
      margin: 30px auto;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
      border: 1px solid rgba(226, 232, 240, 0.6);
    }

    .section-title {
      font-weight: 650;
      font-size: 1.75rem;
      margin-bottom: 1.8rem;
      color: #0f172a;
      border-left: 6px solid #2563eb;
      padding-left: 1.2rem;
    }

    .signature-img {
      max-width: 250px;
      max-height: 150px;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      padding: 8px;
      background: white;
      object-fit: contain;
    }

    .btn-rounded {
      border-radius: 9999px;
      padding: 0.6rem 2rem;
      font-weight: 600;
    }

    .footer-modern {
      font-size: 0.85rem;
      color: #64748b;
      margin-top: auto;
      text-align: center;
      padding: 1.5rem 0;
      border-top: 1px solid #e2e8f0;
      background: white;
    }

    .barcode-container {
      display: inline-block;
      background: white;
      padding: 5px;
      border: 1px solid #ddd;
      border-radius: 4px;
    }

    .approval-badge {
      font-size: 1.1rem;
      padding: 0.5rem 1.5rem;
      border-radius: 50px;
    }

    .detail-item {
      border-bottom: 1px solid #f1f5f9;
      padding: 0.5rem 0;
    }
    .detail-item:last-child {
      border-bottom: none;
    }

    @media (max-width: 576px) {
      .container-card {
        padding: 1.5rem;
      }
      .brand-title-mini { display: none; }
      .brand-sub-mini { display: none; }
    }
  </style>
</head>
<body>

  <!-- ================= HEADER ELEGAN ================= -->
  <header class="header-minimal sticky-top shadow-sm">
    <div class="container d-flex justify-content-between align-items-center py-3">
      <div class="d-flex align-items-center gap-2">
        <a href="/bisaa/index.html" class="brand-minimal text-decoration-none d-flex align-items-center">
          <img src="/bisaa/LOGO%20ANSOR.webp" alt="GP Ansor" class="brand-logo-mini">
          <div>
            <div class="brand-title-mini">PKD GP Ansor</div>
            <span class="brand-sub-mini">Kabupaten Bantul</span>
          </div>
        </a>
      </div>
      <!-- Area User Role (diisi oleh api.js) -->
      <div id="navbarUserMenu" class="user-menu-area"></div>
    </div>
  </header>

  <!-- ================= KONTEN UTAMA ================= -->
  <div class="container container-card">
    <h2 class="section-title"><i class="bi bi-shield-check me-2"></i>Verifikasi Tanda Tangan Digital</h2>
    <p class="text-muted text-center mb-4">Memverifikasi keaslian tanda tangan digital Ketua PC / Sekretaris / Instruktur PKD</p>

    <div id="verificationContent">
      <div class="text-center py-5">
        <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
          <span class="visually-hidden">Memverifikasi...</span>
        </div>
        <p class="mt-3 text-muted">Memverifikasi tanda tangan digital...</p>
      </div>
    </div>
  </div>

  <!-- ================= FOOTER ================= -->
  <footer class="footer-modern container">
    <i class="bi bi-c-circle"></i> 2026 · Tim Instruktur GP Ansor Kabupaten Bantul
  </footer>

  <!-- ================= SCRIPTS ================= -->
  <!-- Library Eksternal (tetap sebagai script biasa) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Modul ES Khusus Halaman Ini -->
  <script type="module">
    // ==========================================================
    //   IMPOR DARI CORE API (ES Modules)
    // ==========================================================
    import {
      callApi,
      escapeHtml,
      updateNavbarMenu
    } from './js/core/api.js';

    // ==========================================================
    //   AMBIL PARAMETER DARI URL
    // ==========================================================
    function getQueryParam(param) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(param);
    }

    // ==========================================================
    //   RENDER HASIL VERIFIKASI
    // ==========================================================
    function renderVerificationResult(data, role, driveId) {
      const container = document.getElementById('verificationContent');

      const roleLabels = {
        'ketua_pc': 'Ketua PC GP Ansor Kabupaten Bantul',
        'sekretaris': 'Sekretaris PC GP Ansor Kabupaten Bantul',
        'instruktur': 'Instruktur PKD GP Ansor Kabupaten Bantul'
      };
      const roleLabel = roleLabels[role] || role;

      // Format timestamp
      let timestampDisplay = 'Tidak tersedia';
      if (data.timestamp) {
        try {
          const date = new Date(data.timestamp);
          timestampDisplay = date.toLocaleString('id-ID', {
            day: 'numeric', month: 'long', year: 'numeric',
            hour: '2-digit', minute: '2-digit'
          });
        } catch (e) {
          timestampDisplay = data.timestamp;
        }
      }

      // Kegunaan
      const kegunaan = data.kegunaan || 'Tidak ada keterangan';

      // Nama peserta (jika ada)
      const pesertaNama = data.peserta_nama || '-';

      // Gambar tanda tangan
      const imgUrl = driveId ? `https://drive.google.com/thumbnail?id=${driveId}&sz=w400` : '';

      // Data untuk barcode (verifikasi)
      const barcodeData = JSON.stringify({
        role: role,
        nama: data.nama,
        driveId: driveId,
        timestamp: data.timestamp,
        kegunaan: kegunaan
      });
      const barcodeId = 'barcode-' + Date.now();

      let html = `
        <div class="alert alert-success fw-bold text-center mb-4">
          <i class="bi bi-check-circle-fill me-2"></i>✅ Tanda tangan digital VALID
        </div>

        <div class="card border-0 shadow-sm mb-4">
          <div class="card-body p-4">
            <div class="row align-items-center">
              <div class="col-md-5 text-center mb-3 mb-md-0">
                ${imgUrl ? `<img src="${imgUrl}" class="signature-img" alt="Tanda Tangan">` : '<div class="text-muted"><i class="bi bi-image fs-1"></i><br>Gambar tidak tersedia</div>'}
              </div>
              <div class="col-md-7">
                <div class="detail-item">
                  <strong>Role</strong><br>
                  <span class="text-muted">${roleLabel}</span>
                </div>
                <div class="detail-item">
                  <strong>Nama Penanda Tangan</strong><br>
                  <span class="fw-bold">${data.nama || 'Tidak diketahui'}</span>
                </div>
                <div class="detail-item">
                  <strong>Kegunaan</strong><br>
                  <span class="text-muted">${kegunaan}</span>
                </div>
                <div class="detail-item">
                  <strong>Untuk Peserta</strong><br>
                  <span class="text-muted">${pesertaNama}</span>
                </div>
                <div class="detail-item">
                  <strong>Waktu Persetujuan</strong><br>
                  <span class="text-muted">${timestampDisplay}</span>
                </div>
                <div class="detail-item">
                  <strong>Drive ID</strong><br>
                  <code style="font-size:0.75rem;">${driveId || '-'}</code>
                </div>
              </div>
            </div>

            <hr class="my-3">

            <div class="text-center">
              <h6 class="fw-bold">Barcode Verifikasi</h6>
              <div class="barcode-container" id="${barcodeId}"></div>
              <p class="small text-muted mt-2">Scan barcode ini untuk memverifikasi keaslian tanda tangan digital.</p>
            </div>
          </div>
        </div>

        <div class="text-center mt-3">
          <a href="/bisaa/index.html" class="btn btn-outline-primary btn-rounded">
            <i class="bi bi-house-door me-1"></i>Kembali ke Beranda
          </a>
          <a href="/bisaa/verifikasi.html" class="btn btn-outline-success btn-rounded ms-2">
            <i class="bi bi-patch-check me-1"></i>Cek Sertifikat
          </a>
        </div>
      `;

      container.innerHTML = html;

      // Generate barcode menggunakan JsBarcode (global)
      setTimeout(() => {
        try {
          if (typeof JsBarcode !== 'undefined') {
            JsBarcode(`#${barcodeId}`, barcodeData, {
              format: "CODE128",
              width: 2,
              height: 60,
              displayValue: true,
              fontSize: 10,
              margin: 10
            });
          } else {
            console.warn('JsBarcode tidak tersedia, fallback ke teks');
            const barcodeEl = document.getElementById(barcodeId);
            if (barcodeEl) {
              barcodeEl.innerHTML = `<div style="font-size:0.5rem; word-break:break-all;">${barcodeData}</div>`;
            }
          }
        } catch (e) {
          console.warn('Barcode gagal digenerate, fallback ke teks:', e);
          const barcodeEl = document.getElementById(barcodeId);
          if (barcodeEl) {
            barcodeEl.innerHTML = `<div style="font-size:0.5rem; word-break:break-all;">${barcodeData}</div>`;
          }
        }
      }, 100);
    }

    function renderError(message) {
      const container = document.getElementById('verificationContent');
      container.innerHTML = `
        <div class="alert alert-danger text-center">
          <i class="bi bi-x-circle-fill me-2"></i>${message}
        </div>
        <div class="text-center mt-3">
          <a href="/bisaa/index.html" class="btn btn-outline-primary btn-rounded">
            <i class="bi bi-house-door me-1"></i>Kembali ke Beranda
          </a>
        </div>
      `;
    }

    function renderNotFound(role) {
      const container = document.getElementById('verificationContent');
      const roleLabels = {
        'ketua_pc': 'Ketua PC',
        'sekretaris': 'Sekretaris',
        'instruktur': 'Instruktur'
      };
      container.innerHTML = `
        <div class="alert alert-warning text-center">
          <i class="bi bi-exclamation-triangle-fill me-2"></i>
          Tanda tangan digital untuk <strong>${roleLabels[role] || role}</strong> belum ditemukan.
          <br>Silakan <a href="/bisaa/sign_${role}.html" class="alert-link">tanda tangan di halaman ini</a> terlebih dahulu.
        </div>
        <div class="text-center mt-3">
          <a href="/bisaa/index.html" class="btn btn-outline-primary btn-rounded">
            <i class="bi bi-house-door me-1"></i>Kembali ke Beranda
          </a>
        </div>
      `;
    }

    // ==========================================================
    //   VERIFIKASI UTAMA
    // ==========================================================
    async function verifySignature() {
      const role = getQueryParam('role');
      const driveId = getQueryParam('driveId');

      if (!role) {
        renderError('Parameter "role" tidak ditemukan. Silakan gunakan link verifikasi yang benar.');
        return;
      }

      // Jika driveId tidak ada, coba ambil dari server
      if (!driveId) {
        try {
          const res = await callApi('getDigitalApproval', { role }, 'GET');
          if (res.success && res.data && res.data.driveId) {
            // Redirect ke halaman yang sama dengan driveId
            window.location.href = `verify_signature.html?role=${role}&driveId=${res.data.driveId}`;
            return;
          } else {
            renderNotFound(role);
            return;
          }
        } catch (err) {
          renderError('Gagal mengambil data tanda tangan: ' + err.message);
          return;
        }
      }

      // Verifikasi dengan driveId yang diberikan
      try {
        const res = await callApi('getDigitalApproval', { role }, 'GET');
        if (res.success && res.data && res.data.driveId === driveId) {
          renderVerificationResult(res.data, role, driveId);
        } else {
          renderError('Tanda tangan tidak valid atau telah diubah.');
        }
      } catch (err) {
        renderError('Terjadi kesalahan saat verifikasi: ' + err.message);
      }
    }

    // ==========================================================
    //   INIT PADA DOM LOADED
    // ==========================================================
    (function boot() {
      verifySignature();
      updateNavbarMenu();
    })();

  </script>
</body>
</html>
