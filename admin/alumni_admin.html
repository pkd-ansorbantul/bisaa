<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>PKD GP Ansor Bantul · Alumni Admin</title>

  <!-- Favicon & Font -->
  <link rel="icon" type="image/png" href="../LOGO ANSOR.webp">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <!-- Bootstrap + Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: #f8fafc; color: #0f172a; }
    .navbar { background: rgba(255,255,255,0.8) !important; backdrop-filter: blur(12px); border-bottom: 1px solid rgba(203,213,225,0.3); }
    .navbar-brand img { max-height: 40px; margin-right: 12px; }
    .brand-title { font-size: 1.35rem; font-weight: 700; color: #0a3d62; }
    .brand-sub { font-size: 0.9rem; color: #6c757d; display: block; }
    .nav-link { font-weight: 500; border-radius: 9999px; padding: 0.5rem 1.2rem; color: #334155 !important; transition: all 0.15s; }
    .nav-link:hover { background: rgba(37,99,235,0.06); color: #2563eb !important; }
    .nav-link.active { background: #2563eb !important; color: white !important; box-shadow: 0 4px 10px rgba(37,99,235,0.2); }
    .nav-link i { margin-right: 6px; }

    .container-card { max-width: 1400px; background: white; border-radius: 32px; padding: 2rem; margin: 30px auto; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); border: 1px solid rgba(226,232,240,0.6); }
    .section-title { font-weight: 650; font-size: 1.75rem; border-left: 6px solid #2563eb; padding-left: 1.2rem; margin-bottom: 1.8rem; }

    .crud-table { max-height: 500px; overflow-y: auto; border-radius: 16px; }
    .table-admin th { background-color: #f8fafc; font-weight: 600; position: sticky; top: 0; background: white; z-index: 10; }

    .foto-thumb { max-width: 50px; max-height: 50px; border-radius: 4px; object-fit: cover; cursor: pointer; }

    .filter-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; align-items: center; }
    .filter-bar .filter-input { max-width: 300px; }

    .footer-modern { font-size: 0.85rem; color: #64748b; margin-top: 3rem; text-align: center; padding: 1.5rem 0; border-top: 1px solid #e2e8f0; background: white; }

    .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
    .toast { background: white; border-left: 5px solid; border-radius: 16px; }

    .skeleton-loader { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: skeleton-shimmer 1.5s infinite linear; border-radius: 8px; height: 1.2em; width: 100%; }
    @keyframes skeleton-shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal-content { border-radius: 24px; }
    .modal-header { border-radius: 24px 24px 0 0; }
  </style>
</head>
<body>

<!-- ==================== NAVBAR ==================== -->
<nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top shadow-sm">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" href="../index.html">
      <img src="../LOGO ANSOR.webp" alt="GP Ansor">
      <span><span class="brand-title">PKD GP Ansor</span><span class="brand-sub">Kabupaten Bantul</span></span>
    </a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain"><span class="navbar-toggler-icon"></span></button>
    <div class="collapse navbar-collapse" id="navbarMain">
      <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" href="../index.html"><i class="bi bi-house-door"></i> Beranda</a></li>
        <li class="nav-item"><a class="nav-link" href="../admin.html"><i class="bi bi-speedometer2"></i> Dashboard Admin</a></li>
      </ul>
      <div class="d-flex align-items-center gap-2" id="navbarUserMenu"></div>
    </div>
  </div>
</nav>

<!-- ==================== KONTEN UTAMA ==================== -->
<section class="container container-card">
  <h2 class="section-title"><i class="bi bi-award me-2"></i>Alumni PKD</h2>

  <!-- Tombol aksi dan filter -->
  <div class="d-flex justify-content-between mb-3 flex-wrap gap-2">
    <div>
      <button class="btn btn-warning btn-sm" id="moveSelectedToActiveBtn" disabled>
        <i class="bi bi-arrow-return-left"></i> Kembalikan Terpilih ke Aktif
      </button>
      <button class="btn btn-secondary btn-sm" id="clearSelectionBtn">
        <i class="bi bi-x-circle"></i> Batal Pilih
      </button>
    </div>
    <div class="filter-input">
      <input type="text" class="form-control form-control-sm" id="searchAlumni" placeholder="🔍 Cari nama / alamat / utusan...">
    </div>
  </div>

  <!-- Tabel alumni -->
  <div id="alumniContainer">
    <!-- akan diisi oleh JavaScript -->
  </div>
</section>

<!-- ==================== FOOTER ==================== -->
<footer class="footer-modern container">
  <i class="bi bi-c-circle"></i> Hak Cipta 2026 - Tim Instruktur GP Ansor Kabupaten Bantul
</footer>

<!-- ==================== MODAL LOGIN ==================== -->
<div class="modal fade" id="adminLoginModal" tabindex="-1" data-bs-backdrop="static">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg">
      <div class="modal-header bg-primary text-white border-0 rounded-top-4">
        <h5 class="modal-title"><i class="bi bi-shield-lock me-2"></i>Login Admin</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4">
        <div class="mb-3"><label class="form-label fw-semibold">Username</label><input type="text" id="adminUsername" class="form-control rounded-3" placeholder="Masukkan username" autocomplete="off"></div>
        <div class="mb-3"><label class="form-label fw-semibold">Password</label><div class="input-group"><input type="password" id="adminPassword" class="form-control rounded-start-3" placeholder="Masukkan password" autocomplete="off"><button class="btn btn-outline-secondary rounded-end-3" type="button" onclick="togglePasswordVisibility('adminPassword')"><i class="bi bi-eye"></i></button></div></div>
        <div id="adminLoginError" class="text-danger mt-2 small" style="display: none;"></div>
      </div>
      <div class="modal-footer border-0"><button type="button" class="btn btn-secondary rounded-pill px-4" data-bs-dismiss="modal">Batal</button><button type="button" class="btn btn-primary rounded-pill px-4" id="adminLoginSubmit">Login</button></div>
    </div>
  </div>
</div>

<!-- ==================== TOAST NOTIFIKASI ==================== -->
<div class="toast-container">
  <div id="notificationToast" class="toast border-0 shadow-lg" role="alert" data-bs-delay="3000">
    <div class="toast-header bg-white border-0"><i class="bi me-2" id="toastIcon"></i><strong class="me-auto" id="toastTitle">Berhasil</strong><button type="button" class="btn-close" data-bs-dismiss="toast"></button></div>
    <div class="toast-body" id="toastMessage"></div>
  </div>
</div>

<!-- ==================== SCRIPT ==================== -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../api.js"></script>
<script>
  window.togglePasswordVisibility = function(id) { const el = document.getElementById(id); if(el) el.type = el.type==='password'?'text':'password'; };

  const { escapeHtml, showToast, getCached, saveCached } = PKD;

  // =====================================================
  //   GLOBAL VARIABLES
  // =====================================================
  let allAlumni = [];

  // =====================================================
  //   RENDER SKELETON
  // =====================================================
  function renderSkeletonTable(rows = 5, cols = 12) {
    let h = '<div class="skeleton-table p-3">';
    for (let r = 0; r < rows; r++) {
      h += '<div class="d-flex gap-2 mb-3">';
      for (let c = 0; c < cols; c++) h += '<div class="skeleton-loader" style="flex:1; height:1.2em;"></div>';
      h += '</div>';
    }
    return h + '</div>';
  }

  // =====================================================
  //   RENDER ALUMNI TABLE
  // =====================================================
  function renderAlumniTable(data, container) {
    if (!data.length) {
      container.innerHTML = '<p class="text-muted text-center py-5">Belum ada data alumni.</p>';
      return;
    }

    let html = `
      <div class="table-responsive crud-table">
        <table class="table table-bordered table-sm table-hover table-admin">
          <thead>
            <tr>
              <th style="width: 40px;"><input type="checkbox" id="selectAllAlumni"></th>
              <th>No</th>
              <th>Foto</th>
              <th>Nama Lengkap</th>
              <th>Tempat/Tgl Lahir</th>
              <th>Pekerjaan</th>
              <th>Pendidikan</th>
              <th>Alamat</th>
              <th>No HP</th>
              <th>Email</th>
              <th>Utusan</th>
              <th>Pengalaman</th>
              <th>Alumni Sejak</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="alumniTableBody">
    `;

    data.forEach((p, idx) => {
      const fotoThumb = p.fotoDriveId ? `https://drive.google.com/thumbnail?id=${p.fotoDriveId}&sz=w100-h100` : '';
      const alumniAt = p.alumni_at ? new Date(p.alumni_at).toLocaleDateString('id-ID') : '-';
      html += `
        <tr class="alumni-row" data-nama="${escapeHtml(p.nama_lengkap || '').toLowerCase()}" data-alamat="${escapeHtml(p.alamat || '').toLowerCase()}" data-utusan="${escapeHtml(p.utusan || '').toLowerCase()}">
          <td><input type="checkbox" class="alumni-checkbox-multi" value="${p.id}"></td>
          <td>${idx + 1}</td>
          <td>${p.fotoDriveId ? `<img src="${fotoThumb}" class="foto-thumb" onclick="window.open('https://drive.google.com/file/d/${p.fotoDriveId}/view')">` : '-'}</td>
          <td>${escapeHtml(p.nama_lengkap || '')}</td>
          <td>${escapeHtml(p.tempat_tgl_lahir || '')}</td>
          <td>${escapeHtml(p.pekerjaan || '')}</td>
          <td>${escapeHtml(p.pendidikan_terakhir || '')}</td>
          <td>${escapeHtml(p.alamat || '')}</td>
          <td>${escapeHtml(p.no_hp || '')}</td>
          <td>${escapeHtml(p.email || '')}</td>
          <td>${escapeHtml(p.utusan || '')}</td>
          <td>${escapeHtml(p.pengalaman_organisasi || '')}</td>
          <td>${alumniAt}</td>
          <td>
            <button class="btn btn-sm btn-warning move-back-btn" data-id="${p.id}" data-nama="${escapeHtml(p.nama_lengkap)}">
              <i class="bi bi-arrow-return-left"></i> Kembali ke Aktif
            </button>
          </td>
        </tr>
      `;
    });

    html += `</tbody></table></div>`;
    container.innerHTML = html;
    container.classList.add('fade-in');

    // === SELECT ALL ===
    document.getElementById('selectAllAlumni')?.addEventListener('change', function() {
      const isChecked = this.checked;
      document.querySelectorAll('.alumni-checkbox-multi').forEach(cb => cb.checked = isChecked);
      updateMoveSelectedButton();
    });

    // === UPDATE BUTTON STATE ===
    function updateMoveSelectedButton() {
      const checked = document.querySelectorAll('.alumni-checkbox-multi:checked');
      const btn = document.getElementById('moveSelectedToActiveBtn');
      btn.disabled = checked.length === 0;
      btn.innerHTML = checked.length > 0 
        ? `<i class="bi bi-arrow-return-left"></i> Kembalikan ${checked.length} ke Aktif`
        : `<i class="bi bi-arrow-return-left"></i> Kembalikan Terpilih ke Aktif`;
    }

    document.querySelectorAll('.alumni-checkbox-multi').forEach(cb => {
      cb.addEventListener('change', updateMoveSelectedButton);
    });

    // === TOMBOL CLEAR SELECTION ===
    document.getElementById('clearSelectionBtn')?.addEventListener('click', function() {
      document.querySelectorAll('.alumni-checkbox-multi').forEach(cb => cb.checked = false);
      document.getElementById('selectAllAlumni').checked = false;
      updateMoveSelectedButton();
    });

    // === TOMBOL MOVE SELECTED TO ACTIVE ===
    document.getElementById('moveSelectedToActiveBtn')?.addEventListener('click', async function() {
      const checked = document.querySelectorAll('.alumni-checkbox-multi:checked');
      if (!checked.length) return;
      const ids = Array.from(checked).map(cb => parseInt(cb.value));
      const namaAlumni = Array.from(checked).map(cb => {
        const row = cb.closest('tr');
        return row.querySelector('td:nth-child(4)').innerText;
      });
      if (!confirm(`Kembalikan ${ids.length} alumni ke peserta aktif?\n\n${namaAlumni.join(', ')}`)) return;

      const btn = this;
      const originalText = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Memproses...';
      try {
        // Gunakan Promise.all untuk mengembalikan banyak alumni sekaligus
        const promises = ids.map(id => PKD.alumni.moveBackToActive(id));
        await Promise.all(promises);
        showToast(`✅ Berhasil mengembalikan ${ids.length} alumni ke peserta aktif.`, 'success');
        document.querySelectorAll('.alumni-checkbox-multi').forEach(cb => cb.checked = false);
        document.getElementById('selectAllAlumni').checked = false;
        updateMoveSelectedButton();
        loadAlumni();
      } catch (e) {
        showToast('Gagal: ' + e.message, 'danger');
      } finally {
        btn.disabled = false;
        btn.innerHTML = originalText;
      }
    });

    // === TOMBOL MOVE SINGLE BACK TO ACTIVE ===
    document.querySelectorAll('.move-back-btn').forEach(btn => {
      btn.addEventListener('click', async function() {
        const nama = this.dataset.nama;
        if (!confirm(`Kembalikan "${nama}" ke peserta aktif?`)) return;
        const id = this.dataset.id;
        const orig = this.innerHTML;
        this.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
        this.disabled = true;
        try {
          await PKD.alumni.moveBackToActive(id);
          showToast(`"${nama}" berhasil dikembalikan ke peserta aktif`, 'success');
          loadAlumni();
        } catch (e) {
          showToast('Gagal: ' + e.message, 'danger');
          this.innerHTML = orig;
          this.disabled = false;
        }
      });
    });

    // === FILTER PENCARIAN ===
    document.getElementById('searchAlumni')?.addEventListener('input', function(e) {
      const keyword = e.target.value.toLowerCase();
      document.querySelectorAll('#alumniTableBody .alumni-row').forEach(row => {
        const nama = row.dataset.nama || '';
        const alamat = row.dataset.alamat || '';
        const utusan = row.dataset.utusan || '';
        row.style.display = (nama.includes(keyword) || alamat.includes(keyword) || utusan.includes(keyword)) ? '' : 'none';
      });
    });
  }

  // =====================================================
  //   LOAD ALUMNI (CACHE + FETCH)
  // =====================================================
  async function loadAlumni() {
    const container = document.getElementById('alumniContainer');
    const cached = getCached('alumniList');
    if (cached) {
      renderAlumniTable(cached, container);
      fetchAlumniFromServer().then(newData => {
        if (JSON.stringify(newData) !== JSON.stringify(cached)) {
          renderAlumniTable(newData, container);
          saveCached('alumniList', newData);
        }
      }).catch(console.warn);
    } else {
      container.innerHTML = renderSkeletonTable(5, 12);
      try {
        const data = await fetchAlumniFromServer();
        renderAlumniTable(data, container);
        saveCached('alumniList', data);
      } catch (e) {
        container.innerHTML = `<div class="alert alert-danger">Gagal memuat data alumni: ${escapeHtml(e.message)}</div>`;
      }
    }
  }

  async function fetchAlumniFromServer() {
    const data = await PKD.alumni.getList(true);
    allAlumni = data;
    return data;
  }

  // =====================================================
  //   INISIALISASI & LOGIN CHECK
  // =====================================================
  document.addEventListener('DOMContentLoaded', function() {
    if (PKD.getUserRole() !== 'admin') {
      new bootstrap.Modal(document.getElementById('adminLoginModal')).show();
    } else {
      loadAlumni();
    }

    document.getElementById('adminLoginSubmit').addEventListener('click', async function() {
      const u = document.getElementById('adminUsername').value.trim();
      const p = document.getElementById('adminPassword').value;
      const err = document.getElementById('adminLoginError');
      if (!u || !p) { err.innerText = 'Username dan password harus diisi'; err.style.display = 'block'; return; }
      try {
        const res = await PKD.verifyAdmin(u, p);
        if (res.success) {
          PKD.setUserRole('admin'); PKD.setUserData({ nama: u });
          PKD.persistAuthState(); PKD.updateNavbarMenu();
          bootstrap.Modal.getInstance(document.getElementById('adminLoginModal')).hide();
          loadAlumni();
        } else { err.innerText = res.message || 'Login gagal'; err.style.display = 'block'; }
      } catch (e) { err.innerText = 'Kesalahan: ' + e.message; err.style.display = 'block'; }
    });

    document.addEventListener('click', function(e) {
      const nav = document.getElementById('navbarMain');
      const tog = document.querySelector('.navbar-toggler');
      if (nav && tog && !nav.contains(e.target) && !tog.contains(e.target) && nav.classList.contains('show')) {
        bootstrap.Collapse.getInstance(nav)?.hide();
      }
    });
  });
</script>
</body>
</html>
