    /* ===== NAV LINK ===== */
    .nav-link { font-weight: 500; border-radius: 9999px; padding: 0.5rem 1.2rem; margin: 0 0.15rem; color: #334155 !important; transition: all 0.2s; }
    .nav-link:hover { background: rgba(37,99,235,0.08); color: #2563eb !important; }
    .nav-link.active { background: #2563eb !important; color: #fff !important; box-shadow: 0 4px 14px rgba(37,99,235,0.35); }

    /* ===== KONTEN ===== */
    .container-card { max-width: 1200px; background: white; border-radius: 32px; padding: 2rem; margin: 30px auto; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); border: 1px solid rgba(226,232,240,0.6); flex: 1; }
    .section-title { font-weight: 650; font-size: 1.75rem; margin-bottom: 1.8rem; color: #0f172a; border-left: 6px solid #2563eb; padding-left: 1.2rem; }
    .footer-modern { font-size: 0.85rem; color: #64748b; margin-top: auto; text-align: center; padding: 1.5rem 0; border-top: 1px solid #e2e8f0; background: white; }
    .table-container { background: white; border-radius: 20px; padding: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
    .pagination-container { display: flex; justify-content: space-between; align-items: center; padding: 15px 0 5px 0; flex-wrap: wrap; gap: 10px; }
    .pagination-container .info { font-size: 0.9rem; color: #64748b; }
    .pagination-container .btn-group .btn { border-radius: 8px; margin: 0 2px; padding: 0.3rem 0.7rem; }
    .pagination-container .btn-group .btn.active { background-color: #2563eb; color: white; border-color: #2563eb; }
    th.sortable { cursor: pointer; user-select: none; position: relative; padding-right: 1.5rem !important; }
    th.sortable:hover { background-color: #f1f5f9; }
    th.sortable::after { content: '↕'; position: absolute; right: 0.5rem; color: #94a3b8; font-size: 0.7rem; opacity: 0.5; }
    th.sortable.asc::after { content: '↑'; opacity: 1; color: #2563eb; }
    th.sortable.desc::after { content: '↓'; opacity: 1; color: #2563eb; }
    .cache-status { font-size: 0.8rem; padding: 4px 12px; border-radius: 20px; background: #f1f5f9; display: inline-block; }
    .cache-status.live { background: #dcfce7; color: #16a34a; }
    .cache-status.offline { background: #fee2e2; color: #dc2626; }
    .stat-badge { display: inline-block; padding: 0.35rem 1rem; border-radius: 50px; background: #2563eb; color: white; font-weight: 600; font-size: 0.9rem; margin-bottom: 1.5rem; }
    @media (max-width: 576px) { 
      .container-card { padding: 1rem; } 
      .brand-title { font-size: 1.1rem; }
      .brand-sub { font-size: 0.7rem; }
    }
  </style>
</head>
<body>

<!-- NAVBAR (ELEGAN) -->
<nav class="navbar navbar-expand-lg navbar-light sticky-top shadow-sm">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" href="/bisaa/index.html">
      <img src="/bisaa/LOGO%20ANSOR.webp" alt="GP Ansor">

    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain">

<!-- KONTEN -->
<div id="contentArea">
  <section class="container container-card">
    <h2 class="section-title"><i class="bi bi-people-fill me-2"></i>Data Kader per PAC</h2>
    
    <!-- Filter & Pencarian -->
    <div class="row mb-4">
      <div class="col-md-6">
        <div class="input-group" style="max-width:300px; display:inline-flex;">
          <span class="input-group-text bg-white border-end-0"><i class="bi bi-search"></i></span>
          <input type="text" class="form-control border-start-0" id="searchInput" placeholder="Cari nama...">
        </div>
        <select class="form-select d-inline-block ms-2" style="width:auto; display:inline-block !important;" id="filterUtusan">
          <option value="">Semua PAC</option>
        </select>
      </div>
      <div class="col-md-6 text-end">
        <button class="btn btn-outline-secondary rounded-pill" id="refreshDataBtn"><i class="bi bi-arrow-clockwise me-1"></i> Segarkan</button>

      </div>
    </div>

    <!-- Total Kader per PAC terpilih -->
    <div id="totalBadgeContainer" class="text-center mb-3"></div>

    <!-- Tabel Kader -->
    <div class="table-container">
      <div id="kaderTableContainer">

      </div>

<!-- ================= SCRIPTS ================= -->
<!-- Library Eksternal (tetap sebagai script biasa) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Modul ES Khusus Halaman Ini -->
<script type="module">
  // ==========================================================
  //   IMPOR DARI CORE API (ES Modules)
  // ==========================================================
  import {
    callApi,
    showToast,
    escapeHtml,
    guardPublicAccess,
    updateNavbarMenu
  } from './js/core/api.js';

  // ==========================================================
  //   STATE & UTILITY
  // ==========================================================
  let STATE = {
    pesertaList: [],
    filteredList: [],
    searchQuery: '',
    utusanFilter: '',
    currentPage: 1,
    itemsPerPage: 20,
    sortColumn: null,
    sortDirection: 'asc'
  };

  function updateCacheStatus(status) {
    const el = document.getElementById('cacheStatus');
    if (el) {
      el.textContent = status;
      el.className = 'cache-status ' + (status === 'Live' ? 'live' : '');
    }
  }

  function debounce(fn, delay) {
    let timer;
    return function(...args) {
      clearTimeout(timer);
      timer = setTimeout(() => fn.apply(this, args), delay);
    };
  }

  // ==========================================================
  //   LOAD DATA (langsung dari API)
  // ==========================================================
  async function loadKaderData(forceRefresh = false) {
    const container = document.getElementById('kaderTableContainer');

    // Tampilkan loading
    container.innerHTML = '<div class="text-center py-5"><div class="spinner-border text-primary"></div></div>';

    try {
      const res = await callApi('getPesertaList', {}, 'GET');
      const freshData = res?.data || res;
      if (freshData && Array.isArray(freshData) && freshData.length > 0) {
        STATE.pesertaList = freshData;
        renderUtusanFilter();
        applyFiltersAndSort();
        updateCacheStatus('Live');
      } else {
        container.innerHTML = `<div class="alert alert-info text-center">Belum ada data kader.</div>`;
        updateCacheStatus('Empty');
      }
    } catch (e) {
      console.warn('Gagal load kader:', e);
      container.innerHTML = `<div class="alert alert-danger text-center">Gagal memuat data.</div>`;
      updateCacheStatus('Error');
    }
  }

  // ==========================================================
  //   FILTER, SORT, PAGINATION
  // ==========================================================
  function getFilteredPeserta(query = '', utusan = '') {
    let filtered = STATE.pesertaList;
    if (query.trim() !== '') {
      const q = query.toLowerCase().trim();
      filtered = filtered.filter(item =>
        (item.nama_lengkap && item.nama_lengkap.toLowerCase().includes(q)) ||
        (item.utusan && item.utusan.toLowerCase().includes(q))
      );
    }
    if (utusan !== '' && utusan !== '') {
      filtered = filtered.filter(item => item.utusan === utusan);
    }
    return filtered;
  }

  function applyFiltersAndSort() {
    let filtered = getFilteredPeserta(STATE.searchQuery, STATE.utusanFilter);
    if (STATE.sortColumn) {
      filtered.sort(function(a, b) {
        let va = (a[STATE.sortColumn] || '').toString().toLowerCase();
        let vb = (b[STATE.sortColumn] || '').toString().toLowerCase();
        if (va < vb) return STATE.sortDirection === 'asc' ? -1 : 1;
        if (va > vb) return STATE.sortDirection === 'asc' ? 1 : -1;
        return 0;
      });
    }
    STATE.filteredList = filtered;
    const totalItems = filtered.length;
    const totalPages = Math.max(1, Math.ceil(totalItems / STATE.itemsPerPage));
    if (STATE.currentPage > totalPages) STATE.currentPage = totalPages;
    if (STATE.currentPage < 1) STATE.currentPage = 1;
    const start = (STATE.currentPage - 1) * STATE.itemsPerPage;
    const end = Math.min(start + STATE.itemsPerPage, totalItems);
    
    // Render tabel dan badge total
    renderTable(filtered.slice(start, end), totalItems);
    renderTotalBadge(totalItems);
  }

  // ==========================================================
  //   RENDER TOTAL BADGE
  // ==========================================================
  function renderTotalBadge(total) {
    const container = document.getElementById('totalBadgeContainer');
    const selectedPAC = STATE.utusanFilter;
    if (selectedPAC) {
      container.innerHTML = `<span class="stat-badge"><i class="bi bi-people-fill me-2"></i>Kader PAC ${escapeHtml(selectedPAC)} : ${total} orang</span>`;
    } else {
      container.innerHTML = `<span class="stat-badge"><i class="bi bi-people-fill me-2"></i>Total Kader : ${total} orang</span>`;
    }
  }

  // ==========================================================
  //   RENDER TABEL
  // ==========================================================
  function renderTable(data, totalItems) {
    const container = document.getElementById('kaderTableContainer');
    if (!container) return;

    let html = `
      <div class="table-responsive">
        <table class="table table-bordered table-hover table-sm">
          <thead class="table-light">
            <tr>
              <th style="width:50px;">#</th>
              <th class="sortable" onclick="sortTable('nama_lengkap')">Nama</th>
              <th class="sortable" onclick="sortTable('utusan')">PAC</th>
              <th class="sortable" onclick="sortTable('pendidikan_terakhir')">Pendidikan</th>
              <th class="sortable" onclick="sortTable('pekerjaan')">Pekerjaan</th>
            </tr>
          </thead>
          <tbody>
    `;

    if (data.length === 0) {
      html += `
        <tr>
          <td colspan="5" class="text-center py-3 text-muted">
            <i class="bi bi-inbox fs-4 d-block mb-2"></i>
            Tidak ada data kader untuk PAC ini.
          </td>
        </tr>
      `;
    } else {
      data.forEach((item, index) => {
        const globalIndex = (STATE.currentPage - 1) * STATE.itemsPerPage + index + 1;
        html += `
          <tr>
            <td>${globalIndex}</td>
            <td><strong>${escapeHtml(item.nama_lengkap || '')}</strong></td>
            <td>${escapeHtml(item.utusan || '-')}</td>
            <td>${escapeHtml(item.pendidikan_terakhir || '-')}</td>
            <td>${escapeHtml(item.pekerjaan || '-')}</td>
          </tr>
        `;
      });
    }

    html += `
        </tbody>
      </table>
    </div>
    `;

    const totalPages = Math.max(1, Math.ceil(totalItems / STATE.itemsPerPage));
    html += `
      <div class="pagination-container">
        <div class="info">Menampilkan ${data.length > 0 ? (STATE.currentPage - 1) * STATE.itemsPerPage + 1 : 0} - ${Math.min(STATE.currentPage * STATE.itemsPerPage, totalItems)} dari ${totalItems} data</div>
        <div class="btn-group">
    `;
    for (let i = 1; i <= totalPages; i++) {
      html += `<button class="btn btn-sm ${i === STATE.currentPage ? 'btn-primary' : 'btn-outline-secondary'}" onclick="goToPage(${i})">${i}</button>`;
    }
    html += `</div></div>`;

    container.innerHTML = html;
    container.classList.add('fade-in');
  }

  // ==========================================================
  //   SORT & PAGINATION HELPERS (Diekspos ke global)
  // ==========================================================
  window.sortTable = function(col) {
    if (STATE.sortColumn === col) STATE.sortDirection = STATE.sortDirection === 'asc' ? 'desc' : 'asc';
    else { STATE.sortColumn = col; STATE.sortDirection = 'asc'; }
    STATE.currentPage = 1;
    applyFiltersAndSort();
  };

  window.goToPage = function(page) {
    const totalItems = STATE.filteredList.length;
    const totalPages = Math.max(1, Math.ceil(totalItems / STATE.itemsPerPage));
    if (page < 1 || page > totalPages) return;
    STATE.currentPage = page;
    applyFiltersAndSort();
  };

  // ==========================================================
  //   RENDER DROPDOWN FILTER UTUSAN
  // ==========================================================
  function renderUtusanFilter() {
    const select = document.getElementById('filterUtusan');
    if (!select) return;
    const utusanSet = new Set();
    STATE.pesertaList.forEach(item => {
      if (item.utusan && item.utusan.trim() !== '') {
        utusanSet.add(item.utusan);
      }
    });
    const utusan = Array.from(utusanSet).sort();
    select.innerHTML = '<option value="">Semua PAC</option>';
    utusan.forEach(u => {
      const opt = document.createElement('option');
      opt.value = u;
      opt.textContent = u;
      select.appendChild(opt);
    });
  }

  // ==========================================================
  //   EVENT HANDLERS
  // ==========================================================
  document.getElementById('refreshDataBtn')?.addEventListener('click', function() {
    this.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Memuat...';
    this.disabled = true;
    loadKaderData(true).then(() => {
      this.innerHTML = '<i class="bi bi-arrow-clockwise me-1"></i> Segarkan';
      this.disabled = false;
      showToast('Data berhasil disegarkan', 'success');
    }).catch(() => {
      this.innerHTML = '<i class="bi bi-arrow-clockwise me-1"></i> Segarkan';
      this.disabled = false;
      showToast('Gagal menyegarkan', 'error');
    });
  });

  document.getElementById('searchInput')?.addEventListener('input', debounce(function(e) {
    STATE.searchQuery = e.target.value;
    STATE.currentPage = 1;
    applyFiltersAndSort();
  }, 300));

  document.getElementById('filterUtusan')?.addEventListener('change', function() {
    STATE.utusanFilter = this.value;
    STATE.currentPage = 1;
    applyFiltersAndSort();
  });

  // ==========================================================
  //   🛡️ GUARD PUBLIC ACCESS & BOOT
  // ==========================================================
  (async function boot() {
    const canAccess = await guardPublicAccess();
    if (!canAccess) return;

    // Update navbar user
    updateNavbarMenu();

    // Load data pertama
    loadKaderData();
  })();

</script>
</body>
