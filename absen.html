<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>Absen Digital · PKD GP Ansor Bantul</title>

  <!-- Favicon & Font -->
  <link rel="icon" type="image/png" href="/bisaa/LOGO%20ANSOR.webp">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <!-- Bootstrap 5 + Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Signature Pad -->
  <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>

  <style>
    /* ===== UNIVERSAL PREMIUM (GLASSMORPHISM) ===== */
    * { font-family: 'Inter', system-ui, sans-serif; }
    body {
      background: #f8fafc;
      color: #0f172a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* --- HEADER MINIMALIS (SAMA DENGAN INDEX) --- */
    .header-minimal {
      background: rgba(255, 255, 255, 0.72) !important;
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.3);
      z-index: 1030;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.04);
      padding-top: 0 !important;
      padding-bottom: 0 !important;
    }
    .header-minimal .container {
      padding-top: 0.75rem;
      padding-bottom: 0.75rem;
    }
    .btn-back {
      background: rgba(37, 99, 235, 0.08);
      color: #2563eb;
      border: 1px solid rgba(37, 99, 235, 0.2);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .btn-back:hover {
      background: #2563eb;
      color: white;
      transform: translateX(-3px);
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
    }
    .brand-logo-mini { height: 40px; width: auto; margin-right: 14px; transition: transform 0.2s; }
    .brand-logo-mini:hover { transform: scale(1.05); }
    .brand-title-mini { font-weight: 700; color: #0a3d62; font-size: 1.3rem; line-height: 1.2; letter-spacing: -0.02em; }
    .brand-sub-mini { font-size: 0.8rem; color: #64748b; display: block; margin-top: 0px; letter-spacing: 0.02em; }
    
    #navbarUserMenu { display: flex; align-items: center; gap: 8px; }
    .user-menu-area .dropdown-toggle { border-radius: 50px; padding: 0.3rem 1rem; font-size: 0.9rem; }
    .user-menu-area .btn-outline-primary { border-radius: 50px; padding: 0.3rem 1.2rem; font-size: 0.9rem; }

    /* --- GLASS CARD --- */
    .glass-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px) saturate(180%);
      -webkit-backdrop-filter: blur(12px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
      transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* --- SKELETON LOADING --- */
    .skeleton-box {
      background: #e2e8f0;
      border-radius: 8px;
      animation: pulse 1.5s infinite ease-in-out;
      display: block;
    }
    @keyframes pulse {
      0% { opacity: 0.6; }
      50% { opacity: 1; }
      100% { opacity: 0.6; }
    }

    /* --- SIGNATURE AREA --- */
    .signature-area {
      border: 2px dashed #cbd5e1;
      border-radius: 20px;
      background: white;
      padding: 12px;
      transition: border-color 0.2s;
    }
    .signature-area:hover { border-color: #2563eb; }
    .signature-area canvas {
      width: 100%;
      height: auto;
      max-width: 300px;
      max-height: 150px;
      background: white;
      display: block;
      border-radius: 12px;
      margin: 0 auto;
      touch-action: none;
    }

    /* --- ANIMASI --- */
    .fade-up { animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    /* --- FOOTER --- */
    .footer-modern {
      font-size: 0.85rem;
      color: #64748b;
      margin-top: auto;
      text-align: center;
      padding: 1.5rem 0;
      border-top: 1px solid #e2e8f0;
      background: white;
    }

    /* --- RESPONSIF --- */
    @media (max-width: 576px) {
      .glass-card { border-radius: 16px; padding: 1rem !important; }
      .header-minimal .container { padding: 0 0.5rem; }
      .btn-back { font-size: 0.8rem; padding: 0.2rem 0.8rem; }
      .brand-title-mini { display: none; }
      .brand-sub-mini { display: none; }
      .user-menu-area .dropdown-toggle { font-size: 0.75rem; padding: 0.2rem 0.8rem; }
      .signature-area canvas { max-width: 100%; }
    }
  </style>
</head>
<body>

  <!-- ================= HEADER MINIMALIS ================= -->
  <header class="header-minimal sticky-top shadow-sm">
    <div class="container d-flex justify-content-between align-items-center py-3">
      <div class="d-flex align-items-center gap-2">
        <a href="/bisaa/index.html" class="btn btn-back rounded-pill">
          <i class="bi bi-arrow-left me-1"></i> Kembali
        </a>
        <a href="/bisaa/index.html" class="brand-minimal text-decoration-none d-flex align-items-center ms-1">
          <img src="/bisaa/LOGO%20ANSOR.webp" alt="GP Ansor" class="brand-logo-mini">
          <div>
            <div class="brand-title-mini">PKD GP Ansor</div>
            <span class="brand-sub-mini">Kabupaten Bantul</span>
          </div>
        </a>
      </div>
      <!-- Area User Role (diisi oleh api.js) -->
      <div id="navbarUserMenu" class="user-menu-area"></div>
    </div>
  </header>

  <!-- ================= KONTEN UTAMA ================= -->
  <div id="contentArea" class="container" style="padding: 2rem 0; max-width: 800px;">
    <div class="glass-card p-4 fade-up">
      <h2 class="section-title"><i class="bi bi-pen me-2"></i>Absen Digital per Sesi</h2>

      <div id="absenContainer" class="mt-3">
        <!-- Akan diisi oleh JS (Skeleton atau Form Asli) -->
      </div>
    </div>
  </div>

  <!-- ================= FOOTER ================= -->
  <footer class="footer-modern container">
    <div class="d-flex justify-content-center align-items-center gap-2">
      <i class="bi bi-c-circle"></i>
      <span>Hak Cipta 2026 - Tim Instruktur GP Ansor Kabupaten Bantul</span>
    </div>
  </footer>

  <!-- ================= SCRIPTS ================= -->
  <!-- Library Eksternal (tetap sebagai script biasa) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Modul ES Khusus Halaman Ini -->
  <script type="module">
    // ==========================================================
    //   IMPOR DARI CORE API (ES Modules)
    // ==========================================================
    import {
      guardPublicAccess,
      getSesiAbsen,
      submitAbsen,
      showToast,
      updateNavbarMenu
    } from './js/core/api.js';

    // ==========================================================
    //   STATE & KONFIGURASI
    // ==========================================================
    let sesiList = [];
    let isQRMode = false;

    // ==========================================================
    //   UTILITY
    // ==========================================================
    function escapeHtmlLocal(unsafe) { 
      if (!unsafe) return '';
      return String(unsafe).replace(/[&<>"]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        if (m === '"') return '&quot;';
        return m;
      });
    }

    function showToastLocal(message, type) { showToast(message, type); }

    // ==========================================================
    //   🔥 FUNGSI SKELETON
    // ==========================================================
    function renderSkeletonAbsen(container) {
      if (!container) return;
      let html = `
        <h4 class="mb-4">📝 Memuat data sesi...</h4>
        <div class="glass-card" style="background: #f8fafc; padding: 1.5rem;">
          <div class="mb-4"><div class="skeleton-box" style="height: 16px; width: 100px; margin-bottom: 8px;"></div><div class="skeleton-box" style="height: 40px; width: 100%; border-radius: 8px;"></div></div>
          <div class="mb-3"><div class="skeleton-box" style="height: 16px; width: 100px; margin-bottom: 8px;"></div><div class="skeleton-box" style="height: 40px; width: 100%; border-radius: 8px;"></div></div>
          <div class="mb-3"><div class="skeleton-box" style="height: 16px; width: 120px; margin-bottom: 8px;"></div><div class="skeleton-box" style="height: 40px; width: 100%; border-radius: 8px;"></div></div>
          <div class="mb-3"><div class="skeleton-box" style="height: 16px; width: 120px; margin-bottom: 8px;"></div><div class="skeleton-box" style="width: 100%; max-width: 300px; height: 150px; border-radius: 16px; margin: 0 auto;"></div></div>
          <div class="mt-4"><div class="skeleton-box" style="height: 50px; width: 100%; border-radius: 50px;"></div></div>
        </div>
      `;
      container.innerHTML = html;
      container.classList.add('fade-up');
    }

    // ==========================================================
    //   FETCH SESI ABSEN
    // ==========================================================
    async function fetchSesiAbsen() {
      try {
        const response = await getSesiAbsen();
        if (response && response.success === true && Array.isArray(response.data)) {
          return response.data;
        }
        if (Array.isArray(response)) { return response; }
        return [];
      } catch (err) {
        console.warn('Gagal mengambil sesi:', err);
        return [];
      }
    }

    // ==========================================================
    //   SIGNATURE PAD
    // ==========================================================
    function initAbsenSignaturePad() {
      const canvas = document.getElementById('signatureCanvasAbsen');
      if (!canvas) return;
      if (window.sigPadAbsen) { window.sigPadAbsen.clear(); window.sigPadAbsen = null; }
      window.sigPadAbsen = new SignaturePad(canvas, {
        backgroundColor: 'white', penColor: '#0f172a', minWidth: 1.5, maxWidth: 3
      });
      window.sigPadAbsen.clear();

      document.getElementById('clearAbsenSign')?.addEventListener('click', () => {
        window.sigPadAbsen.clear(); saveAbsenFormState();
      });
      document.getElementById('undoAbsenSign')?.addEventListener('click', () => {
        const data = window.sigPadAbsen.toData();
        if (data && data.length > 0) {
          data.pop(); window.sigPadAbsen.fromData(data); saveAbsenFormState();
        }
      });
      window.sigPadAbsen.addEventListener('endStroke', saveAbsenFormState);
    }

    // ==========================================================
    //   🔥 STATE MANAGEMENT (Lindungi dari Tracking Prevention)
    // ==========================================================
    function saveAbsenFormState() {
      try {
        const nama = document.getElementById('namaAbsen')?.value || '';
        const sesiId = document.getElementById('pilihSesiAbsen')?.value || '';
        let signatureData = null;
        if (window.sigPadAbsen && !window.sigPadAbsen.isEmpty()) {
          signatureData = window.sigPadAbsen.toData();
        }
        localStorage.setItem('absenFormState', JSON.stringify({ nama, sesiId, signatureData }));
      } catch (e) { console.warn('Storage tidak tersedia.'); }
    }

    function restoreAbsenFormState() {
      let saved = null;
      try { saved = localStorage.getItem('absenFormState'); } catch (e) { return; }
      if (!saved) return;
      try {
        const { nama, sesiId, signatureData } = JSON.parse(saved);
        const namaEl = document.getElementById('namaAbsen');
        if (namaEl && nama) namaEl.value = nama;
        
        const sesiEl = document.getElementById('pilihSesiAbsen');
        if (sesiEl && sesiId) sesiEl.value = sesiId;

        if (signatureData && window.sigPadAbsen) {
          window.sigPadAbsen.fromData(signatureData);
        }
      } catch (e) {}
    }

    function clearAbsenFormState() {
      try { localStorage.removeItem('absenFormState'); } catch (e) {}
    }

    // ==========================================================
    //   RENDER FORM ASLI
    // ==========================================================
    function renderForm(sesiListData, sesiIdFromUrl, tokenFromUrl, isQRModeParam) {
      sesiList = sesiListData;
      isQRMode = isQRModeParam;
      const container = document.getElementById('absenContainer');

      if (!sesiList || sesiList.length === 0) {
        container.innerHTML = '<div class="alert alert-info text-center">Belum ada sesi absen tersedia.</div>';
        return;
      }

      function formatTimeRange(startStr, endStr) {
        let displayStr = '';
        if (startStr) {
          const startDate = new Date(startStr);
          if (!isNaN(startDate.getTime())) {
            const dateStr = startDate.toLocaleDateString('id-ID', { day: '2-digit', month: '2-digit', year: 'numeric' });
            const startTime = startDate.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            let endTime = '';
            if (endStr) {
              const endDate = new Date(endStr);
              if (!isNaN(endDate.getTime())) {
                endTime = ' - ' + endDate.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
              }
            }
            displayStr = ` (${dateStr} ${startTime}${endTime})`;
          }
        }
        return displayStr;
      }

      let html = `
        <div class="mb-4 ${isQRMode ? 'qr-mode' : ''}">
          <h5>Pilih Sesi</h5>
          <select class="form-select" id="pilihSesiAbsen" ${isQRMode ? 'disabled' : ''}>
            ${sesiList.map(s => {
              const timeDisplay = formatTimeRange(s.waktu_mulai, s.waktu_selesai);
              return `<option value="${s.id}" ${(sesiIdFromUrl && s.id == sesiIdFromUrl) ? 'selected' : ''}>${escapeHtmlLocal(s.nama)}${timeDisplay}</option>`;
            }).join('')}
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">Nama Lengkap</label>
          <input type="text" class="form-control" id="namaAbsen" required>
        </div>
      `;

      if (isQRMode) {
        html += `
          <input type="hidden" id="qrTokenAbsen" value="${escapeHtmlLocal(tokenFromUrl)}">
          <div class="alert alert-success mb-3">
            <i class="bi bi-check-circle"></i> Absen via QR – token terisi otomatis.
          </div>
        `;
      } else {
        html += `
          <div class="mb-3 password-field-wrapper">
            <label class="form-label fw-bold">🔑 Password Sesi</label>
            <div class="input-group">
              <input type="password" class="form-control" id="passwordAbsen" placeholder="Masukkan password sesi">
              <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('passwordAbsen')">
                <i class="bi bi-eye"></i>
              </button>
            </div>
          </div>
        `;
      }

      html += `
        <div class="mb-3">
          <label class="form-label fw-bold">✍️ Tanda Tangan Digital</label>
          <div class="signature-area"><canvas id="signatureCanvasAbsen" width="300" height="150"></canvas></div>
          <div class="signature-buttons mt-2 d-flex gap-2">
            <button type="button" class="btn btn-outline-secondary btn-sm" id="clearAbsenSign">Hapus</button>
            <button type="button" class="btn btn-outline-primary btn-sm" id="undoAbsenSign">Undo</button>
          </div>
        </div>
        <button id="submitAbsenBtn" class="btn btn-warning btn-lg w-100 rounded-pill">📋 Kirim Absen</button>
      `;

      // 🔥 Tulis HTML ke DOM terlebih dahulu
      container.innerHTML = html;
      container.classList.add('fade-up');

      // 🔥 Inisialisasi komponen setelah HTML terpasang
      initAbsenSignaturePad();

      // === 🔥 GUARD CLAUSE PALING PENTING UNTUK ERROR NULL ===
      if (isQRMode) {
        const selectEl = document.getElementById('pilihSesiAbsen');
        // Pastikan dropdown benar-benar ada di DOM, barulah set nilainya
        if (selectEl) {
          // Jika sesiIdFromUrl valid, set nilainya. Jika tidak ada, set ke index pertama
          if (sesiIdFromUrl) {
            selectEl.value = sesiIdFromUrl;
          } else if (sesiList.length > 0) {
            selectEl.value = sesiList[0].id;
          }
        } else {
          console.warn("⚠️ Elemen dropdown (#pilihSesiAbsen) tidak ditemukan di DOM saat pengisian QR!");
        }
      }

      document.getElementById('submitAbsenBtn').addEventListener('click', async function() {
        const btn = this;
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Mengirim...';

        // Validasi dengan guard clause
        const pad = window.sigPadAbsen;
        const namaInput = document.getElementById('namaAbsen');
        const sesiInput = document.getElementById('pilihSesiAbsen');
        const pwInput = document.getElementById('passwordAbsen');
        const qrInput = document.getElementById('qrTokenAbsen');

        // 🔥 PERBAIKAN: Cek apakah tanda tangan sudah diisi (jika sudah diisi, langsung kirim; jika belum, minta isi)
        const hasSignature = pad && !pad.isEmpty();
        let params = {};

        // Validasi nama
        if (!namaInput) {
          showToastLocal('Elemen nama tidak ditemukan!', 'danger');
          btn.disabled = false; btn.innerHTML = '📋 Kirim Absen'; return;
        }
        const nama = namaInput.value.trim();
        if (!nama) {
          showToastLocal('Nama wajib diisi!', 'danger');
          btn.disabled = false; btn.innerHTML = '📋 Kirim Absen'; return;
        }

        // Validasi sesi
        if (!sesiInput) {
          showToastLocal('Elemen sesi tidak ditemukan!', 'danger');
          btn.disabled = false; btn.innerHTML = '📋 Kirim Absen'; return;
        }
        const sesiId = sesiInput.value;

        // Siapkan parameter dasar
        params = { nama, sesiId };

        if (isQRMode) {
          if (qrInput) {
            params.qrToken = qrInput.value;
          } else {
            showToastLocal('QR Token tidak ditemukan. Silakan scan ulang QR.', 'danger');
            btn.disabled = false; btn.innerHTML = '📋 Kirim Absen'; return;
          }
        } else {
          if (!pwInput) {
            showToastLocal('Elemen password tidak ditemukan!', 'danger');
            btn.disabled = false; btn.innerHTML = '📋 Kirim Absen'; return;
          }
          const password = pwInput.value.trim();
          // 🔥 PERBAIKAN: Jika password kosong, jangan kirim, tapi tampilkan error
          if (!password) {
            showToastLocal('Password sesi wajib diisi!', 'danger');
            btn.disabled = false; btn.innerHTML = '📋 Kirim Absen'; return;
          }
          params.password = password; // Kirim password yang sudah di-trim
        }

        // 🔥 Logika dua langkah:
        // Jika tanda tangan belum ada, kirim validasi dulu (tanpa tandaTangan)
        // Jika sudah ada, kirim dengan tandaTangan
        let signatureDataURL = null;
        if (hasSignature) {
          signatureDataURL = pad.toDataURL('image/jpeg', 0.2);
          params.tandaTangan = signatureDataURL;
        }

        try {
          const result = await submitAbsen(params.nama, params.sesiId, params.tandaTangan, params.password, params.qrToken, null);
          
          // 🔥 PERBAIKAN: Jika API mengembalikan needSignature, minta tanda tangan
          if (result.needSignature) {
            showToastLocal('Silakan isi tanda tangan terlebih dahulu.', 'warning');
            // Fokuskan ke area tanda tangan
            btn.disabled = false;
            btn.innerHTML = '📋 Kirim Absen';
            return;
          }

          // 🔥 Jika sukses dan sudah ada tanda tangan, maka absen berhasil
          showToastLocal('✅ Absen berhasil tercatat!', 'success');
          pad.clear();
          if (namaInput) namaInput.value = '';
          if (pwInput) pwInput.value = '';
          clearAbsenFormState();
          if (isQRMode) {
            window.history.replaceState({}, document.title, window.location.pathname);
          }
        } catch (e) {
          let errorMsg = e.message || 'Terjadi kesalahan';
          console.error('❌ Error saat absen:', errorMsg);
          // 🔥 PERBAIKAN: Pastikan semua error ditampilkan dengan jelas
          if (errorMsg.includes('Sudah absen')) {
            showToastLocal('⚠️ Anda sudah melakukan absen pada sesi ini sebelumnya. Absen ganda tidak diizinkan.', 'warning');
          } else if (errorMsg.includes('Password salah')) {
            showToastLocal('❌ Password salah. Silakan coba lagi.', 'danger');
          } else if (errorMsg.includes('Token QR tidak valid')) {
            showToastLocal('❌ Token QR tidak valid. Silakan scan ulang.', 'danger');
          } else if (errorMsg.includes('Sesi absen sedang ditutup')) {
            showToastLocal('⛔ Sesi absen sedang ditutup oleh panitia. Silakan hubungi admin.', 'warning');
          } else if (errorMsg.includes('waktu absen')) {
            showToastLocal('⏰ ' + errorMsg, 'warning');
          } else {
            showToastLocal('❌ ' + errorMsg, 'danger');
          }
        } finally {
          btn.disabled = false;
          btn.innerHTML = '📋 Kirim Absen';
        }
      });

      if (!isQRMode) {
        setTimeout(() => restoreAbsenFormState(), 100);
        if (document.getElementById('namaAbsen')) document.getElementById('namaAbsen').addEventListener('input', saveAbsenFormState);
        if (document.getElementById('pilihSesiAbsen')) document.getElementById('pilihSesiAbsen').addEventListener('change', saveAbsenFormState);
      }
    }

    // ==========================================================
    //   TOGGLE PASSWORD (Global)
    // ==========================================================
    window.togglePassword = function(id) {
      const input = document.getElementById(id);
      if (input) input.type = input.type === 'password' ? 'text' : 'password';
    };

    // ==========================================================
    //   🔥 LOAD SESI
    // ==========================================================
    async function loadAbsenSesi() {
      const container = document.getElementById('absenContainer');
      const urlParams = new URLSearchParams(window.location.search);
      const sesiIdFromUrl = urlParams.get('sesi_id');
      const tokenFromUrl = urlParams.get('token');
      const isQRMode = !!(sesiIdFromUrl && tokenFromUrl);

      if (isQRMode) clearAbsenFormState();

      try {
        const freshSesi = await fetchSesiAbsen();
        if (freshSesi && Array.isArray(freshSesi) && freshSesi.length > 0) {
          renderForm(freshSesi, sesiIdFromUrl, tokenFromUrl, isQRMode);
          console.log('✅ Absen: data sesi dimuat dari API.');
        } else {
          container.innerHTML = '<div class="alert alert-info text-center">Belum ada sesi absen tersedia.</div>';
        }
      } catch (e) {
        container.innerHTML = `<div class="alert alert-danger">Gagal memuat sesi: ${escapeHtmlLocal(e.message)}</div>`;
      }
    }

    // ==========================================================
    //   🛡️ GUARD PUBLIC ACCESS & BOOT
    // ==========================================================
    (async function boot() {
      const canAccess = await guardPublicAccess();
      if (!canAccess) return;

      updateNavbarMenu();
      await loadAbsenSesi();
    })();

    // ==========================================================
    //   🔥 PERBAIKAN UTAMA: SKELETON MUNCUL SEBELUM KODE LAIN
    // ==========================================================
    document.addEventListener('DOMContentLoaded', function() {
      const container = document.getElementById('absenContainer');
      if (container) {
        renderSkeletonAbsen(container);
      }
    });

  </script>
</body>
</html>
