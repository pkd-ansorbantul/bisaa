<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>Skrining PKD · GP Ansor Bantul</title>

  <!-- Favicon & Font -->
  <link rel="icon" type="image/png" href="/bisaa/LOGO%20ANSOR.webp">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <!-- Bootstrap 5 + Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Signature Pad -->
  <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>

  <style>
    /* ===== GLOBAL RESET ===== */
    * { font-family: 'Inter', system-ui, sans-serif; }
    body { background: #f8fafc; color: #0f172a; min-height: 100vh; display: flex; flex-direction: column; }

    /* --- HEADER MINIMALIS ELEGAN --- */
    .header-minimal {
      background: rgba(255, 255, 255, 0.72) !important;
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.3);
      z-index: 1030;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.04);
      padding-top: 0 !important; padding-bottom: 0 !important;
    }
    .header-minimal .container { padding-top: 0.75rem; padding-bottom: 0.75rem; }
    .btn-back {
      background: rgba(37, 99, 235, 0.08); color: #2563eb;
      border: 1px solid rgba(37, 99, 235, 0.2);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .btn-back:hover { background: #2563eb; color: white; transform: translateX(-3px); box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25); }
    .brand-logo-mini { height: 40px; width: auto; margin-right: 14px; transition: transform 0.2s; }
    .brand-logo-mini:hover { transform: scale(1.05); }
    .brand-title-mini { font-weight: 700; color: #0a3d62; font-size: 1.3rem; line-height: 1.2; letter-spacing: -0.02em; }
    .brand-sub-mini { font-size: 0.8rem; color: #64748b; display: block; margin-top: 0px; letter-spacing: 0.02em; }
    #navbarUserMenu { display: flex; align-items: center; gap: 8px; }
    .user-menu-area .dropdown-toggle { border-radius: 50px; padding: 0.3rem 1rem; font-size: 0.9rem; }
    .user-menu-area .btn-outline-primary { border-radius: 50px; padding: 0.3rem 1.2rem; font-size: 0.9rem; }

    /* --- GLASS CARD --- */
    .glass-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px) saturate(180%);
      -webkit-backdrop-filter: blur(12px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
      transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      padding: 1.5rem;
      position: relative;
      overflow: visible !important;
    }
    .glass-card:hover { transform: translateY(-4px); box-shadow: 0 20px 50px rgba(37, 99, 235, 0.08); border-color: rgba(37, 99, 235, 0.2); }

    /* --- SKELETON --- */
    .skeleton-box { background: #e2e8f0; border-radius: 8px; animation: pulse 1.5s infinite ease-in-out; display: inline-block; }
    @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }

    /* --- MODE SWITCH --- */
    .mode-switch-wrapper { display: flex; justify-content: center; margin-bottom: 1.5rem; }
    .mode-switch-btn {
      background: #f1f5f9; border-radius: 9999px; padding: 4px; display: inline-flex; position: relative;
    }
    .mode-switch-btn .btn-option {
      border-radius: 9999px; padding: 0.5rem 1.5rem; font-weight: 500; transition: all 0.2s;
      cursor: pointer; border: none; background: transparent; color: #64748b;
    }
    .mode-switch-btn .btn-option.active { background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.08); color: #2563eb; }
    .mode-switch-btn .btn-option:hover:not(.active) { background: rgba(255,255,255,0.5); }

    /* --- SIGNATURE AREA --- */
    .signature-area {
      border: 2px dashed #cbd5e1; border-radius: 20px; background: white; padding: 12px;
      transition: border-color 0.2s;
    }
    .signature-area:hover { border-color: #2563eb; }
    .signature-area canvas {
      width: 100%; height: auto; max-width: 300px; max-height: 150px;
      background: white; display: block; border-radius: 12px; margin: 0 auto; touch-action: none;
    }

    /* --- WIZARD INDICATOR (BISA DIKLIK!) --- */
    .wizard-indicator { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
    .wizard-indicator .dot {
      width: 12px; height: 12px; border-radius: 50%;
      background: #e2e8f0; transition: all 0.3s ease;
      cursor: pointer; border: none; padding: 0;
    }
    .wizard-indicator .dot:hover { transform: scale(1.15); }
    .wizard-indicator .dot.active { background: #2563eb; transform: scale(1.3); }
    .wizard-indicator .dot.completed { background: #22c55e; }

    .question-number {
      display: inline-block; width: 28px; height: 28px; background: #2563eb; color: white;
      border-radius: 50%; text-align: center; line-height: 28px; font-size: 0.8rem; font-weight: 600;
      margin-right: 8px;
    }
    .radio-group .form-check { margin-right: 1.5rem; }
    .radio-group .form-check-input:checked { background-color: #2563eb; border-color: #2563eb; }

    /* --- FOOTER --- */
    .footer-modern {
      font-size: 0.85rem; color: #64748b; margin-top: auto; text-align: center;
      padding: 1.5rem 0; border-top: 1px solid #e2e8f0; background: white;
    }

    /* --- RESPONSIVE --- */
    @media (max-width: 576px) {
      .glass-card { border-radius: 16px; padding: 1rem !important; }
      .header-minimal .container { padding: 0 0.5rem; }
      .btn-back { font-size: 0.8rem; padding: 0.2rem 0.8rem; }
      .brand-title-mini { display: none; } .brand-sub-mini { display: none; }
      .signature-area canvas { max-width: 100%; }
    }
  </style>
</head>
<body>

  <!-- ================= HEADER ================= -->
  <header class="header-minimal sticky-top shadow-sm">
    <div class="container d-flex justify-content-between align-items-center py-3">
      <div class="d-flex align-items-center gap-2">
        <a href="/bisaa/index.html" class="btn btn-back rounded-pill"><i class="bi bi-arrow-left me-1"></i> Kembali</a>
        <a href="/bisaa/index.html" class="brand-minimal text-decoration-none d-flex align-items-center ms-1">
          <img src="/bisaa/LOGO%20ANSOR.webp" alt="GP Ansor" class="brand-logo-mini">
          <div><div class="brand-title-mini">PKD GP Ansor</div><span class="brand-sub-mini">Kabupaten Bantul</span></div>
        </a>
      </div>
      <div id="navbarUserMenu" class="user-menu-area"></div>
    </div>
  </header>

  <!-- ================= KONTEN ================= -->
  <div id="contentArea" class="container" style="padding: 2rem 0; max-width: 1000px;">
    <div class="glass-card p-4 fade-up">
      <h2 class="section-title"><i class="bi bi-clipboard-check me-2"></i>Form Skrining PKD</h2>
      
      <div class="mode-switch-wrapper">
        <div class="mode-switch-btn">
          <button class="btn-option active" id="modeWizardBtn" data-mode="wizard"><i class="bi bi-arrow-right-circle me-1"></i> Bertahap</button>
          <button class="btn-option" id="modeAllBtn" data-mode="all"><i class="bi bi-list-ul me-1"></i> Tampil Semua</button>
        </div>
      </div>

      <div id="skriningFormContainer" style="position: relative; width: 100%; min-height: 350px; overflow: visible !important;">
      </div>
    </div>
  </div>

  <!-- ================= FOOTER ================= -->
  <footer class="footer-modern container">
    <div class="d-flex justify-content-center align-items-center gap-2">
      <i class="bi bi-c-circle"></i>
      <span>Hak Cipta 2026 - Tim Instruktur GP Ansor Kabupaten Bantul</span>
    </div>
  </footer>

  <!-- ================= TOAST ================= -->
  <div class="toast-container position-fixed top-0 end-0 p-3">
    <div id="notificationToast" class="toast border-0 shadow-lg" role="alert" data-bs-delay="3000">
      <div class="toast-header bg-white border-0">
        <i class="bi me-2" id="toastIcon"></i>
        <strong class="me-auto" id="toastTitle">Berhasil</strong>
        <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
      </div>
      <div class="toast-body" id="toastMessage"></div>
    </div>
  </div>

  <!-- ================= MODAL PREVIEW & KONFIRMASI ================= -->
  <div class="modal fade" id="previewModal" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content border-0 shadow-lg">
        <div class="modal-header bg-primary text-white border-0 rounded-top-4">
          <h5 class="modal-title" id="previewModalTitle"><i class="bi bi-eye me-2"></i>Preview & Konfirmasi Data Skrining</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-4" style="max-height: 65vh; overflow-y: auto;">
          <p class="text-muted mb-3">Berikut adalah total semua jawaban Anda. Periksa kembali sebelum mengirim.</p>
          <div id="summaryContent" class="row g-2"></div>
        </div>
        <div class="modal-footer border-0 justify-content-between">
          <button type="button" class="btn btn-outline-secondary rounded-pill px-4" id="modalEditBtn"><i class="bi bi-pencil me-1"></i> Kembali (Edit)</button>
          <button type="button" class="btn btn-success rounded-pill px-4" id="modalFinalSubmitBtn"><i class="bi bi-check-circle-fill me-1"></i> Ya, Kirim Data</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ================= SCRIPTS ================= -->
  <!-- Library Eksternal (tetap sebagai script biasa) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Modul ES Khusus Halaman Ini -->
  <script type="module">
    // ==========================================================
    //   IMPOR DARI CORE API (ES Modules)
    // ==========================================================
    import {
      guardPublicAccess,
      getSkriningQuestions,
      submitSkrining,
      showToast,
      updateNavbarMenu
    } from './js/core/api.js';

    // ==========================================================
    //   STATE & VARIABLES
    // ==========================================================
    let questions = [],
        sigPad = null,
        isSubmitting = false,
        currentStep = 0,
        currentMode = 'wizard';
    const FORM_STATE_KEY = 'skriningFormState';

    // ==========================================================
    //   UTILITY
    // ==========================================================
    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/[&<>"]/g, m => {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        if (m === '"') return '&quot;';
        return m;
      });
    }

    function showToastLocal(message, type = 'success') { showToast(message, type); }

    function generateFieldName(teks) {
      return teks.toLowerCase().replace(/[^a-z0-9\s]/g, '').replace(/\s+/g, '_').substring(0, 50);
    }

    function isLongText(teks) {
      const keywords = ['alamat', 'pengetahuan', 'alasan', 'catatan', 'deskripsi', 'riwayat'];
      return keywords.some(k => teks.toLowerCase().includes(k));
    }

    function getPlaceholder(teks) {
      const lower = teks.toLowerCase();
      if (lower.includes('nama lengkap')) return 'Contoh: Ulinnuha atau Ahmad Fauzi';
      if (lower.includes('alamat')) return 'Contoh: Jl. Imogiri Timur KM 10, Bantul, D.I.Yogyakarta';
      if (lower.includes('info rekrutmen') || lower.includes('info')) return 'Contoh: Instagram / WhatsApp / Teman / Website resmi';
      if (lower.includes('pengetahuan tentang ansor')) return 'Contoh: Sudah cukup paham / Baru tahu dari teman / Belum tahu sama sekali';
      if (lower.includes('riwayat penyakit')) return 'Contoh: Tidak ada / Asma ringan / Hipertensi (jika ada)';
      if (lower.includes('alasan tertarik') || lower.includes('alasan')) return 'Contoh: Ingin menjadi kader yang bermanfaat bagi masyarakat & NU';
      if (lower.includes('catatan')) return 'Contoh: Saya siap mengikuti seluruh rangkaian acara PKD.';
      return isLongText(teks) ? 'Tuliskan jawaban Anda secara lengkap...' : 'Masukkan jawaban Anda...';
    }

    function saveFormState() {
      const form = document.getElementById('formSkriningDinamis');
      if (!form) return;
      const formData = new FormData(form);
      const data = {};
      formData.forEach((v, k) => data[k] = v);
      data.currentMode = currentMode;
      data.currentStep = currentStep;
      if (sigPad && !sigPad.isEmpty()) data.signatureData = sigPad.toData();
      try { localStorage.setItem(FORM_STATE_KEY, JSON.stringify(data)); } catch (e) {}
    }

    function restoreFormState() {
      const saved = localStorage.getItem(FORM_STATE_KEY);
      if (!saved) return;
      try {
        const data = JSON.parse(saved);
        const form = document.getElementById('formSkriningDinamis');
        if (!form) return;
        if (data.currentMode) currentMode = data.currentMode;
        if (data.currentStep !== undefined) currentStep = data.currentStep;
        document.getElementById('modeWizardBtn').classList.toggle('active', currentMode === 'wizard');
        document.getElementById('modeAllBtn').classList.toggle('active', currentMode === 'all');
        Object.keys(data).forEach(key => {
          if (key === 'signatureData' || key === 'currentMode' || key === 'currentStep') return;
          const field = form.querySelector(`[name="${key}"]`);
          if (field) {
            if (field.type === 'radio' || field.type === 'checkbox') {
              field.checked = (field.value === data[key]);
            } else {
              field.value = data[key];
            }
          }
        });
        if (data.signatureData && sigPad) sigPad.fromData(data.signatureData);
      } catch (e) {}
    }

    function clearFormState() { localStorage.removeItem(FORM_STATE_KEY); }

    // ==========================================================
    //   🔥 RENDER SKELETON (Didefinisikan di awal)
    // ==========================================================
    function renderSkeletonForm(container) {
      if (!container) return;
      console.log("🟡 Menampilkan SKELETON Skrining...");
      let html = `
        <h4 class="mb-4">📝 Memuat data skrining...</h4>
        <div class="glass-card" style="background: #f8fafc; padding: 1.5rem;">
          <div class="mb-3"><div class="skeleton-box" style="height:16px;width:120px;margin-bottom:6px;"></div><div class="skeleton-box" style="height:40px;width:100%;border-radius:8px;"></div></div>
          <div class="mb-3"><div class="skeleton-box" style="height:16px;width:120px;margin-bottom:6px;"></div><div class="skeleton-box" style="height:40px;width:100%;border-radius:8px;"></div></div>
          <div class="mb-3"><div class="skeleton-box" style="height:16px;width:120px;margin-bottom:6px;"></div><div class="skeleton-box" style="height:80px;width:100%;border-radius:8px;"></div></div>
          <div class="text-center mt-4"><div class="skeleton-box" style="height:48px;width:200px;border-radius:50px;"></div></div>
        </div>
      `;
      container.innerHTML = html;
      container.classList.add('fade-up');
    }

    // ==========================================================
    //   RENDER FORM
    // ==========================================================
    function renderForm() {
      const container = document.getElementById('skriningFormContainer');
      if (!questions || questions.length === 0) {
        container.innerHTML = `<div class="alert alert-warning border-0 shadow-sm glass-card"><i class="bi bi-exclamation-triangle me-2"></i>Belum ada pertanyaan skrining.</div>`;
        return;
      }
      const sorted = [...questions].sort((a, b) => (a.urutan || 0) - (b.urutan || 0));
      if (currentMode === 'wizard') {
        renderFormWizardAllAtOnce(container, sorted);
      } else {
        renderFormAll(container, sorted);
      }
    }

    // ==========================================================
    //   🔥 METODE UTAMA: WIZARD
    // ==========================================================
    function renderFormWizardAllAtOnce(container, sorted) {
      let indicatorHtml = `<div class="wizard-indicator" id="wizardIndicatorContainer">`;
      const totalSteps = sorted.length + 1;
      for (let i = 0; i < totalSteps; i++) {
        const cls = i === currentStep ? 'active' : (i < currentStep ? 'completed' : '');
        indicatorHtml += `<button type="button" class="dot ${cls}" data-step-index="${i}"></button>`;
      }
      indicatorHtml += `</div>`;

      const stepsArray = [];
      let idx = 0;
      sorted.forEach(q => {
        const fieldName = generateFieldName(q.teks);
        const displayStyle = idx === 0 ? 'block' : 'none';
        let stepHtml = `<div id="step-${idx}" style="display: ${displayStyle}; width: 100%; position: relative; min-height: 150px; margin-top: 15px;">`;
        stepHtml += `<div class="form-section">`;
        stepHtml += `<label class="form-label"><span class="question-number">${idx + 1}</span>${escapeHtml(q.teks)}${q.jenis !== 'radio' ? ' <span class="text-danger">*</span>' : ''}</label>`;

        if (q.jenis === 'radio') {
          const options = (q.opsi || '').split(',').filter(s => s.trim() !== '');
          stepHtml += `<div class="radio-group">`;
          options.forEach((opt, i) => {
            stepHtml += `<div class="form-check form-check-inline"><input class="form-check-input" type="radio" name="${fieldName}" value="${opt.trim()}" id="${fieldName}_${i}" ${i === 0 ? 'checked' : ''}><label class="form-check-label" for="${fieldName}_${i}">${opt.trim()}</label></div>`;
          });
          stepHtml += `</div>`;
        } else {
          const placeholder = getPlaceholder(q.teks);
          if (isLongText(q.teks)) {
            stepHtml += `<textarea class="form-control" name="${fieldName}" rows="3" placeholder="${escapeHtml(placeholder)}" required></textarea>`;
          } else {
            stepHtml += `<input type="text" class="form-control" name="${fieldName}" placeholder="${escapeHtml(placeholder)}" required>`;
          }
        }

        stepHtml += `<div class="mt-3 d-flex justify-content-between align-items-center">`;
        if (idx > 0) {
          stepHtml += `<button type="button" class="btn btn-outline-secondary btn-sm rounded-pill prev-step" data-step="${idx}"><i class="bi bi-arrow-left me-1"></i> Sebelumnya</button>`;
        } else {
          stepHtml += `<div></div>`;
        }
        if (idx < sorted.length - 1) {
          stepHtml += `<button type="button" class="btn btn-primary btn-sm rounded-pill next-step" data-step="${idx}">Selanjutnya <i class="bi bi-arrow-right ms-1"></i></button>`;
        } else {
          stepHtml += `<button type="button" class="btn btn-primary btn-sm rounded-pill next-step" data-step="${idx}">Selanjutnya <i class="bi bi-arrow-right ms-1"></i></button>`;
        }
        stepHtml += `</div>`;
        stepHtml += `</div>`;
        stepHtml += `</div>`;
        stepsArray.push(stepHtml);
        idx++;
      });

      const sigDisplay = idx === currentStep ? 'block' : 'none';
      let sigHtml = `<div id="step-${idx}" style="display: ${sigDisplay}; width: 100%; position: relative; min-height: 150px; margin-top: 15px;">`;
      sigHtml += `
        <div class="form-section">
          <label class="form-label fw-bold"><span class="question-number">${idx + 1}</span>✍️ Tanda Tangan Assessor</label>
          <div class="signature-area"><canvas id="signatureCanvasSkrining" width="300" height="150"></canvas></div>
          <div class="signature-buttons mt-2 d-flex gap-2">
            <button type="button" class="btn btn-outline-secondary btn-sm" id="clearSkriningSign"><i class="bi bi-eraser me-1"></i> Hapus</button>
            <button type="button" class="btn btn-outline-primary btn-sm" id="undoSkriningSign"><i class="bi bi-arrow-counterclockwise me-1"></i> Undo</button>
          </div>
        </div>
        <div class="mt-3 d-flex justify-content-between align-items-center">
          <button type="button" class="btn btn-outline-secondary btn-sm rounded-pill prev-step" data-step="${idx}"><i class="bi bi-arrow-left me-1"></i> Sebelumnya</button>
          <button type="button" class="btn btn-outline-primary btn-lg rounded-pill px-5" id="previewAnswersBtn"><i class="bi bi-eye me-1"></i> Preview Semua Jawaban</button>
          <button type="submit" class="btn btn-success btn-lg rounded-pill px-5">📤 Kirim Skrining</button>
        </div>
      `;
      sigHtml += `</div>`;
      stepsArray.push(sigHtml);

      const formHtml = `${indicatorHtml}<form id="formSkriningDinamis" novalidate>${stepsArray.join('')}</form>`;
      container.innerHTML = formHtml;
      container.classList.add('fade-up');

      initSignaturePad();
      handleWizardNavigation();
      handlePreviewButton();
      handleSubmit();

      setTimeout(() => restoreFormState(), 100);
    }

    function renderFormAll(container, sorted) {
      let questionsHtml = '';
      let stepIndex = 0;
      sorted.forEach(q => {
        const fieldName = generateFieldName(q.teks);
        const placeholder = getPlaceholder(q.teks);
        questionsHtml += `<div class="form-section mb-4 pb-3 border-bottom border-light">`;
        questionsHtml += `<label class="form-label"><span class="question-number">${stepIndex + 1}</span>${escapeHtml(q.teks)}${q.jenis !== 'radio' ? ' <span class="text-danger">*</span>' : ''}</label>`;
        if (q.jenis === 'radio') {
          const options = (q.opsi || '').split(',').filter(s => s.trim() !== '');
          questionsHtml += `<div class="radio-group">`;
          options.forEach((opt, idx) => {
            questionsHtml += `<div class="form-check form-check-inline"><input class="form-check-input" type="radio" name="${fieldName}" value="${opt.trim()}" id="${fieldName}_${idx}" ${idx === 0 ? 'checked' : ''}><label class="form-check-label" for="${fieldName}_${idx}">${opt.trim()}</label></div>`;
          });
          questionsHtml += `</div>`;
        } else {
          if (isLongText(q.teks)) {
            questionsHtml += `<textarea class="form-control" name="${fieldName}" rows="3" placeholder="${escapeHtml(placeholder)}" required></textarea>`;
          } else {
            questionsHtml += `<input type="text" class="form-control" name="${fieldName}" placeholder="${escapeHtml(placeholder)}" required>`;
          }
        }
        questionsHtml += `</div>`;
        stepIndex++;
      });
      const formHtml = `
        <form id="formSkriningDinamis" novalidate>
          ${questionsHtml}
          <div class="form-section mt-4">
            <label class="form-label fw-bold">✍️ Tanda Tangan Assessor</label>
            <div class="signature-area"><canvas id="signatureCanvasSkrining" width="300" height="150"></canvas></div>
            <div class="signature-buttons mt-2 d-flex gap-2">
              <button type="button" class="btn btn-outline-secondary btn-sm" id="clearSkriningSign"><i class="bi bi-eraser me-1"></i> Hapus</button>
              <button type="button" class="btn btn-outline-primary btn-sm" id="undoSkriningSign"><i class="bi bi-arrow-counterclockwise me-1"></i> Undo</button>
            </div>
            <div class="mt-3 d-flex justify-content-between align-items-center">
              <button type="button" class="btn btn-outline-primary btn-lg rounded-pill px-5" id="previewAnswersBtn"><i class="bi bi-eye me-1"></i> Preview Semua Jawaban</button>
              <button type="submit" class="btn btn-success btn-lg rounded-pill px-5">📤 Kirim Skrining</button>
            </div>
          </div>
        </form>
      `;
      container.innerHTML = formHtml;
      container.classList.add('fade-up');
      initSignaturePad();
      handlePreviewButton();
      handleSubmit();
      setTimeout(() => restoreFormState(), 50);
    }

    function initSignaturePad() {
      const canvas = document.getElementById('signatureCanvasSkrining');
      if (canvas) {
        if (sigPad) { sigPad.clear(); sigPad = null; }
        sigPad = new SignaturePad(canvas, { backgroundColor: 'white', penColor: '#0f172a', minWidth: 1.5, maxWidth: 3 });
        sigPad.clear();
        document.getElementById('clearSkriningSign')?.addEventListener('click', () => { sigPad.clear(); saveFormState(); });
        document.getElementById('undoSkriningSign')?.addEventListener('click', () => {
          const data = sigPad.toData();
          if (data && data.length > 0) { data.pop(); sigPad.fromData(data); saveFormState(); }
        });
        sigPad.addEventListener('endStroke', saveFormState);
      }
    }

    // ==========================================================
    //   NAVIGASI
    // ==========================================================
    function handleWizardNavigation() {
      document.querySelectorAll('.wizard-indicator .dot').forEach(dot => {
        dot.addEventListener('click', function(e) {
          e.preventDefault();
          const targetStep = parseInt(this.dataset.stepIndex);
          jumpToStep(targetStep);
        });
      });

      document.querySelectorAll('.next-step').forEach(btn => {
        btn.addEventListener('click', function() {
          const current = parseInt(this.dataset.step);
          const currentStepDiv = document.getElementById('step-' + current);
          if (!currentStepDiv) return;

          function isVisible(el) {
            return el.getClientRects().length > 0 && window.getComputedStyle(el).display !== 'none' && el.offsetWidth > 0 && el.offsetHeight > 0;
          }

          const inputs = Array.from(currentStepDiv.querySelectorAll('input[required], textarea[required], select[required]')).filter(el => isVisible(el));

          let valid = true;
          let firstEmptyInput = null;
          inputs.forEach(inp => { inp.style.borderColor = ''; });

          inputs.forEach(inp => {
            let isEmpty = false;
            if (inp.type === 'radio') {
              const name = inp.name;
              const checked = currentStepDiv.querySelector(`input[name="${name}"]:checked`);
              if (!checked) isEmpty = true;
            } else if (inp.tagName === 'SELECT') {
              if (!inp.value || inp.value === '') isEmpty = true;
            } else {
              if (!inp.value.trim()) isEmpty = true;
            }
            if (isEmpty) {
              valid = false;
              if (!firstEmptyInput) firstEmptyInput = inp;
            }
          });

          if (!valid) {
            if (firstEmptyInput) {
              firstEmptyInput.style.borderColor = '#dc3545';
              firstEmptyInput.focus();
              setTimeout(() => { firstEmptyInput.style.borderColor = ''; }, 3000);
            }
            showToastLocal('Harap isi semua field wajib pada langkah ini!', 'warning');
            return;
          }

          jumpToStep(current + 1);
        });
      });

      document.querySelectorAll('.prev-step').forEach(btn => {
        btn.addEventListener('click', function() {
          const current = parseInt(this.dataset.step);
          if (current > 0) jumpToStep(current - 1);
        });
      });
    }

    function jumpToStep(targetStep) {
      const totalSteps = document.querySelectorAll('[id^="step-"]').length;
      if (targetStep < 0 || targetStep >= totalSteps) return;

      currentStep = targetStep;
      saveFormState();

      document.querySelectorAll('[id^="step-"]').forEach(el => {
        el.style.display = 'none';
        el.classList.remove('active');
      });

      const targetEl = document.getElementById('step-' + targetStep);
      if (targetEl) {
        targetEl.style.display = 'block';
        targetEl.classList.add('active');
        targetEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }

      document.querySelectorAll('.wizard-indicator .dot').forEach(dot => {
        const idx = parseInt(dot.dataset.stepIndex);
        dot.classList.remove('active', 'completed');
        if (idx === targetStep) dot.classList.add('active');
        else if (idx < targetStep) dot.classList.add('completed');
      });

      console.log(`✅ Pindah ke langkah ${targetStep}`);
    }

    // ==========================================================
    //   PREVIEW & SUBMIT
    // ==========================================================
    function extractCurrentFormData() {
      const form = document.getElementById('formSkriningDinamis');
      const formData = new FormData(form);
      const answers = {};
      formData.forEach((v, k) => answers[k] = v);

      const signatureDataURL = sigPad ? sigPad.toDataURL('image/jpeg', 0.3) : null;
      const params = { signature: signatureDataURL };
      const fixedFields = ['nama', 'alamat', 'info', 'pengetahuan', 'qunut', 'penyakit', 'pernah', 'alasan', 'catatan'];
      const dataJson = {};
      const sorted = [...questions].sort((a, b) => (a.urutan || 0) - (b.urutan || 0));

      sorted.forEach(q => {
        const fieldName = generateFieldName(q.teks);
        const value = answers[fieldName] || '';
        let isFixed = false;
        const lowerTeks = q.teks.toLowerCase();
        for (const f of fixedFields) {
          if (lowerTeks.includes(f)) { params[f] = value; isFixed = true; break; }
        }
        if (!isFixed) dataJson[fieldName] = value;
      });
      params.dataJson = JSON.stringify(dataJson);

      return { params, sorted, answers };
    }

    function handlePreviewButton() {
      document.getElementById('previewAnswersBtn')?.addEventListener('click', function() {
        if (!sigPad || sigPad.isEmpty()) {
          showToastLocal('Mohon isi tanda tangan terlebih dahulu sebelum preview.', 'warning');
          return;
        }
        const data = extractCurrentFormData();
        showSummaryModal(data.params, data.sorted, data.answers, true);
      });
    }

    function handleSubmit() {
      document.getElementById('formSkriningDinamis')?.addEventListener('submit', async function(e) {
        e.preventDefault();
        if (isSubmitting) return;
        const data = extractCurrentFormData();
        const { params, sorted, answers } = data;

        function isVisible(el) {
          return el.getClientRects().length > 0 && window.getComputedStyle(el).display !== 'none';
        }

        const form = document.getElementById('formSkriningDinamis');
        const inputs = Array.from(form.querySelectorAll('input[required], textarea[required], select[required]')).filter(el => isVisible(el));
        let valid = true;
        let firstEmptyInput = null;
        inputs.forEach(inp => {
          inp.style.borderColor = '';
          let isEmpty = false;
          if (inp.type === 'radio') {
            const name = inp.name;
            const checked = form.querySelector(`input[name="${name}"]:checked`);
            if (!checked) isEmpty = true;
          } else if (inp.tagName === 'SELECT') {
            if (!inp.value || inp.value === '') isEmpty = true;
          } else {
            if (!inp.value.trim()) isEmpty = true;
          }
          if (isEmpty) {
            valid = false;
            if (!firstEmptyInput) firstEmptyInput = inp;
          }
        });

        if (!valid) {
          if (firstEmptyInput) {
            firstEmptyInput.style.borderColor = '#dc3545';
            firstEmptyInput.focus();
            setTimeout(() => { firstEmptyInput.style.borderColor = ''; }, 2000);
          }
          showToastLocal('Harap isi semua field wajib!', 'warning');
          return;
        }

        if (!sigPad || sigPad.isEmpty()) {
          showToastLocal('Tanda tangan assessor wajib diisi!', 'error');
          return;
        }

        showSummaryModal(params, sorted, answers, false);
      });
    }

    function showSummaryModal(params, sortedQuestions, rawAnswers, isPreviewMode) {
      const modalEl = document.getElementById('previewModal');
      const summaryContainer = document.getElementById('summaryContent');
      const modalTitle = document.getElementById('previewModalTitle');

      modalTitle.innerHTML = isPreviewMode ?
        '<i class="bi bi-eye me-2"></i>Preview Total Semua Jawaban' :
        '<i class="bi bi-check-circle me-2"></i>Konfirmasi & Kirim Data Skrining';

      let html = '';
      sortedQuestions.forEach(q => {
        const fieldName = generateFieldName(q.teks);
        const value = rawAnswers[fieldName] || '-';
        html += `
          <div class="col-md-6 mb-2">
            <div class="bg-light p-2 rounded-3 border border-0 shadow-sm small">
              <strong>${escapeHtml(q.teks)}</strong><br>
              <span class="text-primary fw-bold">${escapeHtml(value)}</span>
            </div>
          </div>
        `;
      });
      html += `
        <div class="col-md-12 mt-3">
          <div class="bg-success bg-opacity-10 p-2 rounded-3 border border-0 shadow-sm small text-success">
            <strong>✍️ Tanda Tangan Assessor:</strong> <i class="bi bi-check-circle-fill"></i> Sudah ditandatangani
          </div>
        </div>
      `;
      summaryContainer.innerHTML = html;

      const finalBtn = document.getElementById('modalFinalSubmitBtn');
      const newFinalBtn = finalBtn.cloneNode(true);
      finalBtn.parentNode.replaceChild(newFinalBtn, finalBtn);

      if (isPreviewMode) {
        newFinalBtn.innerHTML = '<i class="bi bi-check-circle-fill me-1"></i> Lanjut Kirim';
        newFinalBtn.addEventListener('click', function() {
          bootstrap.Modal.getInstance(modalEl).hide();
          document.getElementById('formSkriningDinamis')?.querySelector('button[type="submit"]')?.focus();
        });
      } else {
        newFinalBtn.innerHTML = '<i class="bi bi-check-circle-fill me-1"></i> Ya, Kirim Data';
        newFinalBtn.addEventListener('click', async function() {
          const btn = this;
          btn.disabled = true;
          btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Mengirim...';
          try {
            const result = await submitSkrining(params);
            if (result && result.success) {
              document.getElementById('formSkriningDinamis')?.reset();
              if (sigPad) sigPad.clear();
              clearFormState();
              jumpToStep(0);
              showToastLocal('✅ Skrining berhasil dikirim!', 'success');
              bootstrap.Modal.getInstance(modalEl).hide();
            } else {
              showToastLocal('❌ Gagal mengirim: ' + (result.message || 'Unknown error'), 'error');
            }
          } catch (e) {
            showToastLocal('❌ Gagal mengirim: ' + e.message, 'error');
          } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-check-circle-fill me-1"></i> Ya, Kirim Data';
          }
        });
      }

      document.getElementById('modalEditBtn')?.addEventListener('click', function() {
        bootstrap.Modal.getInstance(modalEl).hide();
      });

      new bootstrap.Modal(modalEl).show();
    }

    function getDefaultQuestions() {
      return [
        { id: 1, teks: 'Nama Lengkap', jenis: 'text', opsi: '', urutan: 1 },
        { id: 2, teks: 'Alamat', jenis: 'text', opsi: '', urutan: 2 },
        { id: 3, teks: 'Info rekrutmen (IG/FB/WA/Website/Teman/Saudara/Lainnya)', jenis: 'text', opsi: '', urutan: 3 },
        { id: 4, teks: 'Pengetahuan tentang Ansor', jenis: 'text', opsi: '', urutan: 4 },
        { id: 5, teks: 'Doa Qunut?', jenis: 'radio', opsi: 'Ya,Tidak', urutan: 5 },
        { id: 6, teks: 'Riwayat penyakit', jenis: 'text', opsi: '', urutan: 6 },
        { id: 7, teks: 'Pernah rekrutmen PKD / diklatsar?', jenis: 'radio', opsi: 'Ya,Tidak', urutan: 7 },
        { id: 8, teks: 'Alasan tertarik mengikuti PKD', jenis: 'text', opsi: '', urutan: 8 },
        { id: 9, teks: 'Catatan (opsional)', jenis: 'text', opsi: '', urutan: 9 }
      ];
    }

    async function switchMode(mode) {
      if (mode === currentMode) return;
      currentMode = mode;
      document.getElementById('modeWizardBtn').classList.toggle('active', mode === 'wizard');
      document.getElementById('modeAllBtn').classList.toggle('active', mode === 'all');
      currentStep = 0;
      renderForm();
      saveFormState();
    }

    // ==========================================================
    //   🛡️ GUARD PUBLIC ACCESS & BOOT
    // ==========================================================
    (async function boot() {
      const canAccess = await guardPublicAccess();
      if (!canAccess) return;

      // Update navbar user menu
      updateNavbarMenu();

      // Load data
      const container = document.getElementById('skriningFormContainer');

      // 1. Pastikan skeleton tetap terlihat saat memuat data (jika belum diganti oleh DOMContentLoaded)
      renderSkeletonForm(container);

      // Coba cache dengan fetch biasa + manual cache 
      const CACHE_KEY = 'skrining_questions';
      const CACHE_AGE = 30; // menit
      let cachedData = null;
      try {
        const item = localStorage.getItem('pkd_cache_' + CACHE_KEY);
        if (item) {
          const { data, timestamp } = JSON.parse(item);
          if ((Date.now() - timestamp) < CACHE_AGE * 60 * 1000) {
            cachedData = data;
          } else {
            localStorage.removeItem('pkd_cache_' + CACHE_KEY);
          }
        }
      } catch (e) {}

      if (cachedData && cachedData.length > 0) {
        questions = cachedData;
        renderForm();
      }

      // Event listener untuk mode switch
      document.getElementById('modeWizardBtn').addEventListener('click', () => switchMode('wizard'));
      document.getElementById('modeAllBtn').addEventListener('click', () => switchMode('all'));

      // Background refresh
      (async function refreshData() {
        try {
          const fresh = await getSkriningQuestions();
          if (fresh && Array.isArray(fresh.data) && fresh.data.length > 0) {
            const data = fresh.data;
            // Simpan ke cache
            try {
              localStorage.setItem('pkd_cache_' + CACHE_KEY, JSON.stringify({ data, timestamp: Date.now() }));
            } catch (e) {}
            if (JSON.stringify(questions) !== JSON.stringify(data)) {
              questions = data;
              renderForm();
            }
          } else if (!cachedData || cachedData.length === 0) {
            questions = getDefaultQuestions();
            renderForm();
          }
        } catch (e) {
          console.warn('Gagal fetch skrining di background:', e);
          if (!cachedData || cachedData.length === 0) {
            questions = getDefaultQuestions();
            renderForm();
          }
        }
      })();
    })();

    // ==========================================================
    //   🔥 PERBAIKAN UTAMA: SKELETON MUNCUL SEBELUM KODE LAIN
    // ==========================================================
    document.addEventListener('DOMContentLoaded', function() {
      // Render skeleton secara instan (sinkron) saat DOM siap
      const container = document.getElementById('skriningFormContainer');
      if (container) {
        renderSkeletonForm(container);
      }
    });

  </script>
