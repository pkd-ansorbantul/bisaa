<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>Skrining PKD - GP Ansor Bantul</title>
    <link rel="icon" type="image/png" href="/bisaa/LOGO%20ANSOR.webp">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #f8fafc; color: #0f172a; min-height: 100vh; }
        .navbar { background: rgba(255,255,255,0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(203,213,225,0.3); }
        .navbar-brand img { max-height: 40px; margin-right: 12px; }
        .brand-title { font-size: 1.35rem; font-weight: 700; color: #0a3d62; }
        .brand-sub { font-size: 0.9rem; color: #6c757d; display: block; }
        .container-card {
            max-width: 1000px;
            background: white;
            border-radius: 32px;
            padding: 2rem;
            margin: 30px auto;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
            border: 1px solid rgba(226,232,240,0.6);
        }
        .section-title {
            font-weight: 650;
            font-size: 1.75rem;
            border-left: 6px solid #2563eb;
            padding-left: 1.2rem;
            margin-bottom: 1.8rem;
        }
        .signature-area { border: 2px dashed #cbd5e1; border-radius: 20px; background: white; padding: 12px; }
        canvas { width: 100%; height: auto; max-width: 300px; max-height: 150px; background: white; display: block; border-radius: 12px; margin: 0 auto; }
        .signature-buttons { display: flex; gap: 12px; margin-top: 12px; justify-content: center; }
        .btn-signature { border-radius: 9999px; padding: 0.4rem 1.6rem; font-size: 0.9rem; }
        .footer-modern {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 3rem;
            text-align: center;
            padding: 1.5rem 0;
            border-top: 1px solid #e2e8f0;
            background: white;
        }
        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
        .toast { background: white; border-left: 5px solid; box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.15); border-radius: 16px; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .form-section { margin-bottom: 1.5rem; }
        .form-section .form-label { font-weight: 600; color: #1e293b; }
        .form-section .form-control, .form-section .form-select {
            border-radius: 12px;
            border: 1.5px solid #e2e8f0;
            padding: 0.6rem 1rem;
        }
        .form-section .form-control:focus, .form-section .form-select:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }
        .preview-table th { width: 35%; background: #f8fafc; }
        .preview-table td { background: white; }
        .preview-signature { border: 1px solid #e2e8f0; border-radius: 8px; padding: 4px; max-width: 200px; }
        .question-number {
            display: inline-block;
            width: 28px;
            height: 28px;
            background: #2563eb;
            color: white;
            border-radius: 50%;
            text-align: center;
            line-height: 28px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-right: 8px;
        }
        .radio-group .form-check { margin-right: 1.5rem; }
        .radio-group .form-check-input:checked { background-color: #2563eb; border-color: #2563eb; }
        .cache-status {
            font-size: 0.8rem;
            padding: 4px 12px;
            border-radius: 20px;
            background: #f1f5f9;
            display: inline-block;
        }
        .cache-status.live { background: #dcfce7; color: #16a34a; }
        .cache-status.offline { background: #fee2e2; color: #dc2626; }
        .refresh-btn {
            border-radius: 50%;
            width: 44px;
            height: 44px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        @media (max-width: 576px) {
            .container-card { padding: 1rem; }
            .refresh-btn { width: 40px; height: 40px; }
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg bg-white sticky-top shadow-sm">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="/bisaa/index.html">
            <img src="/bisaa/LOGO%20ANSOR.webp" alt="GP Ansor" class="me-2">
            <span><span class="brand-title">PKD GP Ansor</span><span class="brand-sub">Kabupaten Bantul</span></span>
        </a>
        <div class="ms-auto d-flex align-items-center gap-2">
            <button class="btn btn-outline-secondary refresh-btn" id="refreshBtn" title="Segarkan Data">
                <i class="bi bi-arrow-clockwise"></i>
            </button>
            <a href="/bisaa/index.html" class="btn btn-outline-primary rounded-pill px-4">
                <i class="bi bi-arrow-left"></i> Kembali
            </a>
        </div>
    </div>
</nav>

<!-- Konten utama -->
<div id="contentArea" class="container container-card">
    <h2 class="section-title"><i class="bi bi-clipboard-check me-2"></i>Form Skrining PKD</h2>
    <div id="skriningFormContainer">
        <!-- Akan diisi oleh JavaScript -->
    </div>
</div>

<!-- Footer -->
<footer class="footer-modern container">
    <div class="d-flex justify-content-center align-items-center gap-2">
        <i class="bi bi-c-circle"></i>
        <span>Hak Cipta 2026 - Tim Instruktur GP Ansor Kabupaten Bantul</span>
    </div>
</footer>

<!-- Modal preview skrining -->
<div class="modal fade" id="previewSkriningModal" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content border-0 shadow-lg">
            <div class="modal-header bg-primary text-white border-0 rounded-top-4">
                <h5 class="modal-title"><i class="bi bi-eye-fill me-2"></i>Preview Data Skrining</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4" id="previewSkriningBody">
                <div class="text-center"><div class="spinner-border text-primary"></div></div>
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-secondary rounded-pill px-4" data-bs-dismiss="modal">Tutup</button>
                <button type="button" class="btn btn-success rounded-pill px-4" id="previewKirimBtn">📤 Kirim Skrining</button>
            </div>
        </div>
    </div>
</div>

<!-- Toast notifikasi -->
<div class="toast-container">
    <div id="notificationToast" class="toast border-0 shadow-lg" role="alert" data-bs-delay="3000">
        <div class="toast-header bg-white border-0">
            <i class="bi me-2" id="toastIcon"></i>
            <strong class="me-auto" id="toastTitle">Berhasil</strong>
            <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
        </div>
        <div class="toast-body" id="toastMessage"></div>
    </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
<script src="/bisaa/dataCache.js"></script>
<script src="/bisaa/api.js"></script>

<script>
    (function() {
        'use strict';

        // =====================================================
        //   STATE & CONFIG
        // =====================================================
        let questions = [];
        let sigPad = null;
        let isSubmitting = false;
        let isRefreshing = false;
        let isInitialLoad = true;
        const FORM_STATE_KEY = 'skriningFormState';

        // =====================================================
        //   UTILITY FUNCTIONS
        // =====================================================
        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>"]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                if (m === '"') return '&quot;';
                return m;
            });
        }

        function showToast(message, type = 'success') {
            const toastEl = document.getElementById('notificationToast');
            if (!toastEl) return;
            const toast = new bootstrap.Toast(toastEl);
            document.getElementById('toastMessage').innerText = message;
            const icon = document.getElementById('toastIcon');
            if (type === 'success') {
                icon.className = 'bi bi-check-circle-fill text-success';
                document.getElementById('toastTitle').innerText = 'Berhasil';
            } else if (type === 'error') {
                icon.className = 'bi bi-x-circle-fill text-danger';
                document.getElementById('toastTitle').innerText = 'Gagal';
            } else {
                icon.className = 'bi bi-info-circle-fill text-primary';
                document.getElementById('toastTitle').innerText = 'Info';
            }
            toast.show();
        }

        function generateFieldName(teks) {
            return teks.toLowerCase()
                .replace(/[^a-z0-9\s]/g, '')
                .replace(/\s+/g, '_')
                .substring(0, 50);
        }

        function isLongText(teks) {
            const keywords = ['alamat', 'pengetahuan', 'alasan', 'catatan', 'deskripsi', 'riwayat'];
            return keywords.some(k => teks.toLowerCase().includes(k));
        }

        function saveFormState() {
            const form = document.getElementById('formSkriningDinamis');
            if (!form) return;
            const formData = new FormData(form);
            const data = {};
            formData.forEach((v, k) => data[k] = v);
            if (sigPad && !sigPad.isEmpty()) {
                data.signatureData = sigPad.toData();
            }
            try {
                localStorage.setItem(FORM_STATE_KEY, JSON.stringify(data));
            } catch (e) {}
        }

        function restoreFormState() {
            const saved = localStorage.getItem(FORM_STATE_KEY);
            if (!saved) return;
            try {
                const data = JSON.parse(saved);
                const form = document.getElementById('formSkriningDinamis');
                if (!form) return;
                Object.keys(data).forEach(key => {
                    if (key === 'signatureData') return;
                    const field = form.querySelector(`[name="${key}"]`);
                    if (field) {
                        if (field.type === 'radio' || field.type === 'checkbox') {
                            field.checked = (field.value === data[key]);
                        } else {
                            field.value = data[key];
                        }
                    }
                });
                if (data.signatureData && sigPad) {
                    sigPad.fromData(data.signatureData);
                }
            } catch (e) {}
        }

        function clearFormState() {
            localStorage.removeItem(FORM_STATE_KEY);
        }

        function getDefaultQuestions() {
            return [
                { id: 1, teks: 'Nama Lengkap', jenis: 'text', opsi: '', urutan: 1 },
                { id: 2, teks: 'Alamat', jenis: 'text', opsi: '', urutan: 2 },
                { id: 3, teks: 'Info rekrutmen (IG/FB/WA/Website/Teman/Saudara/Lainnya)', jenis: 'text', opsi: '', urutan: 3 },
                { id: 4, teks: 'Pengetahuan tentang Ansor', jenis: 'text', opsi: '', urutan: 4 },
                { id: 5, teks: 'Doa Qunut?', jenis: 'radio', opsi: 'Ya,Tidak', urutan: 5 },
                { id: 6, teks: 'Riwayat penyakit', jenis: 'text', opsi: '', urutan: 6 },
                { id: 7, teks: 'Pernah rekrutmen PKD / diklatsar?', jenis: 'radio', opsi: 'Ya,Tidak', urutan: 7 },
                { id: 8, teks: 'Alasan tertarik mengikuti PKD', jenis: 'text', opsi: '', urutan: 8 },
                { id: 9, teks: 'Catatan (opsional)', jenis: 'text', opsi: '', urutan: 9 }
            ];
        }

        // =====================================================
        //   CHECK LOGIN & REDIRECT
        // =====================================================
        async function checkLoginAndRedirect() {
            try {
                const loginMode = await PKD.getLoginMode();
                const requireLogin = loginMode.success ? loginMode.enabled : false;

                if (requireLogin) {
                    const auth = localStorage.getItem('pkd_auth') || sessionStorage.getItem('pkd_auth');
                    if (!auth) {
                        window.location.href = '/bisaa/login.html?return=skrining.html';
                        return false;
                    }

                    let userRole = PKD.getUserRole();
                    if (!userRole) {
                        try {
                            const parsed = JSON.parse(auth);
                            userRole = parsed.role || null;
                        } catch (e) {}
                    }
                    if (!userRole) {
                        window.location.href = '/bisaa/login.html?return=skrining.html';
                        return false;
                    }
                }
            } catch (e) {
                console.warn('Gagal cek mode login, melanjutkan tanpa login:', e);
            }
            return true;
        }

        // =====================================================
        //   DATA LOADING (menggunakan DataCache)
        // =====================================================
        async function loadSkriningQuestions(forceRefresh = false) {
            try {
                // Cek DataCache dulu
                if (!forceRefresh) {
                    const cached = DataCache.getData('skriningQuestions');
                    if (cached && Array.isArray(cached) && cached.length > 0) {
                        questions = cached;
                        renderForm(false);
                        
                        // --- UPDATE STATUS ---
                        const statusEl = document.getElementById('dataStatus');
                        if (statusEl) {
                            statusEl.textContent = '✅ Siap';
                            statusEl.className = 'badge bg-success text-white';
                        }
                        // -----------------------
                        if (isInitialLoad) {
                            isInitialLoad = false;
                        }
                        return;
                    }
                }

                // Jika tidak ada cache atau force refresh, tampilkan spinner
                const container = document.getElementById('skriningFormContainer');
                if (!questions || questions.length === 0) {
                    container.innerHTML = `
                        <div class="text-center my-4">
                            <div class="spinner-border text-primary"></div>
                            <p class="mt-2 text-muted">Memuat data skrining...</p>
                        </div>
                    `;
                }

                // Fetch dari API
                const fresh = await PKD.getSkriningQuestions(true);
                if (fresh && Array.isArray(fresh.data)) {
                    const freshQuestions = fresh.data;
                    questions = freshQuestions;
                    DataCache.updateData('skriningQuestions', questions);
                    renderForm(false);
                    
                    // --- UPDATE STATUS ---
                    const statusEl = document.getElementById('dataStatus');
                    if (statusEl) {
                        statusEl.textContent = '✅ Siap';
                        statusEl.className = 'badge bg-success text-white';
                    }
                    // -----------------------

                } else {
                    if (!questions || questions.length === 0) {
                        questions = getDefaultQuestions();
                        DataCache.updateData('skriningQuestions', questions);
                        renderForm(false);
                        
                        // --- UPDATE STATUS ---
                        const statusEl = document.getElementById('dataStatus');
                        if (statusEl) {
                            statusEl.textContent = '⚠️ Default';
                            statusEl.className = 'badge bg-warning text-dark';
                        }
                        // -----------------------
                    }
                }
                isInitialLoad = false;
            } catch (e) {
                console.warn('Gagal fetch questions:', e);
                if (!questions || questions.length === 0) {
                    questions = getDefaultQuestions();
                    DataCache.updateData('skriningQuestions', questions);
                    renderForm(false);
                    
                    // --- UPDATE STATUS ---
                    const statusEl = document.getElementById('dataStatus');
                    if (statusEl) {
                        statusEl.textContent = '❌ Offline';
                        statusEl.className = 'badge bg-danger text-white';
                    }
                    // -----------------------
                }
                isInitialLoad = false;
            }
        }

        // =====================================================
        //   RENDER FORM
        // =====================================================
        function renderForm(showSpinner = false) {
            const container = document.getElementById('skriningFormContainer');
            if (!questions || questions.length === 0) {
                container.innerHTML = `
                    <div class="alert alert-warning border-0 shadow-sm">
                        <i class="bi bi-exclamation-triangle me-2"></i>
                        Belum ada pertanyaan skrining. Silakan hubungi administrator.
                    </div>
                `;
                return;
            }

            const sorted = [...questions].sort((a, b) => (a.urutan || 0) - (b.urutan || 0));

            let html = '';
            if (showSpinner) {
                html = `
                    <div class="text-center my-4">
                        <div class="spinner-border text-primary"></div>
                        <p class="mt-2 text-muted">Memuat data skrining...</p>
                    </div>
                `;
                container.innerHTML = html;
                return;
            }

            html = `
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div>
                        <span class="text-muted small">Data: </span>
                        <span id="dataStatus" class="badge bg-light text-dark">⏳ Memuat...</span>
                    </div>
                    <button class="btn btn-sm btn-outline-secondary" id="inlineRefreshBtn" title="Segarkan">
                        <i class="bi bi-arrow-clockwise me-1"></i> Segarkan
                    </button>
                </div>
                <form id="formSkriningDinamis" novalidate>
            `;

            let questionNumber = 1;
            sorted.forEach(q => {
                const fieldName = generateFieldName(q.teks);
                html += `<div class="form-section">`;
                html += `<label class="form-label">`;
                html += `<span class="question-number">${questionNumber}</span>`;
                html += `${escapeHtml(q.teks)}`;
                if (q.jenis !== 'radio') {
                    html += ` <span class="text-danger">*</span>`;
                }
                html += `</label>`;

                if (q.jenis === 'radio') {
                    const options = (q.opsi || '').split(',').filter(s => s.trim() !== '');
                    html += `<div class="radio-group">`;
                    options.forEach((opt, idx) => {
                        html += `
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="${fieldName}" value="${opt.trim()}" id="${fieldName}_${idx}" ${idx === 0 ? 'checked' : ''}>
                                <label class="form-check-label" for="${fieldName}_${idx}">${opt.trim()}</label>
                            </div>
                        `;
                    });
                    html += `</div>`;
                } else {
                    if (isLongText(q.teks)) {
                        html += `<textarea class="form-control" name="${fieldName}" rows="3" placeholder="Masukkan jawaban Anda..." required></textarea>`;
                    } else {
                        html += `<input type="text" class="form-control" name="${fieldName}" placeholder="Masukkan jawaban Anda..." required>`;
                    }
                }

                html += `</div>`;
                questionNumber++;
            });

            // Signature pad
            html += `
                <div class="form-section">
                    <label class="form-label fw-bold">
                        <span class="question-number">${questionNumber}</span>
                        ✍️ Tanda Tangan Assessor
                    </label>
                    <div class="signature-area">
                        <canvas id="signatureCanvasSkrining" width="300" height="150"></canvas>
                    </div>
                    <div class="signature-buttons">
                        <button type="button" class="btn btn-outline-secondary btn-signature" id="clearSkriningSign">
                            <i class="bi bi-eraser me-1"></i> Hapus
                        </button>
                        <button type="button" class="btn btn-outline-primary btn-signature" id="undoSkriningSign">
                            <i class="bi bi-arrow-counterclockwise me-1"></i> Undo
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill mt-3">
                    <i class="bi bi-send me-2"></i> Kirim Skrining
                </button>
            `;

            html += `</form>`;

            container.innerHTML = html;
            container.classList.add('fade-in');

            // Inisialisasi signature pad
            const canvas = document.getElementById('signatureCanvasSkrining');
            if (canvas) {
                sigPad = new SignaturePad(canvas, {
                    backgroundColor: 'white',
                    penColor: '#0f172a',
                    minWidth: 1.5,
                    maxWidth: 3
                });
                sigPad.clear();

                document.getElementById('clearSkriningSign')?.addEventListener('click', () => {
                    sigPad.clear();
                    saveFormState();
                });

                document.getElementById('undoSkriningSign')?.addEventListener('click', () => {
                    const data = sigPad.toData();
                    if (data && data.length > 0) {
                        data.pop();
                        sigPad.fromData(data);
                        saveFormState();
                    }
                });

                sigPad.addEventListener('endStroke', saveFormState);
            }

            // Auto-save
            document.querySelectorAll('#formSkriningDinamis input, #formSkriningDinamis textarea, #formSkriningDinamis select').forEach(el => {
                el.addEventListener('input', saveFormState);
                el.addEventListener('change', saveFormState);
            });

            // Restore saved state after render
            setTimeout(() => {
                restoreFormState();
            }, 100);

            // Submit handler
            document.getElementById('formSkriningDinamis').addEventListener('submit', handleSubmit);

            // Inline refresh
            document.getElementById('inlineRefreshBtn')?.addEventListener('click', function() {
                this.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Memuat...';
                this.disabled = true;
                const statusEl = document.getElementById('dataStatus');
                if (statusEl) {
                    statusEl.textContent = '🔄 Memuat...';
                    statusEl.className = 'badge bg-light text-dark';
                }
                loadSkriningQuestions(true).then(() => {
                    this.innerHTML = '<i class="bi bi-arrow-clockwise me-1"></i> Segarkan';
                    this.disabled = false;
                    if (statusEl) {
                        statusEl.textContent = '✅ Siap';
                        statusEl.className = 'badge bg-success text-white';
                    }
                    showToast('Data diperbarui', 'success');
                }).catch(() => {
                    this.innerHTML = '<i class="bi bi-arrow-clockwise me-1"></i> Segarkan';
                    this.disabled = false;
                    if (statusEl) {
                        statusEl.textContent = '❌ Gagal';
                        statusEl.className = 'badge bg-danger text-white';
                    }
                    showToast('Gagal memperbarui', 'error');
                });
            });
        }

        // =====================================================
        //   HANDLE SUBMIT
        // =====================================================
        async function handleSubmit(e) {
            e.preventDefault();
            if (isSubmitting) return;

            if (!sigPad || sigPad.isEmpty()) {
                showToast('Tanda tangan assessor wajib diisi!', 'error');
                return;
            }

            const form = document.getElementById('formSkriningDinamis');
            const formData = new FormData(form);
            const answers = {};
            formData.forEach((v, k) => answers[k] = v);

            // Validasi
            const sorted = [...questions].sort((a, b) => (a.urutan || 0) - (b.urutan || 0));
            let missing = [];
            sorted.forEach(q => {
                if (q.jenis !== 'radio') {
                    const fieldName = generateFieldName(q.teks);
                    if (!answers[fieldName] || answers[fieldName].trim() === '') {
                        missing.push(q.teks);
                    }
                }
            });
            if (missing.length > 0) {
                showToast(`Harap isi: ${missing.join(', ')}`, 'error');
                return;
            }

            const signatureDataURL = sigPad.toDataURL('image/jpeg', 0.3);

            // Preview
            const modalBody = document.getElementById('previewSkriningBody');
            let previewHtml = `
                <div class="table-responsive">
                    <table class="table table-bordered preview-table">
                        <tbody>
            `;
            sorted.forEach(q => {
                const fieldName = generateFieldName(q.teks);
                const value = answers[fieldName] || '';
                previewHtml += `
                    <tr>
                        <th style="width: 40%;">${escapeHtml(q.teks)}</th>
                        <td>${escapeHtml(value)}</td>
                    </tr>
                `;
            });
            previewHtml += `
                        <tr>
                            <th>Tanda Tangan Assessor</th>
                            <td><img src="${signatureDataURL}" class="preview-signature" alt="Tanda Tangan"></td>
                        </tr>
                    </tbody>
                </table>
            `;
            modalBody.innerHTML = previewHtml;

            window.__skriningPreviewData = {
                answers: answers,
                signatureDataURL: signatureDataURL
            };

            new bootstrap.Modal(document.getElementById('previewSkriningModal')).show();
        }

        // =====================================================
        //   SUBMIT SKRINING
        // =====================================================
        document.getElementById('previewKirimBtn')?.addEventListener('click', async function() {
            if (!window.__skriningPreviewData || isSubmitting) return;
            isSubmitting = true;
            const btn = this;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Mengirim...';

            const { answers, signatureDataURL } = window.__skriningPreviewData;
            const params = { signature: signatureDataURL };
            const fixedFields = ['nama', 'alamat', 'info', 'pengetahuan', 'qunut', 'penyakit', 'pernah', 'alasan', 'catatan'];
            const dataJson = {};

            const sorted = [...questions].sort((a, b) => (a.urutan || 0) - (b.urutan || 0));
            sorted.forEach(q => {
                const fieldName = generateFieldName(q.teks);
                const value = answers[fieldName] || '';
                let isFixed = false;
                const lowerTeks = q.teks.toLowerCase();
                for (const f of fixedFields) {
                    if (lowerTeks.includes(f)) {
                        params[f] = value;
                        isFixed = true;
                        break;
                    }
                }
                if (!isFixed) {
                    dataJson[fieldName] = value;
                }
            });
            params.dataJson = JSON.stringify(dataJson);

            try {
                const result = await PKD.submitSkrining(params);
                if (result && result.success) {
                    showToast('✅ Skrining berhasil dikirim!', 'success');
                    document.getElementById('formSkriningDinamis')?.reset();
                    if (sigPad) sigPad.clear();
                    clearFormState();
                    bootstrap.Modal.getInstance(document.getElementById('previewSkriningModal')).hide();
                } else {
                    showToast('❌ Gagal mengirim: ' + (result.message || 'Unknown error'), 'error');
                }
            } catch (e) {
                showToast('❌ Gagal mengirim: ' + e.message, 'error');
                console.error('Submit error:', e);
            } finally {
                isSubmitting = false;
                btn.disabled = false;
                btn.innerHTML = '📤 Kirim Skrining';
            }
        });

        // =====================================================
        //   REFRESH MANUAL
        // =====================================================
        async function manualRefresh() {
            if (isRefreshing) return;
            isRefreshing = true;
            const btn = document.getElementById('refreshBtn');
            if (btn) {
                btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
                btn.disabled = true;
            }
            try {
                await loadSkriningQuestions(true);
                showToast('Data berhasil disegarkan', 'success');
            } catch (e) {
                showToast('Gagal menyegarkan data', 'error');
            } finally {
                if (btn) {
                    btn.innerHTML = '<i class="bi bi-arrow-clockwise"></i>';
                    btn.disabled = false;
                }
                isRefreshing = false;
            }
        }

        // =====================================================
        //   INIT
        // =====================================================
        async function init() {
            // ✅ LOGIN CHECK: Redirect hanya jika mode login aktif dan belum login
            const canProceed = await checkLoginAndRedirect();
            if (!canProceed) return;

            // ✅ LOAD DARI DATACACHE DAHULU (CEPAT)
            const cached = DataCache.getData('skriningQuestions');
            if (cached && Array.isArray(cached) && cached.length > 0) {
                questions = cached;
                renderForm(false);
                // Update status
                const statusEl = document.getElementById('dataStatus');
                if (statusEl) {
                    statusEl.textContent = '✅ Siap';
                    statusEl.className = 'badge bg-success text-white';
                }
                isInitialLoad = false;
            } else {
                // Jika tidak ada cache, tampilkan spinner saat load pertama
                renderForm(true);
            }

            // ✅ REFRESH BACKGROUND (otomatis setelah halaman stabil)
            setTimeout(() => {
                loadSkriningQuestions(true);
            }, 1000);

            // Refresh button
            document.getElementById('refreshBtn')?.addEventListener('click', manualRefresh);
        }

        // Run on DOM ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }

        // Expose for debug
        window.__skrining = {
            reload: loadSkriningQuestions,
            refresh: manualRefresh,
            questions: () => questions,
            clearState: clearFormState
        };

    })();
</script>
</body>
</html>
