<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>PKD GP Ansor Kabupaten Bantul · Skrining</title>
  <link rel="icon" type="image/png" href="LOGO ANSOR.webp">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: #f8fafc; color: #0f172a; }
    .navbar { background: rgba(255,255,255,0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(203,213,225,0.3); }
    .navbar-brand img { max-height: 40px; margin-right: 12px; }
    .brand-title { font-size: 1.35rem; font-weight: 700; color: #0a3d62; }
    .brand-sub { font-size: 0.9rem; color: #6c757d; display: block; }
    .container-card { max-width: 1000px; background: white; border-radius: 32px; padding: 2rem; margin: 30px auto; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); border: 1px solid rgba(226,232,240,0.6); }
    .section-title { font-weight: 650; font-size: 1.75rem; border-left: 6px solid #2563eb; padding-left: 1.2rem; margin-bottom: 1.8rem; }
    .signature-area { border: 2px dashed #cbd5e1; border-radius: 20px; background: white; padding: 12px; }
    canvas { width: 100%; height: auto; max-width: 300px; max-height: 150px; background: white; display: block; border-radius: 12px; margin: 0 auto; }
    .signature-buttons { display: flex; gap: 12px; margin-top: 12px; justify-content: center; }
    .btn-signature { border-radius: 9999px; padding: 0.4rem 1.6rem; font-size: 0.9rem; }
    .footer-modern { font-size: 0.85rem; color: #64748b; margin-top: 3rem; text-align: center; padding: 1.5rem 0; border-top: 1px solid #e2e8f0; background: white; }
    .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
    .toast { background: white; border-left: 5px solid; box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.15); border-radius: 16px; }
    .loading-spinner { display: inline-block; width: 2rem; height: 2rem; border: 3px solid rgba(37,99,235,0.2); border-radius: 50%; border-top-color: #2563eb; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg bg-white sticky-top shadow-sm">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" href="index.html">
      <img src="LOGO ANSOR.webp" alt="GP Ansor" class="me-2">
      <span><span class="brand-title">PKD GP Ansor</span><span class="brand-sub">Kabupaten Bantul</span></span>
    </a>
    <a href="index.html" class="btn btn-outline-primary rounded-pill px-4 ms-auto"><i class="bi bi-arrow-left"></i> Kembali</a>
  </div>
</nav>

<!-- Konten utama -->
<div id="contentArea">
  <section id="skriningSection" class="container container-card">
    <h2 class="section-title"><i class="bi bi-clipboard-check me-2"></i>Form Skrining PKD</h2>
    <div id="skriningFormContainer">Memuat form...</div>
  </section>
</div>

<!-- Footer -->
<footer class="footer-modern container">
  <div class="d-flex justify-content-center align-items-center gap-2">
    <i class="bi bi-c-circle"></i>
    <span>Hak Cipta 2026 - Tim Instruktur GP Ansor Kabupaten Bantul</span>
  </div>
</footer>

<!-- Modal preview skrining -->
<div class="modal fade" id="previewSkriningModal" tabindex="-1" data-bs-backdrop="static">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content border-0 shadow-lg">
      <div class="modal-header bg-primary text-white border-0 rounded-top-4">
        <h5 class="modal-title"><i class="bi bi-eye-fill me-2"></i>Preview Data Skrining</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4" id="previewSkriningBody"></div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-secondary rounded-pill px-4" data-bs-dismiss="modal">Tutup</button>
        <button type="button" class="btn btn-success rounded-pill px-4" id="previewKirimBtn">📤 Kirim Skrining</button>
      </div>
    </div>
  </div>
</div>

<!-- Toast notifikasi (dibuat oleh api.js) -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
<script src="api.js"></script>
<script>
  // Bantuan lokal
  function escapeHtml(unsafe) { return PKD.escapeHtml(unsafe); }
  function showToast(message, type = 'success') { PKD.showToast(message, type); }

  // =====================================================
  //   CACHE SKRINING (menggunakan PKD)
  // =====================================================
  async function fetchSkriningQuestions(forceRefresh = false) {
    if (!forceRefresh) {
      const cached = PKD.getCached('skriningQuestionsCache', 3600000);
      if (cached) return cached;
    }
    try {
      const questions = await PKD.getSkriningQuestions(true);
      PKD.saveCached('skriningQuestionsCache', questions);
      return questions;
    } catch (e) {
      console.error('Gagal memuat soal skrining:', e);
      return [];
    }
  }

  // =====================================================
  //   STATE & SIGNATURE
  // =====================================================
  function saveSkriningFormState() {
    const form = document.getElementById('formSkriningDinamis');
    if (!form) return;
    const formData = new FormData(form);
    const data = {};
    formData.forEach((v, k) => data[k] = v);
    if (window.sigPadSkrining && !window.sigPadSkrining.isEmpty()) {
      data.signatureData = window.sigPadSkrining.toData();
    }
    localStorage.setItem('skriningFormState', JSON.stringify(data));
  }

  function restoreSkriningFormState() {
    const saved = localStorage.getItem('skriningFormState');
    if (!saved) return;
    try {
      const data = JSON.parse(saved);
      const form = document.getElementById('formSkriningDinamis');
      if (!form) return;
      Object.keys(data).forEach(key => {
        if (key === 'signatureData') return;
        const field = form.querySelector(`[name="${key}"]`);
        if (field) {
          if (field.type === 'radio' || field.type === 'checkbox') {
            field.checked = (field.value === data[key]);
          } else {
            field.value = data[key];
          }
        }
      });
      if (data.signatureData && window.sigPadSkrining) {
        window.sigPadSkrining.fromData(data.signatureData);
      }
    } catch (e) {}
  }

  function clearSkriningFormState() {
    localStorage.removeItem('skriningFormState');
  }

  function initSkriningSignaturePad() {
    const canvas = document.getElementById('signatureCanvasSkrining');
    if (!canvas) return;
    window.sigPadSkrining = new SignaturePad(canvas, { backgroundColor: 'white', penColor: 'black' });
    window.sigPadSkrining.clear();
    document.getElementById('clearSkriningSign')?.addEventListener('click', () => { window.sigPadSkrining.clear(); saveSkriningFormState(); });
    document.getElementById('undoSkriningSign')?.addEventListener('click', () => {
      const data = window.sigPadSkrining.toData();
      if (data) { data.pop(); window.sigPadSkrining.fromData(data); saveSkriningFormState(); }
    });
  }

  function previewSkriningForm(e) {
    e.preventDefault();
    if (!window.sigPadSkrining || window.sigPadSkrining.isEmpty()) {
      showToast('Tanda tangan assessor wajib!', 'danger');
      return;
    }
    const form = document.getElementById('formSkriningDinamis');
    const formData = new FormData(form);
    const data = {};
    formData.forEach((v, k) => data[k] = v);
    const signatureDataURL = window.sigPadSkrining.toDataURL('image/jpeg', 0.2);
    data.signature = signatureDataURL;
    showSkriningPreview(data, signatureDataURL);
  }

  function showSkriningPreview(data, signatureDataURL) {
    const modalBody = document.getElementById('previewSkriningBody');
    // Ambil pertanyaan tambahan yang sudah disimpan di global
    const extraQuestions = window._skriningQuestions || [];

    let html = `<table class="table table-bordered preview-table">`;
    html += `<tr><th>Nama Lengkap</th><td>${escapeHtml(data.nama || '')}</td></tr>`;
    html += `<tr><th>Alamat</th><td>${escapeHtml(data.alamat || '')}</td></tr>`;
    html += `<tr><th>Info Rekrutmen</th><td>${escapeHtml(data.info || '')}</td></tr>`;
    html += `<tr><th>Pengetahuan tentang Ansor</th><td>${escapeHtml(data.pengetahuan || '')}</td></tr>`;

    extraQuestions.forEach(q => {
      const key = `q_${q.id}`;
      let value = data[key] || '';
      html += `<tr><th>${escapeHtml(q.teks || 'Pertanyaan')}</th><td>${escapeHtml(value)}</td></tr>`;
    });

    html += `<tr><th>Doa Qunut?</th><td>${escapeHtml(data.qunut || '')}</td></tr>`;
    html += `<tr><th>Riwayat Penyakit</th><td>${escapeHtml(data.penyakit || '')}</td></tr>`;
    html += `<tr><th>Pernah rekrutmen/diklatsar?</th><td>${escapeHtml(data.pernah || '')}</td></tr>`;
    html += `<tr><th>Alasan Tertarik</th><td>${escapeHtml(data.alasan || '')}</td></tr>`;
    html += `<tr><th>Catatan</th><td>${escapeHtml(data.catatan || '')}</td></tr>`;
    html += `<tr><th>Tanda Tangan Assessor</th><td><img src="${signatureDataURL}" class="preview-signature" alt="Signature" style="max-width:200px;"></td></tr>`;
    html += `</table>`;

    modalBody.innerHTML = html;
    window.__skriningPreviewData = { data, signatureDataURL };
    new bootstrap.Modal(document.getElementById('previewSkriningModal')).show();
  }

  // Submit skrining dari modal preview
  document.getElementById('previewKirimBtn')?.addEventListener('click', async function() {
    if (!window.__skriningPreviewData) return;
    const btn = this;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Mengirim...';

    const { data, signatureDataURL } = window.__skriningPreviewData;
    delete data.signature; // hapus field signature dari form (karena sudah diwakili oleh signatureDataURL)
    const params = { action: 'submitSkrining', ...data, signature: signatureDataURL };

    try {
      // Gunakan callApi atau submitSkrining? Di api.js ada submitSkrining(formData), jadi kita bisa langsung panggil itu
      // Namun fungsi submitSkrining di api.js menerima satu object formData, jadi bisa langsung dikirim.
      // Pastikan properti 'action' tidak ikut terkirim ke server (api.js akan menambahkan action dari fungsi spesifik).
      // Kita gunakan PKD.submitSkrining({...data, signature: signatureDataURL})
      await PKD.submitSkrining(params);
      showToast('✅ Skrining berhasil dikirim!', 'success');
      document.getElementById('formSkriningDinamis')?.reset();
      if (window.sigPadSkrining) window.sigPadSkrining.clear();
      bootstrap.Modal.getInstance(document.getElementById('previewSkriningModal')).hide();
      clearSkriningFormState();
    } catch (e) {
      showToast('❌ Gagal mengirim: ' + e.message, 'danger');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '📤 Kirim Skrining';
    }
  });

  // =====================================================
  //   RENDER FORM SKRINING
  // =====================================================
  function renderSkriningForm(extraQuestions) {
    let html = `<form id="formSkriningDinamis">`;
    let questionNumber = 1;

    html += `<div class="mb-3"><label class="form-label">${questionNumber++}. Nama Lengkap</label><input type="text" class="form-control" name="nama" placeholder="Contoh: Ahmad Fauzi" required></div>`;
    html += `<div class="mb-3"><label class="form-label">${questionNumber++}. Alamat</label><textarea class="form-control" name="alamat" rows="2" placeholder="Contoh: Demangan RT 8 Bangunharjo Sewon" required></textarea></div>`;
    html += `<div class="mb-3"><label class="form-label">${questionNumber++}. Info rekrutmen</label><input type="text" class="form-control" name="info" placeholder="Contoh: IG/FB/WA/Website/Teman/Saudara/Lainnya" required></div>`;
    html += `<div class="mb-3"><label class="form-label">${questionNumber++}. Pengetahuan tentang Ansor</label><textarea class="form-control" name="pengetahuan" rows="2" placeholder="Contoh: Ansor merupakan Salah Satu Banom dari NU" required></textarea></div>`;

    extraQuestions.forEach(q => {
      if (q.jenis === 'radio') {
        html += `<div class="mb-3"><label class="form-label">${questionNumber++}. ${q.teks}</label><div>`;
        (q.opsi || '').split(',').forEach(ops => {
          if (ops.trim()) html += `<div class="form-check form-check-inline"><input class="form-check-input" type="radio" name="q_${q.id}" value="${ops.trim()}"><label class="form-check-label">${ops.trim()}</label></div>`;
        });
        html += `</div></div>`;
      } else {
        html += `<div class="mb-3"><label class="form-label">${questionNumber++}. ${q.teks}</label><input type="text" class="form-control" name="q_${q.id}"></div>`;
      }
    });

    html += `<div class="mb-3"><label class="form-label">${questionNumber++}. Doa Qunut?</label>
                <div class="form-check form-check-inline"><input class="form-check-input" type="radio" name="qunut" value="Ya"> Ya</div>
                <div class="form-check form-check-inline"><input class="form-check-input" type="radio" name="qunut" value="Tidak"> Tidak</div></div>
              <div class="mb-3"><label class="form-label">${questionNumber++}. Riwayat penyakit</label><textarea class="form-control" name="penyakit"></textarea></div>
              <div class="mb-3"><label class="form-label">${questionNumber++}. Pernah rekrutmen PKD/diklatsar?</label>
                <div class="form-check form-check-inline"><input class="form-check-input" type="radio" name="pernah" value="Ya"> Sudah</div>
                <div class="form-check form-check-inline"><input class="form-check-input" type="radio" name="pernah" value="Tidak"> Belum</div></div>
              <div class="mb-3"><label class="form-label">${questionNumber++}. Alasan tertarik</label><textarea class="form-control" name="alasan" required></textarea></div>
              <div class="mb-3"><label class="form-label">${questionNumber++}. Catatan</label><textarea class="form-control" name="catatan"></textarea></div>
              <div class="mb-4">
                <label class="form-label fw-bold">${questionNumber++}. ✍️ Tanda Tangan Assessor</label>
                <div class="signature-area"><canvas id="signatureCanvasSkrining" width="250" height="120"></canvas></div>
                <div class="signature-buttons">
                  <button type="button" class="btn btn-outline-secondary btn-signature" id="clearSkriningSign">Hapus</button>
                  <button type="button" class="btn btn-outline-primary btn-signature" id="undoSkriningSign">Undo</button>
                </div>
                <input type="hidden" id="signatureDataSkrining" name="signatureData">
              </div>
              <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill">Kirim Skrining</button>
            </form>`;

    document.getElementById('skriningFormContainer').innerHTML = html;
    document.getElementById('skriningFormContainer').classList.add('fade-in');
    initSkriningSignaturePad();
    restoreSkriningFormState();

    // Simpan pertanyaan ke global untuk preview
    window._skriningQuestions = extraQuestions;

    // Auto-save input
    document.querySelectorAll('#formSkriningDinamis input, #formSkriningDinamis textarea, #formSkriningDinamis select').forEach(el => {
      el.addEventListener('input', saveSkriningFormState);
      el.addEventListener('change', saveSkriningFormState);
    });
    if (window.sigPadSkrining) {
      window.sigPadSkrining.addEventListener('endStroke', saveSkriningFormState);
    }

    // Submit form -> preview
    document.getElementById('formSkriningDinamis').addEventListener('submit', previewSkriningForm);
  }

  // =====================================================
  //   LOAD SKRINING FORM (CACHE + BACKGROUND)
  // =====================================================
  async function loadSkriningForm() {
    const container = document.getElementById('skriningFormContainer');
    container.innerHTML = '<div class="text-center my-4"><div class="loading-spinner"></div><p class="mt-2 text-muted">Memuat form...</p></div>';

    let extraQuestions = PKD.getCached('skriningQuestionsCache', 3600000);
    if (extraQuestions) {
      renderSkriningForm(extraQuestions);
      fetchSkriningQuestions(true).then(newQ => {
        if (JSON.stringify(newQ) !== JSON.stringify(extraQuestions)) {
          renderSkriningForm(newQ);
        }
      }).catch(console.warn);
    } else {
      extraQuestions = await fetchSkriningQuestions(true);
      renderSkriningForm(extraQuestions);
    }
  }

  // ========== MODE LOGIN CHECK ==========
  (async function() {
    try {
      const loginMode = await PKD.getLoginMode();
      const requireLogin = loginMode.success ? loginMode.enabled : false;
      if (requireLogin) {
        const auth = localStorage.getItem('pkd_auth') || sessionStorage.getItem('pkd_auth');
        if (!auth) {
          window.location.href = 'login.html';
          return;
        }
      }
    } catch(e) { console.warn('Gagal cek mode login', e); }
    loadSkriningForm();
  })();
</script>
</body>
</html>
