<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>Login · PKD GP Ansor Bantul</title>

    <!-- Favicon & Font -->
    <link rel="icon" type="image/png" href="/bisaa/LOGO%20ANSOR.webp">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        /* ===== UNIVERSAL PREMIUM (GLASSMORPHISM) ===== */
        * { font-family: 'Inter', system-ui, sans-serif; }
        body {
            background: #f8fafc;
            color: #0f172a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- HEADER MINIMALIS ELEGAN (DIPERBESAR) --- */
        .header-minimal {
            background: rgba(255, 255, 255, 0.72) !important;
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            z-index: 1030;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.04);
            padding-top: 0 !important;
            padding-bottom: 0 !important;
        }
        .header-minimal .container {
            padding-top: 0.75rem;
            padding-bottom: 0.75rem;
        }
        .btn-back {
            background: rgba(37, 99, 235, 0.08);
            color: #2563eb;
            border: 1px solid rgba(37, 99, 235, 0.2);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .btn-back:hover {
            background: #2563eb;
            color: white;
            transform: translateX(-3px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
        }
        .brand-logo-mini { 
            height: 40px; 
            width: auto; 
            margin-right: 14px; 
            transition: transform 0.2s;
        }
        .brand-logo-mini:hover { transform: scale(1.05); }
        .brand-title-mini { 
            font-weight: 700; 
            color: #0a3d62; 
            font-size: 1.3rem; 
            line-height: 1.2; 
            letter-spacing: -0.02em;
        }
        .brand-sub-mini { 
            font-size: 0.8rem; 
            color: #64748b; 
            display: block; 
            margin-top: 0px; 
            letter-spacing: 0.02em;
        }

        #navbarUserMenu {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .user-menu-area .dropdown-toggle { 
            border-radius: 50px; 
            padding: 0.3rem 1rem; 
            font-size: 0.9rem; 
        }
        .user-menu-area .btn-outline-primary { 
            border-radius: 50px; 
            padding: 0.3rem 1.2rem; 
            font-size: 0.9rem; 
        }

        /* --- GLASS CARD LOGIN --- */
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .glass-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 50px rgba(37, 99, 235, 0.08);
            border-color: rgba(37, 99, 235, 0.2);
        }

        /* --- PREMIUM LOGIN FORM --- */
        .form-control {
            border-radius: 12px;
            border: 1.5px solid #e2e8f0;
            padding: 0.6rem 1rem;
            transition: 0.2s;
        }
        .form-control:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        .btn-login {
            border-radius: 9999px;
            padding: 0.6rem;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            background: linear-gradient(135deg, #2563eb, #1e4bb3);
            border: none;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.35);
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.4);
        }
        .btn-login:active {
            transform: scale(0.98);
        }

        /* --- ANIMASI --- */
        .fade-up { animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- FOOTER --- */
        .footer-modern {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: auto;
            text-align: center;
            padding: 1.5rem 0;
            border-top: 1px solid #e2e8f0;
            background: white;
        }

        /* --- RESPONSIF --- */
        @media (max-width: 576px) {
            .glass-card { border-radius: 16px; padding: 1.5rem !important; }
            .header-minimal .container { padding: 0 0.5rem; }
            .btn-back { font-size: 0.8rem; padding: 0.2rem 0.8rem; }
            .brand-title-mini { display: none; }
            .brand-sub-mini { display: none; }
            .user-menu-area .dropdown-toggle { font-size: 0.75rem; padding: 0.2rem 0.8rem; }
        }
    </style>
</head>
<body>

    <!-- ================= HEADER MINIMALIS ELEGAN ================= -->
    <header class="header-minimal sticky-top shadow-sm">
        <div class="container d-flex justify-content-between align-items-center py-3">
            <div class="d-flex align-items-center gap-2">
                <a href="/bisaa/index.html" class="btn btn-back rounded-pill">
                    <i class="bi bi-arrow-left me-1"></i> Kembali
                </a>
                <a href="/bisaa/index.html" class="brand-minimal text-decoration-none d-flex align-items-center ms-1">
                    <img src="/bisaa/LOGO%20ANSOR.webp" alt="GP Ansor" class="brand-logo-mini">
                    <div>
                        <div class="brand-title-mini">PKD GP Ansor</div>
                        <span class="brand-sub-mini">Kabupaten Bantul</span>
                    </div>
                </a>
            </div>
            <!-- Area User Role (diisi oleh api.js, namun di halaman login biasanya kosong/guest) -->
            <div id="navbarUserMenu" class="user-menu-area"></div>
        </div>
    </header>

    <!-- ================= KONTEN UTAMA (LOGIN CARD) ================= -->
    <div id="contentArea" class="container" style="padding: 2rem 0;">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="glass-card p-4 fade-up text-center">
                    
                    <!-- Logo & Judul -->
                    <div class="mb-4">
                        <img src="/bisaa/LOGO%20ANSOR.webp" alt="Logo Ansor" style="height: 60px; width: auto; margin-bottom: 0.5rem;">
                        <h4 class="fw-bold text-primary">Masuk ke Sistem</h4>
                        <p class="text-muted small">Gunakan akun Admin, Ketua PAC, atau Member</p>
                    </div>

                    <!-- Login Form -->
                    <form id="loginForm" class="text-start">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Username</label>
                            <input type="text" id="username" class="form-control" placeholder="Masukkan username" autocomplete="off" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Password</label>
                            <div class="input-group">
                                <input type="password" id="password" class="form-control rounded-start-3" placeholder="Masukkan password" autocomplete="off" required>
                                <button class="btn btn-outline-secondary rounded-end-3" type="button" id="togglePasswordBtn">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                        </div>
                        <div id="errorMsg" class="text-danger small mb-3" style="display: none;"></div>
                        <button type="submit" class="btn btn-primary w-100 btn-login" id="loginBtn">Login</button>
                    </form>

                    <!-- Links -->
                    <div class="mt-3">
                        <a href="/bisaa/forgot_account.html" class="text-decoration-none small text-muted">Lupa Username / Password?</a>
                        <br>
                        <a href="/bisaa/index.html" class="text-decoration-none small" style="margin-top: 0.5rem; display: inline-block;">← Kembali ke Awal</a>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <!-- ================= FOOTER ================= -->
    <footer class="footer-modern container">
        <div class="d-flex justify-content-center align-items-center gap-2">
            <i class="bi bi-c-circle"></i>
            <span>Hak Cipta 2026 — Tim Instruktur GP Ansor Kabupaten Bantul</span>
        </div>
    </footer>

    <!-- ================= TOAST ================= -->
    <div class="toast-container position-fixed top-0 end-0 p-3">
        <div id="notificationToast" class="toast border-0 shadow-lg" role="alert" data-bs-delay="3000">
            <div class="toast-header bg-white border-0">
                <i class="bi me-2" id="toastIcon"></i>
                <strong class="me-auto" id="toastTitle">Berhasil</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
            </div>
            <div class="toast-body" id="toastMessage"></div>
        </div>
    </div>

    <!-- ================= SCRIPTS ================= -->
    <!-- Library Eksternal (tetap sebagai script biasa) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Modul ES Khusus Halaman Ini -->
    <script type="module">
        // ==========================================================
        //   IMPOR DARI CORE API (ES Modules)
        // ==========================================================
        import {
            verifyAdmin,
            verifyKetuaPAC,
            verifyMember,
            setUserRole,
            setUserData,
            persistAuthState,
            getUserRole,
            updateNavbarMenu
        } from './js/core/api.js';

        // ==========================================================
        //   TOGGLE PASSWORD (diekspos ke global agar bisa dipanggil oleh event listener)
        // ==========================================================
        function togglePassword() {
            const pwd = document.getElementById('password');
            pwd.type = pwd.type === 'password' ? 'text' : 'password';
        }

        // ==========================================================
        //   INIT LOGIN FORM
        // ==========================================================
        function initLoginForm() {
            // Toggle password button
            document.getElementById('togglePasswordBtn').addEventListener('click', togglePassword);

            document.getElementById('loginForm').addEventListener('submit', async function(e) {
                e.preventDefault();

                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value.trim();
                const errorDiv = document.getElementById('errorMsg');

                if (!username || !password) {
                    errorDiv.innerText = 'Username dan password harus diisi!';
                    errorDiv.style.display = 'block';
                    return;
                }

                const btn = document.getElementById('loginBtn');
                const originalText = btn.innerHTML;
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Memeriksa...';
                errorDiv.style.display = 'none';

                // 1. Coba login sebagai admin
                try {
                    const adminRes = await verifyAdmin(username, password);
                    if (adminRes.success && adminRes.role) {
                        setUserRole('admin');
                        setUserData({ nama: username });
                        persistAuthState();
                        window.location.href = '/bisaa/admin/dashboard_admin.html';
                        return;
                    }
                } catch (e) {
                    console.warn('Admin login error:', e);
                }

                // 2. Coba login sebagai ketua PAC
                try {
                    const pacRes = await verifyKetuaPAC(username, password);
                    if (pacRes.success && pacRes.role === 'ketua_pac') {
                        setUserRole('ketua_pac');
                        setUserData(pacRes.data || { nama: username });
                        persistAuthState();
                        window.location.href = '/bisaa/ketua_pac.html';
                        return;
                    }
                } catch (e) {
                    console.warn('Ketua PAC login error:', e);
                }

                // 3. Coba login sebagai member
                try {
                    const memberRes = await verifyMember(username, password);
                    if (memberRes.success && memberRes.role === 'member') {
                        setUserRole('member');
                        setUserData(memberRes.data || { nama: username });
                        persistAuthState();
                        window.location.href = '/bisaa/member.html';
                        return;
                    }
                } catch (e) {
                    console.warn('Member login error:', e);
                }

                // 4. Jika semua gagal
                errorDiv.innerText = 'Username atau password salah!';
                errorDiv.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = originalText;
            });
        }

        // ==========================================================
        //   🛡️ GUARD & BOOT
        // ==========================================================
        (async function boot() {
            // Cek apakah user sudah login
            const role = getUserRole();
            if (role === 'admin') {
                window.location.href = '/bisaa/admin/dashboard_admin.html';
                return;
            } else if (role === 'ketua_pac') {
                window.location.href = '/bisaa/ketua_pac.html';
                return;
            } else if (role === 'member') {
                window.location.href = '/bisaa/member.html';
                return;
            }

            // Jika guest, update navbar menu (guest)
            updateNavbarMenu();

            // Inisialisasi form login
            initLoginForm();
        })();

    </script>
</body>
</html>
