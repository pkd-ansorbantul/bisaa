<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login · PKD GP Ansor Bantul</title>
  <!-- Font & Bootstrap -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body {
      background: #f8fafc;
      font-family: 'Inter', sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }
    .login-card {
      max-width: 400px;
      width: 100%;
      background: white;
      border-radius: 32px;
      padding: 2rem;
      box-shadow: 0 20px 35px -8px rgba(0,0,0,0.1);
      border: 1px solid rgba(226,232,240,0.6);
    }
    .logo {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .logo img {
      height: 60px;
      margin-bottom: 0.5rem;
    }
    .btn-login {
      border-radius: 9999px;
      padding: 0.6rem;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <img src="LOGO ANSOR.webp" alt="Logo Ansor">
      <h4 class="fw-bold">Masuk ke Sistem</h4>
      <p class="text-muted">Gunakan akun Admin, Ketua PAC, atau Member</p>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Username</label>
      <input type="text" id="username" class="form-control rounded-3" placeholder="Masukkan username" autocomplete="off">
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Password</label>
      <div class="input-group">
        <input type="password" id="password" class="form-control rounded-start-3" placeholder="Masukkan password" autocomplete="off">
        <button class="btn btn-outline-secondary rounded-end-3" type="button" onclick="togglePassword()">
          <i class="bi bi-eye"></i>
        </button>
      </div>
    </div>
    <div id="errorMsg" class="text-danger small mb-3" style="display: none;"></div>
    <button class="btn btn-primary w-100 btn-login" id="loginBtn">Login</button>
    <div class="text-center mt-3">
      <a href="index.html" class="text-decoration-none small">← Kembali ke Awal</a>
    </div>
  </div>

  <!-- Sertakan api.js -->
  <script src="api.js"></script>
  <script>
    // Fungsi toggle visibility password
    function togglePassword() {
      const pwd = document.getElementById('password');
      pwd.type = pwd.type === 'password' ? 'text' : 'password';
    }

    // Tombol login
    document.getElementById('loginBtn').addEventListener('click', async () => {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const errorDiv = document.getElementById('errorMsg');

      // Validasi input
      if (!username || !password) {
        errorDiv.innerText = 'Username dan password harus diisi!';
        errorDiv.style.display = 'block';
        return;
      }

      // Indikator loading
      const btn = document.getElementById('loginBtn');
      const originalText = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Memeriksa...';
      errorDiv.style.display = 'none';

      // 1. Coba login sebagai admin
      try {
        const adminRes = await PKD.verifyAdmin(username, password);
        if (adminRes.success && adminRes.role) {
          // Simpan state admin
          PKD.setUserRole('admin');
          PKD.setUserData({ nama: username });
          PKD.persistAuthState();
          window.location.href = 'admin.html';
          return;
        }
      } catch (e) {
        console.warn('Admin login error:', e);
      }

      // 2. Coba login sebagai ketua PAC
      try {
        const pacRes = await PKD.verifyKetuaPAC(username, password);
        if (pacRes.success && pacRes.role === 'ketua_pac') {
          PKD.setUserRole('ketua_pac');
          PKD.setUserData(pacRes.data || { nama: username });
          PKD.persistAuthState();
          window.location.href = 'ketua_pac.html';
          return;
        }
      } catch (e) {
        console.warn('Ketua PAC login error:', e);
      }

      // 3. Coba login sebagai member
      try {
        const memberRes = await PKD.verifyMember(username, password);
        if (memberRes.success && memberRes.role === 'member') {
          PKD.setUserRole('member');
          PKD.setUserData(memberRes.data || { nama: username });
          PKD.persistAuthState();
          window.location.href = 'member.html';
          return;
        }
      } catch (e) {
        console.warn('Member login error:', e);
      }

      // 4. Jika semua gagal
      errorDiv.innerText = 'Username atau password salah!';
      errorDiv.style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = originalText;
    });

    // Cek apakah sudah login – langsung redirect
    (function() {
      const role = PKD.getUserRole();
      if (role === 'admin') {
        window.location.href = 'admin.html';
      } else if (role === 'ketua_pac') {
        window.location.href = 'ketua_pac.html';
      } else if (role === 'member') {
        window.location.href = 'member.html';
      }
    })();
  </script>
</body>
</html>
