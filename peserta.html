    <style>

        .template-card:hover {

        .whatsapp-btn {
            background-color: #25d366;

            border: none;
        }
        .whatsapp-btn:hover {
            background-color: #1da851;
            color: white;
        }
        #loadingOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.85);
            z-index: 99999;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg bg-white sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="LOGO ANSOR.webp" alt="GP Ansor" class="me-2" />
                <span>
                    <span class="brand-title">PKD GP Ansor</span>
                    <span class="brand-sub">Kabupaten Bantul</span>
                </span>
            </a>
            <a href="index.html" class="btn btn-outline-primary rounded-pill px-4 ms-auto">
                <i class="bi bi-arrow-left"></i> Kembali
            </a>
        </div>
    </nav>

    <!-- Konten utama -->
    <div id="contentArea">
        <section id="pesertaSection" class="container container-card">
            <h2 class="section-title"><i class="bi bi-person-badge me-2"></i>Form Data Peserta PKD</h2>
            <div id="pesertaFormContainer">Memuat form...</div>
        </section>
    </div>

    <!-- Footer -->
    <footer class="footer-modern container">
        <div class="d-flex justify-content-center align-items-center gap-2">
            <i class="bi bi-c-circle"></i>
            <span>Hak Cipta 2026 - Tim Instruktur GP Ansor Kabupaten Bantul</span>
        </div>
    </footer>

    <!-- Loading Overlay -->
    <div id="loadingOverlay">
        <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <p class="mt-3 fw-bold">Mengirim data, harap tunggu...</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
    </script>

    <!-- ============================================================ -->
    <!--  api.js  (disimulasikan karena tidak ada file eksternal)      -->
    <!-- ============================================================ -->
    <script>
        // ----- PKD mock / helper -----
        const PKD = {
            escapeHtml: function(text) {
                if (!text) return '';
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            },

            showToast: function(message, type = 'success') {
                const toastContainer = document.querySelector('.toast-container') || (function() {
                    const tc = document.createElement('div');
                    tc.className = 'toast-container';
                    document.body.appendChild(tc);
                    return tc;
                })();

                const toastEl = document.createElement('div');
                toastEl.className = `toast align-items-center border-0 border-${type} border-start border-4 show`;
                toastEl.setAttribute('role', 'alert');
                toastEl.setAttribute('aria-live', 'assertive');
                toastEl.setAttribute('aria-atomic', 'true');
                toastEl.innerHTML = `
                    <div class="d-flex">
                        <div class="toast-body fw-medium">
                            ${message}
                        </div>
                        <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
                    </div>
                `;
                toastContainer.appendChild(toastEl);
                setTimeout(() => {
                    if (toastEl.parentNode) toastEl.remove();
                }, 5000);
            },

            getLoginMode: function() {
                return new Promise((resolve) => {
                    // Simulasi: mode login tidak diaktifkan (bisa diubah sesuai kebutuhan)
                    resolve({ success: true, enabled: false });
                });
            },

            callApi: function(action, data, method = 'POST') {
                return new Promise((resolve) => {
                    console.log(`[API] ${action}`, data);
                    // Simulasi sukses
                    setTimeout(() => {
                        resolve({ success: true, error: null, message: 'Data tersimpan' });
                    }, 800);
                });
            }
        };
    </script>

    <script>
        // ----- Local helpers -----
        function escapeHtmlLocal(unsafe) { return PKD.escapeHtml(unsafe); }

        function showToastLocal(message, type = 'success') { PKD.showToast(message, type); }

        let signaturePad;

        // =====================
        //   STATE & SIGNATURE
        // =====================
        function savePesertaFormState() {
            const form = document.getElementById('formPesertaDinamis');
            if (!form) return;
            const formData = new FormData(form);
            const data = {};
            formData.forEach((v, k) => data[k] = v);
            try {
                localStorage.setItem('pesertaFormState', JSON.stringify(data));
            } catch (e) {}
        }

        function restorePesertaFormState() {
            const saved = localStorage.getItem('pesertaFormState');
            if (!saved) return;
            try {
                const data = JSON.parse(saved);
                const form = document.getElementById('formPesertaDinamis');
                if (!form) return;
                Object.keys(data).forEach(key => {
                    const field = form.querySelector(`[name="${key}"]`);
                    if (field) field.value = data[key];
                });
            } catch (e) {}
        }

        function clearPesertaFormState() {
            localStorage.removeItem('pesertaFormState');
        }

        // =====================
        //   FORM PESERTA
        // =====================
        async function loadPesertaForm() {
            const container = document.getElementById('pesertaFormContainer');

            let html = `
                <div class="admin-contact">
                    <h6><i class="bi bi-telephone-fill me-2"></i>Konfirmasi Administrasi ke Panitia Lokal</h6>
                    <p class="mb-1">Sebelum mengisi formulir, silakan hubungi panitia untuk memastikan kelengkapan administrasi.</p>
                    <a href="https://wa.me/6283866675521?text=Halo%20Panitia%20PKD%2C%20saya%20ingin%20konfirmasi%20administrasi%20peserta." target="_blank" class="btn btn-success btn-sm rounded-pill mt-2 whatsapp-btn">
                        <i class="bi bi-whatsapp me-1"></i> Hubungi Admin Instruktur (0838-6667-5521)
                    </a>
                    <p class="small text-muted mt-2 mb-0">Nomor kontak sesuai flyer resmi PKD GP Ansor Bantul.</p>
                </div>

                <form id="formPesertaDinamis">

                    <!-- 📸 Foto -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">📸 Foto</label>
                        <input type="file" class="form-control" name="foto" accept="image/*" id="pesertaFotoInput" />
                        <img id="pesertaFotoPreview" src="#" alt="Preview" style="max-width: 200px; display: none;" class="mt-2 rounded border" />
                    </div>

                    <!-- 📎 Surat Rekomendasi + Template Download -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">📎 Surat Rekomendasi (dari Masjid/PAC/PC/PW) <span class="text-danger">*</span></label>

                        <!-- Download template section -->
                        <div class="template-card mb-3">
                            <div class="d-flex flex-wrap align-items-center justify-content-between">
                                <div>
                                    <h6 class="fw-semibold mb-1"><i class="bi bi-file-earmark-word me-1"></i>Download Template Surat Rekomendasi</h6>
                                    <p class="small text-muted mb-0"><strong>Pilih salah satu template</strong> di lengkapi di cetak, kemudian upload formulir</p>
                                </div>
                                <div class="d-flex gap-2 flex-wrap mt-2 mt-sm-0">
                                    <a href="Surat Rekomendasi PAC.docx" class="btn btn-outline-primary btn-sm rounded-pill" download>
                                        <i class="bi bi-file-earmark-word me-1"></i> Template PAC
                                    </a>
                                    <a href="Surat Rekomendasi Masjid.docx" class="btn btn-outline-primary btn-sm rounded-pill" download>
                                        <i class="bi bi-file-earmark-word me-1"></i> Template Masjid
                                    </a>
                                </div>
                            </div>
                        </div>

                        <!-- Upload field -->
                        <input type="file" class="form-control" name="surat_rekomendasi" accept=".pdf,image/*" required id="suratRekomendasiInput" />
                        <div id="suratRekomendasiPreview" class="mt-2 small text-muted"></div>
                    </div>

                    <div class="mb-3"><label class="form-label fw-bold">👤 Nama Lengkap</label><input type="text" class="form-control" name="nama_lengkap" placeholder="Contoh: Ahmad Fauzi" required></div>
                    <div class="mb-3"><label class="form-label fw-bold">📍 Tempat dan Tanggal Lahir</label><input type="text" class="form-control" name="tempat_tgl_lahir" placeholder="Contoh: Bantul, 1 Januari 2000"></div>
                    <div class="mb-3"><label class="form-label fw-bold">💼 Pekerjaan</label><input type="text" class="form-control" name="pekerjaan" placeholder="Contoh: Mahasiswa / Guru"></div>
                    <div class="mb-3"><label class="form-label fw-bold">🎓 Pendidikan Terakhir</label><input type="text" class="form-control" name="pendidikan_terakhir" placeholder="Contoh: S1 Manajemen"></div>
                    <div class="mb-3"><label class="form-label fw-bold">🏠 Alamat</label><textarea class="form-control" name="alamat" rows="2" placeholder="Contoh: Demangan RT 8 Bangunharjo Sewon"></textarea></div>
                    <div class="mb-3"><label class="form-label fw-bold">📞 No HP</label><input type="tel" class="form-control" name="no_hp" placeholder="Contoh: 08123456789"></div>
                    <div class="mb-3"><label class="form-label fw-bold">📧 Email</label><input type="email" class="form-control" name="email" placeholder="Contoh: ahmad@example.com"></div>
                    <div class="mb-3"><label class="form-label fw-bold">🤝 Utusan (PAC)</label>
                        <select class="form-select" name="utusan" required>
                            <option value="" disabled selected>-- Pilih Utusan --</option>
                            <option value="PAC Bantul">PAC Bantul</option>
                            <option value="PAC Banguntapan">PAC Banguntapan</option>
                            <option value="PAC Sewon">PAC Sewon</option>
                            <option value="PAC Kasihan">PAC Kasihan</option>
                            <option value="PAC Pajangan">PAC Pajangan</option>
                            <option value="PAC Sedayu">PAC Sedayu</option>
                            <option value="PAC Pandak">PAC Pandak</option>
                            <option value="PAC Piyungan">PAC Piyungan</option>
                            <option value="PAC Pleret">PAC Pleret</option>
                            <option value="PAC Jetis">PAC Jetis</option>
                            <option value="PAC Imogiri">PAC Imogiri</option>
                            <option value="PAC Dlingo">PAC Dlingo</option>
                            <option value="PAC Bambanglipuro">PAC Bambanglipuro</option>
                            <option value="PAC Sanden">PAC Sanden</option>
                            <option value="PAC Kretek">PAC Kretek</option>
                            <option value="PAC Pundong">PAC Pundong</option>
                            <option value="PAC Srandakan">PAC Srandakan</option>
                            <option value="Lainnya">Lainnya</option>
                        </select>
                        <div id="utusanLuarContainer" style="display: none; margin-top: 8px;">
                            <label class="form-label fw-bold">Tulis Asal (Lainnya)</label>
                            <input type="text" class="form-control" name="utusan_luar" placeholder="Contoh: PC Sleman, Luar DIY, Masjid Al-Ikhlas, Mushola dll">
                        </div>
                    </div>
                    <div class="mb-3"><label class="form-label fw-bold">📋 Pengalaman Organisasi</label><textarea class="form-control" name="pengalaman_organisasi" rows="3" placeholder="Tuliskan pengalaman organisasi Anda"></textarea></div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">✍️ Tanda Tangan Digital</label>
                        <div class="border rounded p-2" style="background: #fff;"><canvas id="signatureCanvas"></canvas></div>
                        <div class="mt-2">
                            <button type="button" class="btn btn-sm btn-outline-secondary" id="clearSignature"><i class="bi bi-eraser"></i> Hapus</button>
                            <small class="text-muted ms-2">Gambar tanda tangan dengan mouse atau jari (pada layar sentuh).</small>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill">📤 Kirim Data Peserta</button>
                </form>
            `;

            container.innerHTML = html;

            // Preview foto
            document.getElementById('pesertaFotoInput').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        document.getElementById('pesertaFotoPreview').src = ev.target.result;
                        document.getElementById('pesertaFotoPreview').style.display = 'block';
                    };
                    reader.readAsDataURL(file);
                }
            });

            // Preview surat rekomendasi
            document.getElementById('suratRekomendasiInput').addEventListener('change', function(e) {
                const file = e.target.files[0];
                const previewDiv = document.getElementById('suratRekomendasiPreview');
                if (file) {
                    previewDiv.innerHTML = `File dipilih: ${file.name} (${(file.size/1024).toFixed(2)} KB)`;
                } else {
                    previewDiv.innerHTML = '';
                }
            });

            // Signature pad
            const canvas = document.getElementById('signatureCanvas');
            if (canvas) {
                signaturePad = new SignaturePad(canvas, { backgroundColor: 'rgb(255,255,255)', penColor: 'rgb(0,0,0)' });

                function resizeCanvas() {
                    const ratio = Math.max(window.devicePixelRatio || 1, 1);
                    canvas.width = canvas.offsetWidth * ratio;
                    canvas.height = canvas.offsetHeight * ratio;
                    canvas.getContext("2d").scale(ratio, ratio);
                    signaturePad.clear();
                }
                window.addEventListener("resize", resizeCanvas);
                resizeCanvas();
                document.getElementById('clearSignature').addEventListener('click', () => signaturePad.clear());
            }

            // Dropdown Lainnya
            const utusanSelect = document.querySelector('select[name="utusan"]');
            const luarContainer = document.getElementById('utusanLuarContainer');
            utusanSelect.addEventListener('change', function() {
                luarContainer.style.display = this.value === 'Lainnya' ? 'block' : 'none';
            });

            // Auto-save fields
            document.querySelectorAll('#formPesertaDinamis input:not([type="file"]), #formPesertaDinamis textarea, #formPesertaDinamis select')
            .forEach(el => {
                el.addEventListener('input', savePesertaFormState);
                el.addEventListener('change', savePesertaFormState);
            });

            restorePesertaFormState();

            document.getElementById('formPesertaDinamis').addEventListener('submit', submitPesertaForm);
        }

        async function submitPesertaForm(e) {
            e.preventDefault();
            const form = document.getElementById('formPesertaDinamis');
            const formData = new FormData(form);
            const data = { action: 'submitPeserta' };

            const fotoFile = formData.get('foto');
            if (fotoFile && fotoFile.size > 5 * 1024 * 1024) {
                showToastLocal('Ukuran foto maksimal 5 MB', 'danger');
                return;
            }
            const suratFile = formData.get('surat_rekomendasi');
            if (suratFile && suratFile.size > 5 * 1024 * 1024) {
                showToastLocal('Ukuran surat rekomendasi maksimal 5 MB', 'danger');
                return;
            }

            document.getElementById('loadingOverlay').style.display = 'flex';
            document.querySelectorAll('#formPesertaDinamis input, #formPesertaDinamis textarea, #formPesertaDinamis select').forEach(el =>
                el.disabled = true);
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Mengirim...';

            try {
                // Foto
                if (fotoFile && fotoFile.size > 0) {
                    data.foto = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = () => resolve(reader.result);
                        reader.onerror = reject;
                        reader.readAsDataURL(fotoFile);
                    });
                }
                // Surat rekomendasi
                if (suratFile && suratFile.size > 0) {
                    data.surat_rekomendasi = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = () => resolve(reader.result);
                        reader.onerror = reject;
                        reader.readAsDataURL(suratFile);
                    });
                }
                // Tanda tangan
                if (signaturePad && !signaturePad.isEmpty()) {
                    data.tanda_tangan = signaturePad.toDataURL();
                }

                formData.forEach((value, key) => {
                    if (key !== 'foto' && key !== 'surat_rekomendasi') data[key] = value;
                });

                // Handle "Lainnya"
                if (data.utusan === 'Lainnya') {
                    const luarValue = data.utusan_luar ? data.utusan_luar.trim() : '';
                    data.utusan = luarValue ? 'Lainnya - ' + luarValue : 'Lainnya (tidak diisi)';
                }
                delete data.utusan_luar;

                // Kirim melalui PKD.callApi dengan action 'submitPeserta'
                const result = await PKD.callApi('submitPeserta', data, 'POST');
                if (result.error) throw new Error(result.error);

                showToastLocal('✅ Data peserta berhasil dikirim!', 'success');
                form.reset();
                document.getElementById('pesertaFotoPreview').style.display = 'none';
                document.getElementById('suratRekomendasiPreview').innerHTML = '';
                signaturePad.clear();
                clearPesertaFormState();
                document.getElementById('utusanLuarContainer').style.display = 'none';
            } catch (err) {
                showToastLocal('❌ Gagal mengirim: ' + err.message, 'danger');
            } finally {
                document.getElementById('loadingOverlay').style.display = 'none';
                document.querySelectorAll('#formPesertaDinamis input, #formPesertaDinamis textarea, #formPesertaDinamis select')
                    .forEach(el => el.disabled = false);
                btn.disabled = false;
                btn.innerHTML = '📤 Kirim Data Peserta';
            }
        }

        // ========== MODE LOGIN CHECK (menggunakan PKD) ==========
        (async function() {
            try {
                const loginMode = await PKD.getLoginMode();
                const requireLogin = loginMode.success ? loginMode.enabled : false;
                if (requireLogin) {
                    const auth = localStorage.getItem('pkd_auth') || sessionStorage.getItem('pkd_auth');
                    if (!auth) {
                        window.location.href = 'login.html';
                        return;
                    }
                }
            } catch (e) { console.warn('Gagal cek mode login', e); }
            // Muat form setelah pengecekan
            loadPesertaForm();
        })();
    </script>
</body>
</html>
