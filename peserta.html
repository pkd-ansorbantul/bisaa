        // 🔥 PERBAIKAN: Fungsi localStorage dilindungi try-catch
        function savePesertaFormState() {
            const form = document.getElementById('formPesertaDinamis');
            if (!form) return;
            const formData = new FormData(form);
            const data = {};
            formData.forEach((v, k) => data[k] = v);
            try {
                localStorage.setItem('pesertaFormState', JSON.stringify(data));
            } catch (e) {
                console.warn('Storage diblokir browser, state tidak disimpan.');
            }
        }

        function restorePesertaFormState() {
            let saved = null;
            try {
                saved = localStorage.getItem('pesertaFormState');
            } catch (e) {
                return;
            }
            if (!saved) return;
            try {
                const data = JSON.parse(saved);
                const form = document.getElementById('formPesertaDinamis');
                if (!form) return;
                Object.keys(data).forEach(key => {
                    const field = form.querySelector(`[name="${key}"]`);
                    if (field) field.value = data[key];
                });
            } catch (e) {}
        }

        function clearPesertaFormState() {
            try {
                localStorage.removeItem('pesertaFormState');
            } catch (e) {}
        }

        // ==========================================================
        //   GENERATE & DOWNLOAD QR (Diekspos ke global)
        // ==========================================================
        window.generateQR = function(id) {
            const container = document.getElementById('qrCodeContainer');
            container.innerHTML = '';
            const qr = qrcode(0, 'M');
            qr.addData(`peserta_id=${id}`);
            qr.make();
            const canvas = document.createElement('canvas');
            const size = qr.getModuleCount() * 8;
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            for (let row = 0; row < qr.getModuleCount(); row++) {
                for (let col = 0; col < qr.getModuleCount(); col++) {
                    ctx.fillStyle = qr.isDark(row, col) ? '#000000' : '#ffffff';
                    ctx.fillRect(col * 8, row * 8, 8, 8);
                }
            }
            container.appendChild(canvas);
        };

        window.downloadQR = function() {
            const canvas = document.querySelector('#qrCodeContainer canvas');
            if (!canvas) return;
            const link = document.createElement('a');
            link.download = `QR_Peserta_${document.getElementById('pesertaIdDisplay').textContent}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        };

                { id: 'email', label: 'Email', type: 'text', required: true, isCore: true },
                { id: 'utusan', label: 'Utusan (PAC)', type: 'select', options: 'PAC Bantul,PAC Banguntapan,PAC Sewon,PAC Kasihan,PAC Pajangan,PAC Sedayu,PAC Pandak,PAC Piyungan,PAC Pleret,PAC Jetis,PAC Imogiri,PAC Dlingo,PAC Bambanglipuro,PAC Sanden,PAC Kretek,PAC Pundong,PAC Srandakan,Lainnya', required: true, isCore: true },

        // ==========================================================
        //   LOAD PESERTA FORM
        // ==========================================================
        async function loadPesertaForm() {
            const container = document.getElementById('pesertaFormContainer');

            try {
                console.log('[DEBUG] Memuat data form dari API...');
                let rawData = null;
                const settingsRes = await callApi('getFormSettings', {}, 'GET');

                if (settingsRes && settingsRes.success) {
                    let data = settingsRes.data;
                    console.log('[DEBUG] Data API diterima:', data);

                    if (typeof data === 'string') {
                        try { data = JSON.parse(data); } catch (e) { data = null; }
                    }

                    if (data && Array.isArray(data) && data.length > 0 && Array.isArray(data[0])) {
                        const correctConfig = data.find(config => {
                            if (!Array.isArray(config)) return false;
                            const suratField = config.find(f => f.id === 'surat_rekomendasi');
                            return suratField && suratField.required === false;
                        });
                        rawData = correctConfig || data[0];
                    } else if (data && Array.isArray(data)) {
                        rawData = data;
                    }
                }

                if (rawData && Array.isArray(rawData) && rawData.length > 0) {
                    formStructure = rawData;
                    console.log('✅ Form structure dimuat dari API.');
                } else {
                    console.warn('⚠️ Data API tidak valid, menggunakan form default.');
                    formStructure = getDefaultFormFields();
                }
                buildForm(container);

            } catch (e) {
                console.error('❌ Error memuat form, fallback default:', e);
                container.innerHTML = `<div class="alert alert-danger text-center py-5">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i> Gagal memuat form dari server.<br>
                    <small>Silakan refresh halaman. Jika tetap error, hubungi Admin.</small>
                    <br><button class="btn btn-outline-danger mt-3" onclick="window.location.reload()">Refresh Halaman</button>
                </div>`;
            }
        }

        // ==========================================================
        //   BUILD FORM
        // ==========================================================
        function buildForm(container) {
            if (!Array.isArray(formStructure)) {
                formStructure = getDefaultFormFields();
            }

            function getRequiredAttr(field) { return field.required ? 'required' : ''; }
            function getRequiredAsterisk(field) { return field.required ? ' <span class="text-danger">*</span>' : ''; }

            let html = `
                <div class="admin-contact">
                    <h6><i class="bi bi-telephone-fill me-2"></i>Konfirmasi Administrasi ke Panitia Lokal</h6>
                    <p class="mb-1">Sebelum mengisi formulir, silakan hubungi panitia untuk memastikan kelengkapan administrasi.</p>

                    <p class="small text-muted mt-2 mb-0">Nomor kontak sesuai flyer resmi PKD GP Ansor Bantul.</p>
                </div>
                <form id="formPesertaDinamis">
            `;

            formStructure.forEach(field => {
                const labelHtml = `<label class="form-label fw-bold">${escapeHtmlLocal(field.label)}${getRequiredAsterisk(field)}</label>`;

                if (field.id === 'foto') {
                    html += `
                        <div class="mb-3">
                            ${labelHtml}
                            <div class="input-group">
                                <input type="file" class="form-control" name="${field.id}" accept="image/*" id="input_${field.id}" ${getRequiredAttr(field)}>
                                <button class="btn btn-outline-secondary" type="button" onclick="openCamera('${field.id}')" title="Ambil dari Kamera">
                                    <i class="bi bi-camera-video-fill"></i>
                                </button>
                            </div>
                            <span class="capture-hint"><i class="bi bi-camera me-1"></i>Upload file atau gunakan tombol kamera di samping.</span>
                            <img id="preview_${field.id}" src="#" alt="Preview" style="max-width: 200px; display: none;" class="mt-2 rounded border">
                        </div>
                    `;
                } else if (field.id === 'surat_rekomendasi') {
                    html += `
                        <div class="mb-3">
                            ${labelHtml}
                            <div class="template-card mb-3">
                                <div class="d-flex flex-wrap align-items-center justify-content-between">
                                    <div>
                                        <h6 class="fw-semibold mb-1"><i class="bi bi-file-earmark-word me-1"></i>Download Template Surat Rekomendasi</h6>
                                        <p class="small text-muted mb-0"><strong>Pilih salah satu template</strong> lengkapi, cetak, lalu scan/upload.</p>
                                    </div>
                                    <div class="d-flex gap-2 flex-wrap mt-2 mt-sm-0">
                                        <a href="/bisaa/Surat Rekomendasi PAC.docx" class="btn btn-outline-primary btn-sm rounded-pill" download>
                                            <i class="bi bi-file-earmark-word me-1"></i> Template PAC
                                        </a>
                                        <a href="/bisaa/Surat Rekomendasi Masjid.docx" class="btn btn-outline-primary btn-sm rounded-pill" download>
                                            <i class="bi bi-file-earmark-word me-1"></i> Template Masjid
                                        </a>
                                    </div>
                                </div>
                            </div>
                            <div class="input-group">
                                <input type="file" class="form-control" name="${field.id}" accept=".pdf,image/*" id="input_${field.id}" ${getRequiredAttr(field)}>
                                <button class="btn btn-outline-secondary" type="button" onclick="openCamera('${field.id}')" title="Ambil dari Kamera">
                                    <i class="bi bi-camera-video-fill"></i>
                                </button>
                            </div>
                            <span class="capture-hint"><i class="bi bi-camera me-1"></i>Upload file hasil scan atau gunakan tombol kamera di samping untuk memotret langsung.</span>
                            <div id="preview_${field.id}" class="mt-2 small text-muted"></div>
                        </div>
                    `;
                } else if (field.type === 'textarea') {
                    html += `
                        <div class="mb-3">
                            ${labelHtml}
                            <textarea class="form-control" name="${field.id}" rows="3" placeholder="Masukkan jawaban Anda..." ${getRequiredAttr(field)}></textarea>
                        </div>
                    `;
                } else if (field.type === 'radio') {
                    const options = (field.options || '').split(',').map(s => s.trim()).filter(s => s);
                    html += `<div class="mb-3">${labelHtml}<div class="radio-group">`;
                    options.forEach((opt, idx) => {
                        html += `
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="${field.id}" value="${escapeHtmlLocal(opt)}" id="${field.id}_${idx}" ${getRequiredAttr(field)}>
                                <label class="form-check-label" for="${field.id}_${idx}">${escapeHtmlLocal(opt)}</label>
                            </div>
                        `;
                    });
                    html += `</div></div>`;
                } else if (field.type === 'select') {
                    const options = (field.options || '').split(',').map(s => s.trim()).filter(s => s);
                    html += `<div class="mb-3">${labelHtml}<select class="form-select" name="${field.id}" ${getRequiredAttr(field)}>`;
                    html += `<option value="">-- Pilih --</option>`;
                    options.forEach(opt => {
                        html += `<option value="${escapeHtmlLocal(opt)}">${escapeHtmlLocal(opt)}</option>`;
                    });
                    html += `</select></div>`;
                } else {
                    html += `
                        <div class="mb-3">
                            ${labelHtml}
                            <input type="text" class="form-control" name="${field.id}" placeholder="Masukkan ${escapeHtmlLocal(field.label)}" ${getRequiredAttr(field)}>
                        </div>
                    `;
                }
            });

            // ==========================================================
            //   BAGIAN TANDA TANGAN
            // ==========================================================
            html += `
                    <div class="mb-3">
                        <label class="form-label fw-bold">✍️ Tanda Tangan Digital</label>
                        <div class="signature-wrapper">
                            <div class="signature-area" id="signatureAreaContainer">
                                <canvas id="signatureCanvas"></canvas>
                                <div class="signature-hint"><i class="bi bi-pencil me-2"></i>Tanda tangan di sini</div>
                            </div>
                            <div class="mt-2 d-flex gap-2 flex-wrap align-items-center">
                                <button type="button" class="btn btn-outline-secondary btn-sm" id="clearSignature"><i class="bi bi-eraser me-1"></i> Hapus Semua</button>
                                <button type="button" class="btn btn-outline-primary btn-sm" id="undoSignature"><i class="bi bi-arrow-counterclockwise me-1"></i> Undo</button>
                                <small class="text-muted ms-1">Gunakan mouse atau jari. Garis tebal/tipis mengikuti kecepatan.</small>
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill">📤 Kirim Data Peserta</button>
                </form>

                <div id="qrResult">
                    <h5><i class="bi bi-qr-code"></i> ID Peserta Anda</h5>
                    <p class="text-muted">Simpan QR Code ini. Panitia akan memindainya saat absen setiap sesi.</p>
                    <div id="qrCodeContainer"></div>
                    <p class="small text-muted">ID Peserta: <span id="pesertaIdDisplay"></span></p>
                    <button class="btn btn-outline-secondary btn-sm mt-2" onclick="downloadQR()"><i class="bi bi-download"></i> Unduh QR</button>
                    <div class="alert alert-info mt-3 small">
                        <i class="bi bi-info-circle me-1"></i> QR ini hanya aktif setelah data Anda disetujui oleh admin. Jika belum muncul, mohon tunggu konfirmasi.
                    </div>
                </div>
            `;

            container.innerHTML = html;
            container.classList.add('fade-up');

            document.querySelectorAll('#formPesertaDinamis input[type="file"]').forEach(input => {
                input.addEventListener('change', function(e) {
                    const file = e.target.files[0];
                    const previewId = `preview_${this.name}`;
                    const previewEl = document.getElementById(previewId);
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = function(ev) {
                            if (this.name === 'foto') {
                                previewEl.src = ev.target.result;
                                previewEl.style.display = 'block';
                            } else {
                                previewEl.innerHTML = `File dipilih: ${file.name} (${(file.size/1024).toFixed(2)} KB)`;
                            }
                        }.bind(this);
                        reader.readAsDataURL(file);
                    } else {
                        if (this.name === 'foto') {
                            previewEl.style.display = 'none';
                        } else {
                            previewEl.innerHTML = '';
                        }
                    }
                });
            });

            const canvas = document.getElementById('signatureCanvas');
            const containerSignature = document.getElementById('signatureAreaContainer');
            if (canvas) {
                if (window.sigPad) { window.sigPad.clear(); window.sigPad = null; }
                
                window.sigPad = new SignaturePad(canvas, { 
                    backgroundColor: 'rgb(255,255,255)', 
                    penColor: 'rgb(0,0,0)', 
                    minWidth: 0.5,
                    maxWidth: 3.5,
                    velocityFilterWeight: 0.7,
                    throttle: 16
                });

                function resizeCanvas() {
                    const ratio = Math.max(window.devicePixelRatio || 1, 1);
                    canvas.width = canvas.offsetWidth * ratio;
                    canvas.height = canvas.offsetHeight * ratio;
                    canvas.getContext("2d").scale(ratio, ratio);
                    if (window.sigPad) window.sigPad.clear();
                }
                window.addEventListener("resize", resizeCanvas);
                resizeCanvas();

                window.sigPad.addEventListener('beginStroke', () => {
                    containerSignature.classList.add('drawing');
                });
                window.sigPad.addEventListener('endStroke', () => {
                    if (window.sigPad.isEmpty()) {
                        containerSignature.classList.remove('drawing');
                    }
                    savePesertaFormState();
                });

                document.getElementById('clearSignature').addEventListener('click', () => {
                    if (window.sigPad) window.sigPad.clear();
                    containerSignature.classList.remove('drawing');
                    savePesertaFormState();
                });

                document.getElementById('undoSignature').addEventListener('click', () => {
                    if (window.sigPad) {
                        const data = window.sigPad.toData();
                        if (data && data.length > 0) {
                            data.pop();
                            window.sigPad.fromData(data);
                            if (window.sigPad.isEmpty()) {
                                containerSignature.classList.remove('drawing');
                            }
                            savePesertaFormState();
                        }
                    }
                });

                window.sigPad.addEventListener('endStroke', savePesertaFormState);
            }

            const utusanSelect = document.querySelector('select[name="utusan"]');
            const luarContainer = document.createElement('div');
            luarContainer.id = 'utusanLuarContainer';
            luarContainer.style.display = 'none';
            luarContainer.style.marginTop = '8px';
            luarContainer.innerHTML = `
                <label class="form-label fw-bold">Tulis Asal (Lainnya)</label>
                <input type="text" class="form-control" name="utusan_luar" placeholder="Contoh: PC Sleman, Luar DIY, Masjid Al-Ikhlas, Mushola dll">
            `;
            if (utusanSelect && !document.getElementById('utusanLuarContainer')) {
                utusanSelect.parentNode.appendChild(luarContainer);
                utusanSelect.addEventListener('change', function() {
                    document.getElementById('utusanLuarContainer').style.display = this.value === 'Lainnya' ? 'block' : 'none';
                });
            }

            document.querySelectorAll('#formPesertaDinamis input:not([type="file"]), #formPesertaDinamis textarea, #formPesertaDinamis select')
                .forEach(el => {
                    el.addEventListener('input', savePesertaFormState);
                    el.addEventListener('change', savePesertaFormState);
                });

            restorePesertaFormState();

            document.getElementById('formPesertaDinamis').addEventListener('submit', submitPesertaForm);
        }

        // ==========================================================
        //   KAMERA (Webcam)
        // ==========================================================
        window.openCamera = async function(targetId) {
            if (cameraActive) return;
            currentCameraTarget = targetId;
            const modal = new bootstrap.Modal(document.getElementById('cameraModal'));
            const video = document.getElementById('cameraVideo');
            const title = document.getElementById('cameraModalTitle');
            title.innerText = targetId === 'foto' ? 'Ambil Foto Diri' : 'Ambil Foto / Scan Surat Rekomendasi';
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                cameraStream = stream;
                video.srcObject = stream;
                video.play();
                cameraActive = true;
                modal.show();
            } catch (err) {
                showToastLocal('Gagal mengakses kamera: ' + err.message, 'error');
            }
        };

        document.getElementById('capturePhotoBtn').addEventListener('click', function() {
            const video = document.getElementById('cameraVideo');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);
            canvas.toBlob(function(blob) {
                if (!blob) return;
                const file = new File([blob], `capture_${currentCameraTarget}_${Date.now()}.jpg`, { type: 'image/jpeg' });
                const input = document.getElementById(`input_${currentCameraTarget}`);
                const dataTransfer = new DataTransfer();
                dataTransfer.items.add(file);
                input.files = dataTransfer.files;
                input.dispatchEvent(new Event('change'));
                bootstrap.Modal.getInstance(document.getElementById('cameraModal')).hide();
                closeCamera();
            }, 'image/jpeg', 0.8);
        });

        function closeCamera() {
            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
                cameraStream = null;
            }
            cameraActive = false;
            const video = document.getElementById('cameraVideo');
            if (video) video.srcObject = null;
        }

        document.getElementById('cameraModal').addEventListener('hidden.bs.modal', function() {
            closeCamera();
        });

        // ==========================================================
        //   🔥 PERBAIKAN: SUBMIT FORM (TANPA ERROR)
        // ==========================================================
        async function submitPesertaForm(e) {
            e.preventDefault();
            const form = document.getElementById('formPesertaDinamis');
            const formData = new FormData(form);
            const data = { action: 'submitPeserta', custom_data: {} };
            const overlay = document.getElementById('loadingOverlay');

            const missingFields = [];
            formStructure.forEach(field => {
                if (field.required) {
                    const val = formData.get(field.id);
                    const isFile = field.type === 'file';
                    let isEmpty = true;
                    if (isFile) {
                        const fileInput = document.getElementById(`input_${field.id}`);
                        isEmpty = !fileInput || !fileInput.files.length;
                    } else {
                        isEmpty = !val || val.trim() === '';
                    }
                    if (isEmpty) {
                        missingFields.push(field.label);
                    }
                }
            });

            if (missingFields.length > 0) {
                showToastLocal('Harap isi: ' + missingFields.join(', '), 'error');
                return;
            }

            const fotoFile = formData.get('foto');
            if (fotoFile && fotoFile.size > 5 * 1024 * 1024) {
                showToastLocal('Ukuran foto maksimal 5 MB', 'danger');
                return;
            }
            const suratFile = formData.get('surat_rekomendasi');
            if (suratFile && suratFile.size > 5 * 1024 * 1024) {
                showToastLocal('Ukuran surat rekomendasi maksimal 5 MB', 'danger');
                return;
            }

            // 🔥 CEGAH ERROR NULL .style
            if (overlay) overlay.style.display = 'flex';
            
            document.querySelectorAll('#formPesertaDinamis input, #formPesertaDinamis textarea, #formPesertaDinamis select')
                .forEach(el => el.disabled = true);
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Mengirim...';

            try {
                if (fotoFile && fotoFile.size > 0) {
                    data.foto = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = () => resolve(reader.result);
                        reader.onerror = reject;
                        reader.readAsDataURL(fotoFile);
                    });
                }
                if (suratFile && suratFile.size > 0) {
                    data.surat_rekomendasi = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = () => resolve(reader.result);
                        reader.onerror = reject;
                        reader.readAsDataURL(suratFile);
                    });
                }

                if (window.sigPad && !window.sigPad.isEmpty()) {
                    data.tanda_tangan = window.sigPad.toDataURL('image/jpeg', 0.2);
                }

                formStructure.forEach(field => {
                    const val = formData.get(field.id);
                    if (field.type === 'file') return;
                    const coreFields = ['nama_lengkap','tempat_tgl_lahir','pekerjaan','pendidikan_terakhir','alamat','no_hp','email','utusan','pengalaman_organisasi','status','tanggal','catatan'];
                    if (coreFields.includes(field.id)) {
                        data[field.id] = val || '';
                    } else {
                        data.custom_data[field.id] = val || '';
                    }
                });

                if (data.utusan === 'Lainnya') {
                    const luarValue = data.utusan_luar ? data.utusan_luar.trim() : '';
                    data.utusan = luarValue ? 'Lainnya - ' + luarValue : 'Lainnya (tidak diisi)';
                }
                delete data.utusan_luar;

                const result = await submitPeserta(data);
                if (!result.success) throw new Error(result.error || 'Gagal mengirim');

                showToastLocal('✅ Data peserta berhasil dikirim!', 'success');

                const qrResult = document.getElementById('qrResult');
                qrResult.style.display = 'block';
                document.getElementById('pesertaIdDisplay').textContent = result.id || 'ID belum tersedia';
                generateQR(result.id);
                document.querySelector('#qrResult .alert-info').innerHTML = `
                    <i class="bi bi-info-circle me-1"></i> Data Anda sedang diverifikasi oleh admin. 
                    QR Code ini akan aktif setelah disetujui. Silakan cek kembali nanti.
                `;
                form.reset();
                document.querySelectorAll('#formPesertaDinamis img[id^="preview_"]').forEach(el => el.style.display = 'none');
                document.querySelectorAll('#formPesertaDinamis div[id^="preview_"]').forEach(el => el.innerHTML = '');
                if (window.sigPad) window.sigPad.clear();
                clearPesertaFormState();
                const utusanLuar = document.getElementById('utusanLuarContainer');
                if (utusanLuar) utusanLuar.style.display = 'none';
            } catch (err) {
                showToastLocal('❌ Gagal mengirim: ' + err.message, 'danger');
            } finally {
                // 🔥 CEGAH ERROR NULL .style
                if (overlay) overlay.style.display = 'none';
                
                document.querySelectorAll('#formPesertaDinamis input, #formPesertaDinamis textarea, #formPesertaDinamis select')
                    .forEach(el => el.disabled = false);
                btn.disabled = false;
                btn.innerHTML = '📤 Kirim Data Peserta';
            }
        }

        // ==========================================================
        //   🛡️ GUARD PUBLIC ACCESS & BOOT
        // ==========================================================
        (async function boot() {
            const canAccess = await guardPublicAccess();
            if (!canAccess) return;
            updateNavbarMenu();
            await loadPesertaForm();
        })();

        // ==========================================================
        //   🔥 PERBAIKAN UTAMA: SKELETON MUNCUL SEBELUM KODE LAIN
        // ==========================================================
        document.addEventListener('DOMContentLoaded', function() {
            // Render skeleton secara instan (sinkron) saat DOM siap
            const container = document.getElementById('pesertaFormContainer');
            if (container) {
                renderSkeletonPeserta(container);
            }
        });

    </script>
</body>
</html>
