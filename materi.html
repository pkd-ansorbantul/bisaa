<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>Materi Pelatihan · PKD GP Ansor Bantul</title>
  <link rel="icon" type="image/png" href="/bisaa/LOGO%20ANSOR.webp">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>
    /* ===== UNIVERSAL PREMIUM (GLASSMORPHISM) ===== */
    * { font-family: 'Inter', system-ui, sans-serif; }
    body {
      background: #f8fafc;
      color: #0f172a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* --- HEADER MINIMALIS ELEGAN (DIPERBESAR) --- */
    .header-minimal {
      background: rgba(255, 255, 255, 0.72) !important;
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.3);
      z-index: 1030;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.04);
      padding-top: 0 !important;
      padding-bottom: 0 !important;
    }
    .header-minimal .container {
      padding-top: 0.75rem;
      padding-bottom: 0.75rem;
    }
    .btn-back {
      background: rgba(37, 99, 235, 0.08);
      color: #2563eb;
      border: 1px solid rgba(37, 99, 235, 0.2);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .btn-back:hover {
      background: #2563eb;
      color: white;
      transform: translateX(-3px);
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
    }
    .brand-logo-mini { 
      height: 40px; 
      width: auto; 
      margin-right: 14px; 
      transition: transform 0.2s;
    }
    .brand-logo-mini:hover { transform: scale(1.05); }
    .brand-title-mini { 
      font-weight: 700; 
      color: #0a3d62; 
      font-size: 1.3rem; 
      line-height: 1.2; 
      letter-spacing: -0.02em;
    }
    .brand-sub-mini { 
      font-size: 0.8rem; 
      color: #64748b; 
      display: block; 
      margin-top: 0px; 
      letter-spacing: 0.02em;
    }

    #navbarUserMenu { display: flex; align-items: center; gap: 8px; }
    .user-menu-area .dropdown-toggle { border-radius: 50px; padding: 0.3rem 1rem; font-size: 0.9rem; }
    .user-menu-area .btn-outline-primary { border-radius: 50px; padding: 0.3rem 1.2rem; font-size: 0.9rem; }

    /* --- GLASS CARD --- */
    .glass-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px) saturate(180%);
      -webkit-backdrop-filter: blur(12px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
      transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .glass-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 50px rgba(37, 99, 235, 0.08);
      border-color: rgba(37, 99, 235, 0.2);
    }

    /* --- SKELETON LOADING INSTANT --- */
    .skeleton-box {
      background: #e2e8f0;
      border-radius: 12px;
      animation: pulse 1.5s infinite ease-in-out;
      display: inline-block;
    }
    @keyframes pulse {
      0% { opacity: 0.6; }
      50% { opacity: 1; }
      100% { opacity: 0.6; }
    }
    .skeleton-icon { width: 50px; height: 50px; margin-bottom: 15px; }
    .skeleton-title { height: 24px; width: 80%; margin-bottom: 10px; }
    .skeleton-desc { height: 16px; width: 60%; }

    /* --- MATERI CARD INTERAKTIF --- */
    .materi-card {
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      transform-style: preserve-3d;
    }
    .materi-card:hover {
      transform: translateY(-8px) rotateX(2deg) rotateY(2deg) scale(1.02);
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }
    .materi-card .preview-btn {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: white;
      transition: 0.3s;
    }
    .materi-card .preview-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
    }
    .materi-icon {
      font-size: 2.5rem;
      transition: transform 0.3s;
    }
    .materi-card:hover .materi-icon {
      transform: scale(1.15) rotate(-5deg);
    }

    /* --- PREVIEW MODAL --- */
    #previewMateriModal .modal-content {
      background: #0f172a;
      border-radius: 20px;
    }
    #previewMateriModal iframe {
      width: 100%;
      height: 80vh;
      border: none;
      border-radius: 0 0 20px 20px;
    }

    /* --- ANIMASI --- */
    .fade-up { animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    /* --- FOOTER --- */
    .footer-modern {
      font-size: 0.85rem;
      color: #64748b;
      margin-top: auto;
      text-align: center;
      padding: 1.5rem 0;
      border-top: 1px solid #e2e8f0;
      background: white;
    }

    /* --- RESPONSIF --- */
    @media (max-width: 576px) {
      .glass-card { border-radius: 16px; padding: 1rem !important; }
      .header-minimal .container { padding: 0 0.5rem; }
      .btn-back { font-size: 0.8rem; padding: 0.2rem 0.8rem; }
      .brand-title-mini { display: none; }
      .brand-sub-mini { display: none; }
      .user-menu-area .dropdown-toggle { font-size: 0.75rem; padding: 0.2rem 0.8rem; }
      .materi-card .preview-btn { font-size: 0.8rem; padding: 0.3rem 0.8rem; }
    }
  </style>
</head>
<body>

  <!-- ================= HEADER MINIMALIS ELEGAN ================= -->
  <header class="header-minimal sticky-top shadow-sm">
    <div class="container d-flex justify-content-between align-items-center py-3">
      <div class="d-flex align-items-center gap-2">
        <a href="/bisaa/index.html" class="btn btn-back rounded-pill">
          <i class="bi bi-arrow-left me-1"></i> Kembali
        </a>
        <a href="/bisaa/index.html" class="brand-minimal text-decoration-none d-flex align-items-center ms-1">
          <img src="/bisaa/LOGO%20ANSOR.webp" alt="GP Ansor" class="brand-logo-mini">
          <div>
            <div class="brand-title-mini">PKD GP Ansor</div>
            <span class="brand-sub-mini">Kabupaten Bantul</span>
          </div>
        </a>
      </div>
      <!-- Area User Role (diisi oleh api.js) -->
      <div id="navbarUserMenu" class="user-menu-area"></div>
    </div>
  </header>

  <!-- ================= KONTEN UTAMA ================= -->
  <div id="contentArea">
    <section id="materiSection" class="container" style="padding: 2rem 0; max-width: 1000px;">
      <h2 class="section-title fade-up"><i class="bi bi-journal-bookmark-fill me-2"></i>Materi Pelatihan</h2>
      <div id="materiContainer" class="row g-4"></div>
    </section>
  </div>

  <!-- ================= MODAL PREVIEW ================= -->
  <div class="modal fade" id="previewMateriModal" tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog modal-xl modal-dialog-centered">
      <div class="modal-content border-0 shadow-lg">
        <div class="modal-header bg-dark text-white border-0 rounded-top-4">
          <h5 class="modal-title" id="previewMateriLabel">
            <i class="bi bi-file-earmark-play me-2"></i><span id="previewMateriJudul">Pratinjau Materi</span>
          </h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-0 d-flex justify-content-center align-items-center" style="min-height: 70vh; background: #0f172a; border-radius: 0 0 20px 20px; position: relative;">
          <div id="previewMateriSpinner" class="position-absolute top-50 start-50 translate-middle">
            <div class="spinner-border text-light" role="status">
              <span class="visually-hidden">Memuat...</span>
            </div>
          </div>
          <iframe id="previewMateriIframe" src="" style="width: 100%; height: 80vh; border: none; border-radius: 0 0 20px 20px;" allowfullscreen onload="document.getElementById('previewMateriSpinner').style.display='none';"></iframe>
        </div>
        <div class="modal-footer border-0 bg-dark rounded-bottom-4">
          <button type="button" class="btn btn-outline-light rounded-pill px-4" onclick="toggleFullscreen()">
            <i class="bi bi-fullscreen"></i> Fullscreen (F5)
          </button>
          <button type="button" class="btn btn-outline-light rounded-pill px-4" data-bs-dismiss="modal">Tutup</button>
          <a id="previewMateriDownloadBtn" href="#" target="_blank" class="btn btn-primary rounded-pill px-4">
            <i class="bi bi-download me-1"></i>Unduh
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- ================= FOOTER ================= -->
  <footer class="footer-modern container">
    <div class="d-flex justify-content-center align-items-center gap-2">
      <i class="bi bi-c-circle"></i>
      <span>Hak Cipta 2026 - Tim Instruktur GP Ansor Kabupaten Bantul</span>
    </div>
  </footer>

  <!-- ================= SCRIPTS ================= -->
  <!-- Library Eksternal (tetap sebagai script biasa) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Modul ES Khusus Halaman Ini -->
  <script type="module">
    // ==========================================================
    //   IMPOR DARI CORE API (ES Modules)
    // ==========================================================
    import {
      guardPublicAccess,
      getMateriList,
      updateNavbarMenu,
      showToast,
      escapeHtml,
      fetchWithCache
    } from './js/core/api.js';

    // ==========================================================
    //   UTILITY & CACHE LOCAL
    // ==========================================================
    function escapeHtmlLocal(str) {
      return escapeHtml(str);
    }

    // ==========================================================
    //   🔥 RENDER SKELETON (Tampilan instan saat DOM siap)
    // ==========================================================
    function renderSkeletonMateri(container) {
      if (!container) return;
      console.log("🟡 Menampilkan SKELETON Materi...");
      let html = '';
      for (let i = 0; i < 6; i++) {
        html += `
          <div class="col-md-6 col-lg-4 fade-up" style="animation-delay: ${i * 0.05}s;">
            <div class="glass-card p-4 h-100 d-flex flex-column" style="min-height: 200px;">
              <div class="d-flex align-items-center mb-3">
                <div class="skeleton-box skeleton-icon"></div>
                <div class="skeleton-box skeleton-title ms-3"></div>
              </div>
              <div class="skeleton-box skeleton-desc mb-3"></div>
              <div class="skeleton-box skeleton-desc" style="width: 40%;"></div>
            </div>
          </div>
        `;
      }
      container.innerHTML = html;
      container.classList.add('fade-up');
    }

    // ==========================================================
    //   RENDER DATA ASLI
    // ==========================================================
    function renderMateriList(container, materi) {
      if (!materi || materi.length === 0) {
        container.innerHTML = `
          <div class="col-12">
            <div class="glass-card p-5 text-center text-muted fade-up">
              <i class="bi bi-inbox fs-1 d-block mb-3"></i>
              <h5>Belum ada materi yang diunggah</h5>
              <p class="small">Silakan hubungi admin untuk penambahan materi.</p>
            </div>
          </div>
        `;
        return;
      }

      let html = '';
      materi.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp)).forEach((m, idx) => {
        const fileUrl = `https://drive.google.com/file/d/${m.fileId}/view`;
        const previewUrl = `https://drive.google.com/file/d/${m.fileId}/preview`;
        const iconClass = m.tipe === 'pdf' ? 'bi-file-pdf-fill text-danger' :
                          (m.tipe === 'ppt' || m.tipe === 'pptx' ? 'bi-file-ppt-fill text-warning' :
                          (m.tipe === 'doc' || m.tipe === 'docx' ? 'bi-file-word-fill text-primary' : 'bi-file-earmark-fill text-secondary'));

        html += `
          <div class="col-md-6 col-lg-4 fade-up" style="animation-delay: ${(idx * 0.05)}s;">
            <div class="materi-card glass-card p-4 h-100 d-flex flex-column">
              <div class="d-flex align-items-center mb-3">
                <i class="materi-icon ${iconClass} me-3"></i>
                <h5 class="card-title mb-0 fw-semibold">${escapeHtmlLocal(m.judul || '')}</h5>
              </div>
              <p class="card-text text-muted small flex-grow-1">${escapeHtmlLocal(m.deskripsi || '')}</p>
              <div class="d-flex justify-content-between align-items-center mt-3">
                <span class="badge bg-light text-dark">${(m.tipe || 'file').toUpperCase()}</span>
                <div>
                  <button class="preview-btn btn btn-sm rounded-pill px-3 me-1" 
                    data-judul="${escapeHtmlLocal(m.judul)}" 
                    data-preview-url="${previewUrl}" 
                    data-download-url="${fileUrl}">
                    <i class="bi bi-play-circle me-1"></i>Tayangkan
                  </button>
                  <a href="${fileUrl}" target="_blank" class="btn btn-outline-secondary btn-sm rounded-pill px-3">
                    <i class="bi bi-download"></i>
                  </a>
                </div>
              </div>
              <div class="mt-2 text-end text-muted small">
                Diupload: ${new Date(m.timestamp).toLocaleDateString('id-ID')}
              </div>
            </div>
          </div>
        `;
      });

      container.innerHTML = html;
      container.classList.add('fade-up');

      // Event listener untuk tombol preview
      document.querySelectorAll('.preview-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          const judul = this.dataset.judul;
          const previewUrl = this.dataset.previewUrl;
          const downloadUrl = this.dataset.downloadUrl;

          document.getElementById('previewMateriJudul').innerText = judul;
          document.getElementById('previewMateriIframe').src = previewUrl;
          document.getElementById('previewMateriDownloadBtn').href = downloadUrl;
          document.getElementById('previewMateriSpinner').style.display = 'flex';

          new bootstrap.Modal(document.getElementById('previewMateriModal')).show();
        });
      });
    }

    // ==========================================================
    //   FULLSCREEN TOGGLE (Diekspos ke global untuk onclick)
    // ==========================================================
    window.toggleFullscreen = function() {
      const iframe = document.getElementById('previewMateriIframe');
      if (!iframe) return;
      if (!document.fullscreenElement) {
        iframe.requestFullscreen().then(() => {
          const modalHeader = document.querySelector('#previewMateriModal .modal-header');
          const modalFooter = document.querySelector('#previewMateriModal .modal-footer');
          if (modalHeader) modalHeader.style.display = 'none';
          if (modalFooter) modalFooter.style.display = 'none';
        }).catch(err => {
          console.warn('Gagal fullscreen:', err);
        });
      } else {
        document.exitFullscreen();
      }
    };

    // Reset modal saat ditutup
    document.getElementById('previewMateriModal')?.addEventListener('hidden.bs.modal', function () {
      document.getElementById('previewMateriIframe').src = '';
      document.getElementById('previewMateriSpinner').style.display = 'flex';
      if (document.fullscreenElement) {
        document.exitFullscreen();
      }
    });

    // ==========================================================
    //   LOAD MATERI (CACHE INSTAN + BACKGROUND SYNC)
    // ==========================================================
    async function loadMateriList() {
      const container = document.getElementById('materiContainer');
      const CACHE_KEY = 'materi_list';
      const CACHE_AGE = 30; // menit

      // 1. Cek cache lokal (menggunakan fetchWithCache)
      let cachedData = await fetchWithCache('getMateriList', {}, CACHE_KEY, CACHE_AGE, false);

      if (cachedData && cachedData.length > 0) {
        console.log('[DEBUG] Memuat data dari CACHE lokal. Jumlah item:', cachedData.length);
        renderMateriList(container, cachedData);
      } else {
        console.log('[DEBUG] Tidak ada cache lokal yang valid.');
      }

      // 2. Fetch data dari API di LATAR BELAKANG (refresh cache)
      (async function refreshData() {
        try {
          console.log('[DEBUG] Mengambil data materi dari API...');
          // Gunakan fetchWithCache dengan forceRefresh = true untuk memaksa update cache
          const dataArray = await fetchWithCache('getMateriList', {}, CACHE_KEY, CACHE_AGE, true);

          if (dataArray && dataArray.length > 0) {
            // Jika data dari API berbeda dengan cache atau cache kosong, render ulang
            const currentDataStr = JSON.stringify(cachedData || []);
            const newDataStr = JSON.stringify(dataArray);
            if (currentDataStr !== newDataStr) {
              console.log('[DEBUG] Data API berubah, merender ulang...');
              renderMateriList(container, dataArray);
            } else {
              console.log('[DEBUG] Data API sama dengan cache, tidak perlu merender ulang.');
            }
          } else {
            console.warn('[DEBUG] API tidak mengembalikan array data yang valid.');
            if (!cachedData || cachedData.length === 0) {
              renderMateriList(container, []);
            }
          }
        } catch (e) {
          console.error('[DEBUG] Gagal fetch di background:', e);
          if (!cachedData || cachedData.length === 0) {
            renderMateriList(container, []);
          }
        }
      })();
    }

    // ==========================================================
    //   🛡️ GUARD PUBLIC ACCESS & BOOT
    // ==========================================================
    (async function boot() {
      const canAccess = await guardPublicAccess();
      if (!canAccess) return;

      // Update navbar user
      updateNavbarMenu();

      await loadMateriList();
    })();

    // ==========================================================
    //   🔥 PERBAIKAN UTAMA: SKELETON MUNCUL SEBELUM KODE LAIN
    // ==========================================================
    document.addEventListener('DOMContentLoaded', function() {
      // Render skeleton secara instan (sinkron) saat DOM siap
      const container = document.getElementById('materiContainer');
      if (container) {
        renderSkeletonMateri(container);
      }
    });

  </script>
</body>
</html>
