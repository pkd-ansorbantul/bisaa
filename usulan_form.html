<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>PKD GP Ansor Bantul · Form Usulan PKD dari PAC</title>
  <link rel="icon" type="image/png" href="LOGO ANSOR.webp">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #0f172a; }
    .container-card { max-width: 1000px; background: white; border-radius: 32px; padding: 2rem; margin: 30px auto; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); border: 1px solid rgba(226,232,240,0.6); }
    .section-title { font-weight: 650; font-size: 1.75rem; border-left: 6px solid #2563eb; padding-left: 1.2rem; margin-bottom: 1.8rem; }
    .form-usulan-card { background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 24px; padding: 1.5rem; margin-bottom: 2rem; }
    .footer-modern { font-size: 0.85rem; color: #64748b; margin-top: 2rem; text-align: center; padding: 1.5rem 0; border-top: 1px solid #e2e8f0; background: white; }
    .simple-header { text-align: center; margin: 1.5rem 0; }
    .simple-header img { height: 50px; }
    .simple-header h1 { font-size: 1.5rem; font-weight: 700; color: #0a3d62; margin: 0.5rem 0; }
    .simple-header p { color: #6c757d; margin: 0; }
    .btn-wa {
      background-color: #25D366;
      border-color: #25D366;
      color: white;
    }
    .btn-wa:hover {
      background-color: #20b859;
      border-color: #20b859;
      color: white;
    }
  </style>
</head>
<body>
  <div class="simple-header">
    <img src="LOGO ANSOR.webp" alt="GP Ansor">
    <h1>PKD GP Ansor Kabupaten Bantul</h1>
    <p>Form Usulan PKD dari PAC</p>
  </div>

  <div class="container container-card">
    <h2 class="section-title mb-4"><i class="bi bi-envelope-paper me-2"></i>Form Usulan PKD dari PAC</h2>
    
    <div class="form-usulan-card">
      <h4 class="fw-bold mb-3"><i class="bi bi-send me-2"></i>Ajukan Usulan PKD dari PAC</h4>
      <form id="usulanForm">
        <div class="row g-3">
          <div class="col-md-6"><label class="form-label fw-semibold">Nama Lengkap</label><input type="text" class="form-control" id="usulanNama" placeholder="Contoh: Ulinnuha" required></div>
          <div class="col-md-6"><label class="form-label fw-semibold">Usulan (Nama PAC)</label><input type="text" class="form-control" id="usulanUsulan" placeholder="Contoh: PAC GP Ansor Kapanewon Sewon" required></div>
          <div class="col-md-6"><label class="form-label fw-semibold">Tanggal Mulai</label><input type="date" class="form-control" id="usulanTanggalMulai" required></div>
          <div class="col-md-6"><label class="form-label fw-semibold">Tanggal Berakhir (opsional)</label><input type="date" class="form-control" id="usulanTanggalAkhir"><div class="form-text">Kosongkan jika hanya satu hari.</div></div>
          <div class="col-md-6"><label class="form-label fw-semibold">Lokasi</label><input type="text" class="form-control" id="usulanLokasi" placeholder="SKB Semail, Bangunharjo" required></div>
          <div class="col-md-6"><label class="form-label fw-semibold">Nomor HP</label><input type="tel" class="form-control" id="usulanNoHp" placeholder="083866675521" required></div>
          <div class="col-12"><label class="form-label fw-semibold">Upload Flyer (opsional)</label><input type="file" class="form-control" id="usulanFlyer" accept="image/*"><img id="flyerPreview" style="max-width:100px;max-height:80px;margin-top:8px;border-radius:8px;display:none;object-fit:cover;" alt="Preview"><div class="form-text">Upload gambar flyer acara (max 2MB, JPG/PNG). Kosongkan jika tidak ada.</div></div>
          <div class="col-12"><label class="form-label fw-semibold">Verifikasi: <span id="captchaQuestion">5 + 3 = ?</span></label><input type="number" class="form-control" id="captchaAnswer" placeholder="Masukkan hasil penjumlahan" required></div>
          <div class="col-12"><button type="submit" class="btn btn-primary rounded-pill px-4"><i class="bi bi-send me-1"></i>Kirim Usulan</button></div>
        </div>
      </form>
      <div id="usulanFormMessage" class="mt-3 small"></div>
    </div>
  </div>

  <footer class="footer-modern container">
    <div class="d-flex justify-content-center align-items-center gap-2">
      <i class="bi bi-c-circle"></i><span>Hak Cipta 2026 - Tim Instruktur GP Ansor Kabupaten Bantul</span>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="api.js"></script>
  <script>
    // Menggunakan PKD
    const { escapeHtml } = PKD;

    let currentCaptchaResult = 0;
    let lastSubmittedData = null; // menyimpan data usulan terakhir untuk konfirmasi WA

    // Storage fallback tidak diperlukan lagi, PKD sudah menangani cache.

    // CAPTCHA
    function generateCaptcha() {
      const a = Math.floor(Math.random() * 10) + 1;
      const b = Math.floor(Math.random() * 10) + 1;
      currentCaptchaResult = a + b;
      document.getElementById('captchaQuestion').innerText = `${a} + ${b} = ?`;
      document.getElementById('captchaAnswer').value = '';
    }

    // Preview flyer
    document.getElementById('usulanFlyer').addEventListener('change', function(e) {
      const file = e.target.files[0];
      const preview = document.getElementById('flyerPreview');
      if (file) {
        const reader = new FileReader();
        reader.onload = ev => { preview.src = ev.target.result; preview.style.display = 'block'; };
        reader.readAsDataURL(file);
      } else { preview.style.display = 'none'; preview.src = ''; }
    });

    function readFileAsBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // Format tanggal menjadi string lokal Indonesia (opsional, untuk tampilan WA)
    function formatDateForWA(dateStr) {
      if (!dateStr) return '';
      const parts = dateStr.split('-');
      if (parts.length !== 3) return dateStr;
      return `${parts[2]}/${parts[1]}/${parts[0]}`;
    }

    // Generate teks pesan WhatsApp berdasarkan data usulan
    function generateWhatsAppText(data) {
      const nama = data.nama || '-';
      const usulan = data.usulan || '-';
      const tglMulai = formatDateForWA(data.tanggalMulai);
      const tglAkhir = data.tanggalAkhir ? formatDateForWA(data.tanggalAkhir) : '';
      const periode = tglAkhir ? `${tglMulai} s.d ${tglAkhir}` : tglMulai;
      const lokasi = data.lokasi || '-';
      const noHp = data.no_hp || '-';
      
      let pesan = `*KONFIRMASI USULAN PKD*%0A%0A` +
                  `Saya mengajukan usulan PKD melalui form online:%0A` +
                  `Nama: ${nama}%0A` +
                  `PAC: ${usulan}%0A` +
                  `Tanggal: ${periode}%0A` +
                  `Lokasi: ${lokasi}%0A` +
                  `No. HP: ${noHp}%0A%0A` +
                  `Mohon segera diproses. Terima kasih.`;
      return pesan;
    }

    // Tampilkan pesan sukses beserta tombol konfirmasi WA
    function showSuccessWithWaButton(data) {
      const msgDiv = document.getElementById('usulanFormMessage');
      const waText = generateWhatsAppText(data);
      const waLink = `https://wa.me/6283866675521?text=${waText}`;
      
      msgDiv.innerHTML = `
        <div class="alert alert-success alert-dismissible fade show" role="alert">
          <i class="bi bi-check-circle-fill me-2"></i> <strong>Usulan berhasil dikirim!</strong> Data Anda sudah tercatat di sistem. 
          <hr>
          <div class="d-flex flex-wrap gap-2 mt-2">
            <a href="${waLink}" target="_blank" class="btn btn-wa btn-sm rounded-pill">
              <i class="bi bi-whatsapp me-1"></i> Konfirmasi via WhatsApp (Percepatan)
            </a>
            <button type="button" class="btn btn-outline-secondary btn-sm rounded-pill" data-bs-dismiss="alert" aria-label="Tutup">Tutup</button>
          </div>
          <small class="text-muted d-block mt-2">⚠️ Klik tombol WhatsApp untuk mengirim notifikasi langsung ke admin. Proses akan lebih cepat.</small>
        </div>
      `;
      msgDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // Submit form utama
    document.getElementById('usulanForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const nama = document.getElementById('usulanNama').value.trim();
      const usulan = document.getElementById('usulanUsulan').value.trim();
      const tanggalMulai = document.getElementById('usulanTanggalMulai').value;
      const tanggalAkhir = document.getElementById('usulanTanggalAkhir').value;
      const lokasi = document.getElementById('usulanLokasi').value.trim();
      const no_hp = document.getElementById('usulanNoHp').value.trim();
      const captchaAnswer = parseInt(document.getElementById('captchaAnswer').value.trim(), 10);
      const msgDiv = document.getElementById('usulanFormMessage');

      // Validasi CAPTCHA
      if (isNaN(captchaAnswer) || captchaAnswer !== currentCaptchaResult) {
        msgDiv.innerHTML = '<div class="alert alert-danger">Jawaban verifikasi salah.</div>';
        generateCaptcha();
        return;
      }
      if (!nama || !usulan || !tanggalMulai || !lokasi || !no_hp) {
        msgDiv.innerHTML = '<div class="alert alert-danger">Semua field wajib diisi.</div>';
        return;
      }

      let flyerData = null, flyerName = null;
      const flyerFileInput = document.getElementById('usulanFlyer');
      if (flyerFileInput.files.length > 0) {
        const file = flyerFileInput.files[0];
        if (file.size > 2*1024*1024) {
          msgDiv.innerHTML = '<div class="alert alert-danger">Ukuran file flyer maksimal 2MB</div>';
          return;
        }
        flyerName = file.name;
        try { flyerData = await readFileAsBase64(file); }
        catch (err) { msgDiv.innerHTML = '<div class="alert alert-danger">Gagal membaca file flyer</div>'; return; }
      }

      const btn = e.target.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.innerHTML = '<i class="bi bi-hourglass-split"></i> Mengirim...';
      msgDiv.innerHTML = '';

      try {
        // Kirim via PKD.submitUsulan
        const res = await PKD.submitUsulan({
          nama, usulan, tanggal_mulai: tanggalMulai, tanggal_akhir: tanggalAkhir,
          lokasi, no_hp, flyerData, flyerName
        });
        
        if (res.success) {
          // Simpan data untuk keperluan WhatsApp
          lastSubmittedData = {
            nama: nama,
            usulan: usulan,
            tanggalMulai: tanggalMulai,
            tanggalAkhir: tanggalAkhir,
            lokasi: lokasi,
            no_hp: no_hp
          };
          
          // Reset form dan preview
          document.getElementById('usulanForm').reset();
          document.getElementById('flyerPreview').style.display = 'none';
          generateCaptcha();
          
          // Tampilkan pesan sukses + tombol WA
          showSuccessWithWaButton(lastSubmittedData);
        } else {
          throw new Error(res.error || 'Gagal mengirim usulan');
        }
      } catch(err) {
        msgDiv.innerHTML = `<div class="alert alert-danger">Gagal: ${escapeHtml(err.message)}</div>`;
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-send me-1"></i>Kirim Usulan';
      }
    });

    // Init CAPTCHA
    window.addEventListener('DOMContentLoaded', () => {
      generateCaptcha();
    });
  </script>
</body>
</html>
